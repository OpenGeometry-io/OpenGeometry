<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Cylinder Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simple OpenGeometry cylinder example for Three.js." />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Cylinder</span>
    </div>

    <aside class="og-controls">
      <h3>Cylinder</h3>
      <p class="og-control-summary">
        Use the sweep angle to move from a full cylinder to an open radial segment.
      </p>

      <label class="og-control-row" data-control="radius">
        <div class="og-control-header">
          <span class="og-control-label-chip">Radius</span>
          <code class="og-control-value" data-value>0.9</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.3" max="2" step="0.05" value="0.9" />
          <input data-number type="number" min="0.3" max="2" step="0.05" value="0.9" />
        </div>
      </label>

      <label class="og-control-row" data-control="height">
        <div class="og-control-header">
          <span class="og-control-label-chip">Height</span>
          <code class="og-control-value" data-value>2</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.5" max="4" step="0.1" value="2" />
          <input data-number type="number" min="0.5" max="4" step="0.1" value="2" />
        </div>
      </label>

      <label class="og-control-row" data-control="angle">
        <div class="og-control-header">
          <span class="og-control-label-chip">Angle (deg)</span>
          <code class="og-control-value" data-value>360</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="30" max="360" step="1" value="360" />
          <input data-number type="number" min="30" max="360" step="1" value="360" />
        </div>
      </label>

      <label class="og-control-row" data-control="outline">
        <div class="og-control-header">
          <span class="og-control-label-chip">Outline</span>
        </div>
        <div class="og-control-bool">
          <input data-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
          <span class="og-control-bool-state" data-state>Enabled</span>
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { Cylinder, OpenGeometry, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let config = null;

      function createConfig() {
        return {
          center: new Vector3(0, 1, 0),
          radius: 0.9,
          height: 2,
          segments: 48,
          angle: Math.PI * 2,
          color: 0xf97316,
          outlineWidth: 2,
        };
      }
      const viewState = {
        outline: true,
      };

      let cylinder = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function degToRad(value) {
        return (value * Math.PI) / 180;
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function attachBooleanControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const toggle = row?.querySelector("[data-toggle]");
        const state = row?.querySelector("[data-state]");

        if (!row || !toggle || !state) {
          throw new Error(`Missing boolean control: ${name}`);
        }

        const commit = (checked) => {
          toggle.checked = checked;
          state.textContent = checked ? "Enabled" : "Disabled";
          onChange(checked);
        };

        toggle.addEventListener("change", () => commit(toggle.checked));
        commit(toggle.checked);
      }

      function updateCylinder() {
        if (!cylinder) {
          return;
        }

        cylinder.setConfig({
          center: config.center.clone(),
          radius: config.radius,
          height: config.height,
          segments: config.segments,
          angle: config.angle,
          color: config.color,
          outlineWidth: config.outlineWidth,
        });
        cylinder.outline = viewState.outline;

        console.groupCollapsed("[cylinder] updated");
        console.log("Config", config);
        console.log("View", viewState);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(5.6, 4.4, 6.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, 0);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        config = createConfig();

        cylinder = new Cylinder({
          center: config.center.clone(),
          radius: config.radius,
          height: config.height,
          segments: config.segments,
          angle: config.angle,
          color: config.color,
          outlineWidth: config.outlineWidth,
        });
        scene.add(cylinder);

        attachNumberControl("radius", (value) => {
          config.radius = value;
          updateCylinder();
        });
        attachNumberControl("height", (value) => {
          config.height = value;
          config.center.y = value * 0.5;
          updateCylinder();
        });
        attachNumberControl("angle", (value) => {
          config.angle = degToRad(value);
          updateCylinder();
        });
        attachBooleanControl("outline", (value) => {
          viewState.outline = value;
          updateCylinder();
        });

        updateCylinder();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

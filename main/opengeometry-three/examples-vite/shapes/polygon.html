<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Polygon Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simple OpenGeometry polygon example for Three.js." />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Polygon</span>
    </div>

    <aside class="og-controls">
      <h3>Polygon</h3>
      <p class="og-control-summary">
        This page edits the real polygon `vertices` array. The hole toggle adds or removes the
        `holes` array.
      </p>

      <label class="og-control-row" data-control="vertex-2-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Vertex 2 X</span>
          <code class="og-control-value" data-value>1.7</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.8" max="3" step="0.05" value="1.7" />
          <input data-number type="number" min="0.8" max="3" step="0.05" value="1.7" />
        </div>
      </label>

      <label class="og-control-row" data-control="vertex-3-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Vertex 3 Z</span>
          <code class="og-control-value" data-value>1.2</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.6" max="2.2" step="0.05" value="1.2" />
          <input data-number type="number" min="0.6" max="2.2" step="0.05" value="1.2" />
        </div>
      </label>

      <label class="og-control-row" data-control="vertex-4-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Vertex 4 Z</span>
          <code class="og-control-value" data-value>0.55</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.2" max="1.4" step="0.05" value="0.55" />
          <input data-number type="number" min="0.2" max="1.4" step="0.05" value="0.55" />
        </div>
      </label>

      <label class="og-control-row" data-control="hole">
        <div class="og-control-header">
          <span class="og-control-label-chip">Add Hole</span>
        </div>
        <div class="og-control-bool">
          <input data-toggle type="checkbox" class="og-toggle" aria-label="Add hole" />
          <span class="og-control-bool-state" data-state>Disabled</span>
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Polygon, Vector3 } from "opengeometry";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let config = null;

      function createConfig() {
        return {
          vertices: [
            new Vector3(-1.7, 0, -1.2),
            new Vector3(1.7, 0, -1.2),
            new Vector3(1.7, 0, 1.2),
            new Vector3(0, 0, 0.55),
            new Vector3(-1.7, 0, 1.2),
          ],
          holes: [],
          color: 0x22c55e,
          outlineWidth: 2,
        };
      }

      let polygon = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function attachBooleanControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const toggle = row?.querySelector("[data-toggle]");
        const state = row?.querySelector("[data-state]");

        if (!row || !toggle || !state) {
          throw new Error(`Missing boolean control: ${name}`);
        }

        const commit = (checked) => {
          toggle.checked = checked;
          state.textContent = checked ? "Enabled" : "Disabled";
          onChange(checked);
        };

        toggle.addEventListener("change", () => commit(toggle.checked));
        commit(toggle.checked);
      }

      function createDefaultHole() {
        return [[
          new Vector3(-0.45, 0, -0.35),
          new Vector3(0.45, 0, -0.35),
          new Vector3(0.45, 0, 0.35),
          new Vector3(-0.45, 0, 0.35),
        ]];
      }

      function updatePolygon() {
        if (!polygon) {
          return;
        }

        polygon.setConfig({
          vertices: config.vertices.map((vertex) => vertex.clone()),
          holes: config.holes.map((hole) => hole.map((vertex) => vertex.clone())),
          color: config.color,
          outlineWidth: config.outlineWidth,
        });
        polygon.outline = true;

        console.groupCollapsed("[polygon] updated");
        console.log("Config", config);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(5.8, 4.2, 6.9);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.2, 0);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        config = createConfig();

        polygon = new Polygon({
          vertices: config.vertices.map((vertex) => vertex.clone()),
          holes: config.holes.map((hole) => hole.map((vertex) => vertex.clone())),
          color: config.color,
          outlineWidth: config.outlineWidth,
        });
        scene.add(polygon);

        attachNumberControl("vertex-2-x", (value) => {
          config.vertices[1].x = value;
          config.vertices[2].x = value;
          updatePolygon();
        });
        attachNumberControl("vertex-3-z", (value) => {
          config.vertices[2].z = value;
          config.vertices[4].z = value;
          updatePolygon();
        });
        attachNumberControl("vertex-4-z", (value) => {
          config.vertices[3].z = value;
          updatePolygon();
        });
        attachBooleanControl("hole", (value) => {
          config.holes = value ? createDefaultHole() : [];
          updatePolygon();
        });

        updatePolygon();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

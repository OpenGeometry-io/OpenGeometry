<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Polygon Suite Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OpenGeometry polygon suite example" />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Polygon Suite</span>
    </div>

    <aside class="og-controls" data-control-panel>
      <h3>Polygon Test Suite</h3>
      <p class="og-control-summary">
        Choose a dataset-backed polygon case. Dataset details are logged to the console.
      </p>

      <label class="og-control-row" data-control-key="polygonType" data-control-type="select">
        <div class="og-control-header">
          <span class="og-control-label-chip">Polygon Shape</span>
        </div>
        <select class="og-control-select" data-control-select aria-label="Polygon Shape">
          <option value="Triangle">Triangle</option>
          <option value="Square">Square</option>
          <option value="L_Shape">L Shape</option>
          <option value="Concave_Polygon">Concave Polygon</option>
          <option value="Complex_Multi_Hole" selected>Complex Multi Hole</option>
          <option value="Highly_Complex">Highly Complex</option>
          <option value="Building">Building</option>
        </select>
      </label>

      <label class="og-control-row" data-control-key="showOutline" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Show Outline</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Show Outline" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control-key="polygonColor" data-control-type="color">
        <div class="og-control-header">
          <span class="og-control-label-chip">Polygon Color</span>
          <code class="og-control-value" data-control-value>#4CAF50</code>
        </div>
        <input
          class="og-control-color"
          data-control-color
          type="color"
          value="#4caf50"
          aria-label="Polygon Color"
        />
      </label>

      <label class="og-control-row" data-control-key="opacity" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Opacity</span>
          <code class="og-control-value" data-control-value>0.7</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0" max="1" step="0.01" value="0.7" />
          <input data-control-number type="number" min="0" max="1" step="0.01" value="0.7" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="wireframe" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Wireframe</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Wireframe" />
          <span class="og-control-bool-state" data-control-bool-state>Disabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control-key="showStats" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Show FPS Stats</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Show FPS Stats" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control-key="statsMode" data-control-type="select">
        <div class="og-control-header">
          <span class="og-control-label-chip">Stats Mode</span>
        </div>
        <select class="og-control-select" data-control-select aria-label="Stats Mode">
          <option value="0" selected>FPS</option>
          <option value="1">Frame Time (ms)</option>
          <option value="2">Memory (MB)</option>
        </select>
      </label>
    </aside>

    <div id="stats"></div>
    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Polygon, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      const panel = document.querySelector("[data-control-panel]");
      const statsHost = document.getElementById("stats");

      if (!panel || !statsHost) {
        throw new Error("Missing static polygon-suite UI nodes");
      }

      const polygonDataset = {
        Triangle: {
          vertices: [
            [0, 0, 0],
            [3, 0, 0],
            [1.5, 0, 3],
          ],
          description: "Basic triangle test for the smallest valid polygon footprint.",
          category: "Basic Shapes",
        },
        Square: {
          vertices: [
            [-2, 0, -2],
            [2, 0, -2],
            [2, 0, 2],
            [-2, 0, 2],
          ],
          description: "Simple rectangular slab used as the baseline fill and outline case.",
          category: "Basic Shapes",
        },
        L_Shape: {
          vertices: [
            [0, 0, 0],
            [6, 0, 0],
            [6, 0, 4],
            [10, 0, 4],
            [10, 0, 10],
            [0, 0, 10],
          ],
          description: "Concave architectural footprint for notch handling and triangulation checks.",
          category: "Concave Cases",
        },
        Concave_Polygon: {
          vertices: [
            [0, 0, 0],
            [3, 0, 0],
            [4, 0, 2],
            [6, 0, 0],
            [10, 0, 0],
            [10, 0, 3],
            [8, 0, 4],
            [10, 0, 6],
            [10, 0, 10],
            [6, 0, 10],
            [4, 0, 8],
            [3, 0, 10],
            [0, 0, 10],
            [0, 0, 6],
            [2, 0, 4],
            [0, 0, 3],
          ],
          description: "Complex concave polygon with multiple indentations for triangulation stress.",
          category: "Concave Cases",
        },
        Complex_Multi_Hole: {
          vertices: [
            [-12, 0, -8],
            [12, 0, -8],
            [12, 0, 8],
            [-12, 0, 8],
          ],
          holes: [
            [
              [-8, 0, -5],
              [-8, 0, 1],
              [-3, 0, 1],
              [-3, 0, -5],
            ],
            [
              [2, 0, -5],
              [5, 0, -4],
              [6, 0, -1],
              [5, 0, 2],
              [2, 0, 1],
              [1, 0, -2],
            ],
            [
              [0, 0, 4],
              [0, 0, 6.5],
              [5, 0, 6.5],
              [5, 0, 5],
              [2, 0, 5],
              [2, 0, 4],
            ],
          ],
          description:
            "Rectangular slab with three interior voids to validate multi-hole redraw stability.",
          category: "Hole Test Suite",
        },
        Highly_Complex: {
          vertices: [
            [0, 0, 0],
            [1, 0, 0],
            [2, 0, 1],
            [3, 0, 0],
            [4, 0, 1],
            [5, 0, 0],
            [6, 0, 1],
            [7, 0, 0],
            [8, 0, 1],
            [9, 0, 0],
            [10, 0, 1],
            [11, 0, 2],
            [12, 0, 1],
            [13, 0, 2],
            [14, 0, 3],
            [15, 0, 4],
            [16, 0, 5],
            [17, 0, 6],
            [18, 0, 7],
            [19, 0, 8],
            [20, 0, 9],
            [19, 0, 10],
            [18, 0, 9],
            [17, 0, 8],
            [16, 0, 7],
            [15, 0, 6],
            [14, 0, 5],
            [13, 0, 4],
            [12, 0, 3],
            [11, 0, 2],
            [10, 0, 3],
            [9, 0, 2],
            [8, 0, 3],
            [7, 0, 2],
            [6, 0, 3],
            [5, 0, 2],
            [4, 0, 3],
            [3, 0, 2],
            [2, 0, 3],
            [1, 0, 2],
            [0, 0, 1],
          ],
          description: "Large irregular polygon used to inspect performance and triangulation consistency.",
          category: "Performance Testing",
        },
        Building: {
          vertices: [
            [66.1, 0, 11.2],
            [66.1, 0, 9.6],
            [66.6, 0, 9.6],
            [66.6, 0, 8.7],
            [74.3, 0, 8.7],
            [77.1, 0, 8.7],
            [77.1, 0, 11.4],
            [75.0, 0, 11.4],
            [75.0, 0, 11.3],
            [74.2, 0, 11.3],
            [74.2, 0, 10.6],
            [71.0, 0, 10.6],
            [71.0, 0, 11.3],
            [66.6, 0, 11.3],
            [66.6, 0, 11.2],
          ],
          description:
            "Architectural outline sampled from a real-world earcut-oriented building footprint.",
          category: "Dataset Cases",
        },
      };

      let polygon;
      let config = {
        polygonType: "Complex_Multi_Hole",
        showOutline: true,
        polygonColor: "#4CAF50",
        opacity: 0.7,
        wireframe: false,
        showStats: true,
        statsMode: 0,
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function toVector3Loop(points) {
        return points.map((point) => new Vector3(point[0], point[1], point[2]));
      }

      function hexToColorNumber(hexColor) {
        return parseInt(hexColor.slice(1), 16);
      }

      function applyPolygonMaterial() {
        polygon.outline = config.showOutline;

        if (polygon.material && polygon.material.color) {
          polygon.material.color.set(config.polygonColor);
        }

        if (polygon.material) {
          polygon.material.opacity = config.opacity;
          polygon.material.transparent = config.opacity < 1;
          polygon.material.wireframe = config.wireframe;
        }
      }

      function setUIControls() {
        const controls = panel.querySelectorAll("[data-control-key]");

        controls.forEach((control) => {
          const key = control.getAttribute("data-control-key");
          const type = control.getAttribute("data-control-type");

          if (type === "number") {
            const rangeInput = control.querySelector("[data-control-range]");
            const numberInput = control.querySelector("[data-control-number]");
            const valueDisplay = control.querySelector("[data-control-value]");

            const min = parseFloat(rangeInput.min);
            const max = parseFloat(rangeInput.max);

            function setNumberValue(value, shouldUpdate = true) {
              const numericValue = parseFloat(value);
              if (!Number.isFinite(numericValue)) {
                return;
              }

              const clampedValue = clamp(numericValue, min, max);
              config[key] = clampedValue;
              rangeInput.value = String(clampedValue);
              numberInput.value = String(clampedValue);
              valueDisplay.textContent = formatControlNumber(clampedValue);

              if (shouldUpdate) {
                updateGeometry();
              }
            }

            setNumberValue(config[key], false);
            rangeInput.addEventListener("input", () => setNumberValue(rangeInput.value));
            numberInput.addEventListener("input", () => setNumberValue(numberInput.value));
          }

          if (type === "boolean") {
            const toggleInput = control.querySelector("[data-control-toggle]");
            const boolStateDisplay = control.querySelector("[data-control-bool-state]");

            function setBooleanValue(checked, shouldUpdate = true) {
              config[key] = checked;
              toggleInput.checked = checked;
              boolStateDisplay.textContent = checked ? "Enabled" : "Disabled";

              if (shouldUpdate) {
                updateGeometry();
              }
            }

            setBooleanValue(Boolean(config[key]), false);
            toggleInput.addEventListener("change", () => setBooleanValue(toggleInput.checked));
          }

          if (type === "select") {
            const selectInput = control.querySelector("[data-control-select]");

            function setSelectValue(value, shouldUpdate = true) {
              config[key] = key === "statsMode" ? Number(value) : value;
              selectInput.value = String(value);

              if (shouldUpdate) {
                updateGeometry();
              }
            }

            setSelectValue(config[key], false);
            selectInput.addEventListener("change", () => setSelectValue(selectInput.value));
          }

          if (type === "color") {
            const colorInput = control.querySelector("[data-control-color]");
            const valueDisplay = control.querySelector("[data-control-value]");

            function setColorValue(value, shouldUpdate = true) {
              config[key] = value;
              colorInput.value = value;
              valueDisplay.textContent = value.toUpperCase();

              if (shouldUpdate) {
                updateGeometry();
              }
            }

            setColorValue(config[key], false);
            colorInput.addEventListener("input", () => setColorValue(colorInput.value));
          }
        });
      }

      function updateGeometry() {
        if (!polygon) {
          return;
        }

        const polygonData = polygonDataset[config.polygonType];
        if (!polygonData) {
          return;
        }

        polygon.setConfig({
          vertices: toVector3Loop(polygonData.vertices),
          holes: (polygonData.holes || []).map((hole) => toVector3Loop(hole)),
          color: hexToColorNumber(config.polygonColor),
        });

        applyPolygonMaterial();
        statsHost.style.display = config.showStats ? "block" : "none";
        stats.showPanel(Number(config.statsMode));

        console.groupCollapsed(`[polygon-suite] ${config.polygonType}`);
        console.log({
          category: polygonData.category,
          description: polygonData.description,
          vertexCount: polygonData.vertices.length,
          holeCount: polygonData.holes ? polygonData.holes.length : 0,
          color: config.polygonColor,
          opacity: config.opacity,
          wireframe: config.wireframe,
          outline: config.showOutline,
        });
        console.groupEnd();
      }

      const stats = new Stats();

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf6f1eb);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );
        camera.position.set(0, 20, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);
        controls.update();

        scene.add(new THREE.GridHelper(32, 32, 0xd88b63, 0xe7d4ca));
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        polygon = new Polygon({
          vertices: toVector3Loop(polygonDataset[config.polygonType].vertices),
          holes: (polygonDataset[config.polygonType].holes || []).map((hole) => toVector3Loop(hole)),
          color: hexToColorNumber(config.polygonColor),
        });
        polygon.position.y = 0.01;
        scene.add(polygon);

        statsHost.replaceChildren(stats.dom);
        const renderBase = renderer.render.bind(renderer);
        renderer.render = (renderScene, renderCamera) => {
          stats.begin();
          renderBase(renderScene, renderCamera);
          stats.end();
        };

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();

        setUIControls();
        updateGeometry();
      }

      void main();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Polygon Suite Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OpenGeometry Demo" />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Polygon, Vector3 } from "@og-three";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import GUI from "three/examples/jsm/libs/lil-gui.module.min.js";


      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function createBadge(meta) {
        const badge = document.createElement("div");
        badge.className = "og-badge";
        const chipMarkup = meta.chips
          .map((chip) => '<span class="og-chip og-chip-accent">' + chip + "</span>")
          .join("");

        badge.innerHTML =
          '<div class="og-badge-top">' +
          '<div class="og-badge-icon-wrap"><strong>OG</strong></div>' +
          '<p class="og-badge-status">' + meta.statusLabel + "</p>" +
          "</div>" +
          '<div class="og-badge-meta">' +
          '<p class="og-badge-kicker">OPEN GEOMETRY • ' + meta.category.toUpperCase() + "</p>" +
          '<strong class="og-badge-title">' + meta.title + "</strong>" +
          '<span class="og-badge-desc">' + meta.description + "</span>" +
          "</div>" +
          '<div class="og-badge-chip-row">' + chipMarkup + "</div>" +
          '<div class="og-badge-footer">' +
          '<a class="og-badge-link" href="../index.html">Back to Examples</a>' +
          "</div>";

        document.body.appendChild(badge);
      }

      function disposeMaterial(material) {
        if (!material) {
          return;
        }

        if (Array.isArray(material)) {
          material.forEach((entry) => entry && entry.dispose && entry.dispose());
          return;
        }

        if (material.dispose) {
          material.dispose();
        }
      }

      function disposeObject3D(object) {
        object.traverse((node) => {
          if (node.geometry && node.geometry.dispose) {
            node.geometry.dispose();
          }
          disposeMaterial(node.material);
        });
      }

      function replaceSceneObject(scene, previous, next) {
        if (previous) {
          previous.parent && previous.parent.remove(previous);
          disposeObject3D(previous);
        }

        scene.add(next);
        return next;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function mountControls(title, definitions, onChange) {
        const panel = document.createElement("aside");
        panel.className = "og-controls";

        const heading = document.createElement("h3");
        heading.textContent = title;
        panel.appendChild(heading);

        const state = {};
        definitions.forEach((definition) => {
          state[definition.key] = definition.value;
        });

        const emitChange = () => {
          onChange({ ...state });
        };

        definitions.forEach((definition) => {
          const row = document.createElement("label");
          row.className = "og-control-row";

          const header = document.createElement("div");
          header.className = "og-control-header";

          const label = document.createElement("span");
          label.className = "og-control-label-chip";
          label.textContent = definition.label;
          header.appendChild(label);

          if (definition.type === "number") {
            const valueLabel = document.createElement("code");
            valueLabel.className = "og-control-value";
            valueLabel.textContent = formatControlNumber(definition.value);
            header.appendChild(valueLabel);
            row.appendChild(header);

            const inputs = document.createElement("div");
            inputs.className = "og-control-range";

            const rangeInput = document.createElement("input");
            rangeInput.type = "range";
            rangeInput.min = String(definition.min);
            rangeInput.max = String(definition.max);
            rangeInput.step = String(definition.step || 0.01);
            rangeInput.value = String(definition.value);

            const numberInput = document.createElement("input");
            numberInput.type = "number";
            numberInput.min = String(definition.min);
            numberInput.max = String(definition.max);
            numberInput.step = String(definition.step || 0.01);
            numberInput.value = String(definition.value);

            const updateValue = (raw) => {
              const next = clamp(raw, definition.min, definition.max);
              state[definition.key] = next;
              rangeInput.value = String(next);
              numberInput.value = String(next);
              valueLabel.textContent = formatControlNumber(next);
              emitChange();
            };

            rangeInput.addEventListener("input", () => updateValue(Number(rangeInput.value)));
            numberInput.addEventListener("change", () => updateValue(Number(numberInput.value)));

            inputs.appendChild(rangeInput);
            inputs.appendChild(numberInput);
            row.appendChild(inputs);
          } else {
            row.appendChild(header);

            if (definition.type === "boolean") {
              const boolWrap = document.createElement("div");
              boolWrap.className = "og-control-bool";

              const toggle = document.createElement("input");
              toggle.type = "checkbox";
              toggle.className = "og-toggle";
              toggle.checked = definition.value;
              toggle.setAttribute("aria-label", definition.label);

              const boolLabel = document.createElement("span");
              boolLabel.className = "og-control-bool-state";
              boolLabel.textContent = definition.value ? "Enabled" : "Disabled";

              toggle.addEventListener("change", () => {
                state[definition.key] = toggle.checked;
                boolLabel.textContent = toggle.checked ? "Enabled" : "Disabled";
                emitChange();
              });

              boolWrap.appendChild(toggle);
              boolWrap.appendChild(boolLabel);
              row.appendChild(boolWrap);
            } else {
              const select = document.createElement("select");
              select.className = "og-control-select";
              select.setAttribute("aria-label", definition.label);

              definition.options.forEach((option) => {
                const optionElement = document.createElement("option");
                optionElement.value = option.value;
                optionElement.textContent = option.label;
                optionElement.selected = option.value === definition.value;
                select.appendChild(optionElement);
              });

              select.addEventListener("change", () => {
                state[definition.key] = select.value;
                emitChange();
              });

              row.appendChild(select);
            }
          }

          panel.appendChild(row);
        });

        document.body.appendChild(panel);
        emitChange();
      }

      async function createExampleScene(meta, options) {
        const settings = options || {};
        document.body.classList.add("og-example-page");
        document.title = meta.title + " | OpenGeometry";
        createBadge(meta);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(settings.background || 0xf6f1eb);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );

        const cameraPosition = settings.cameraPosition || [5.5, 4.2, 6.5];
        camera.position.set(cameraPosition[0], cameraPosition[1], cameraPosition[2]);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        const target = settings.target || [0, 0.8, 0];
        controls.target.set(target[0], target[1], target[2]);
        controls.update();

        scene.add(
          new THREE.GridHelper(
            settings.gridSize || 32,
            settings.gridDivisions || 32,
            settings.gridPrimary || 0xd88b63,
            settings.gridSecondary || 0xe7d4ca
          )
        );

        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
        return { scene, camera, renderer, controls };
      }


      async function main() {
        const meta = {
        "slug": "shapes/polygon-suite",
        "category": "shapes",
        "title": "Polygon Suite",
        "description": "Dataset-backed polygon validation with concave, performance, and multi-hole cases.",
        "statusLabel": "ready",
        "chips": [
          "Holes",
          "Concavity"
        ],
        "footerText": "Holes, Concavity"
      };

        const polygonDataset = {
          Triangle: {
            vertices: [[0, 0, 0], [3, 0, 0], [1.5, 0, 3]],
            description: "Basic triangle test for the smallest valid polygon footprint.",
            category: "Basic Shapes"
          },
          Square: {
            vertices: [[-2, 0, -2], [2, 0, -2], [2, 0, 2], [-2, 0, 2]],
            description: "Simple rectangular slab used as the baseline fill and outline case.",
            category: "Basic Shapes"
          },
          L_Shape: {
            vertices: [[0, 0, 0], [6, 0, 0], [6, 0, 4], [10, 0, 4], [10, 0, 10], [0, 0, 10]],
            description: "Concave architectural footprint for notch handling and triangulation checks.",
            category: "Concave Cases"
          },
          Concave_Polygon: {
            vertices: [[0, 0, 0], [3, 0, 0], [4, 0, 2], [6, 0, 0], [10, 0, 0], [10, 0, 3], [8, 0, 4], [10, 0, 6], [10, 0, 10], [6, 0, 10], [4, 0, 8], [3, 0, 10], [0, 0, 10], [0, 0, 6], [2, 0, 4], [0, 0, 3]],
            description: "Complex concave polygon with multiple indentations for triangulation stress.",
            category: "Concave Cases"
          },
          Complex_Multi_Hole: {
            vertices: [[-12, 0, -8], [12, 0, -8], [12, 0, 8], [-12, 0, 8]],
            holes: [
              [[-8, 0, -5], [-8, 0, 1], [-3, 0, 1], [-3, 0, -5]],
              [[2, 0, -5], [5, 0, -4], [6, 0, -1], [5, 0, 2], [2, 0, 1], [1, 0, -2]],
              [[0, 0, 4], [0, 0, 6.5], [5, 0, 6.5], [5, 0, 5], [2, 0, 5], [2, 0, 4]]
            ],
            description: "Rectangular slab with three interior voids to validate multi-hole redraw stability.",
            category: "Hole Test Suite"
          },
          Highly_Complex: {
            vertices: [[0, 0, 0], [1, 0, 0], [2, 0, 1], [3, 0, 0], [4, 0, 1], [5, 0, 0], [6, 0, 1], [7, 0, 0], [8, 0, 1], [9, 0, 0], [10, 0, 1], [11, 0, 2], [12, 0, 1], [13, 0, 2], [14, 0, 3], [15, 0, 4], [16, 0, 5], [17, 0, 6], [18, 0, 7], [19, 0, 8], [20, 0, 9], [19, 0, 10], [18, 0, 9], [17, 0, 8], [16, 0, 7], [15, 0, 6], [14, 0, 5], [13, 0, 4], [12, 0, 3], [11, 0, 2], [10, 0, 3], [9, 0, 2], [8, 0, 3], [7, 0, 2], [6, 0, 3], [5, 0, 2], [4, 0, 3], [3, 0, 2], [2, 0, 3], [1, 0, 2], [0, 0, 1]],
            description: "Large irregular polygon used to inspect performance and triangulation consistency.",
            category: "Performance Testing"
          },
          Building: {
            vertices: [[66.1, 0, 11.2], [66.1, 0, 9.6], [66.6, 0, 9.6], [66.6, 0, 8.7], [74.3, 0, 8.7], [77.1, 0, 8.7], [77.1, 0, 11.4], [75.0, 0, 11.4], [75.0, 0, 11.3], [74.2, 0, 11.3], [74.2, 0, 10.6], [71.0, 0, 10.6], [71.0, 0, 11.3], [66.6, 0, 11.3], [66.6, 0, 11.2]],
            description: "Architectural outline sampled from a real-world earcut-oriented building footprint.",
            category: "Dataset Cases"
          }
        };

        function toVector3Loop(points) {
          return points.map((point) => new Vector3(point[0], point[1], point[2]));
        }

        function applyPolygonMaterial(polygon, color, opacity, wireframe, outline) {
          polygon.outline = outline;

          if (polygon.material && polygon.material.color) {
            polygon.material.color.set(color);
          }

          if (polygon.material) {
            polygon.material.opacity = opacity;
            polygon.material.transparent = opacity < 1;
            polygon.material.wireframe = wireframe;
          }
        }

        const { scene, camera, renderer, controls } = await createExampleScene(meta, {
          cameraPosition: [0, 20, 20],
          target: [0, 0, 0]
        });

        camera.position.set(0, 20, 20);
        controls.target.set(0, 0, 0);
        controls.update();

        const stats = new Stats();
        stats.dom.id = "stats";
        document.body.appendChild(stats.dom);

        const description = document.createElement("div");
        description.id = "polygon-description";
        document.body.appendChild(description);

        const renderBase = renderer.render.bind(renderer);
        renderer.render = (renderScene, renderCamera) => {
          stats.begin();
          renderBase(renderScene, renderCamera);
          stats.end();
        };

        const info = {
          vertices: 0,
          holes: 0,
          category: ""
        };

        const params = {
          polygonType: "Complex_Multi_Hole",
          showOutline: true,
          polygonColor: "#4CAF50",
          opacity: 0.7,
          wireframe: false,
          showStats: true,
          statsMode: 0
        };

        let current = null;

        function updatePolygonDescription(polygonName) {
          const polygonData = polygonDataset[polygonName];
          if (!polygonData) {
            return;
          }

          const holeSummary = polygonData.holes && polygonData.holes.length
            ? "<br><em>Holes: " + polygonData.holes.length + "</em>"
            : "";

          description.innerHTML =
            "<strong>" + polygonName + "</strong><br>" +
            "<em>Category: " + polygonData.category + "</em>" +
            holeSummary +
            "<br>" +
            polygonData.description;
        }

        function createPolygon(polygonName) {
          const polygonData = polygonDataset[polygonName];
          if (!polygonData) {
            return;
          }

          const polygon = new Polygon({
            vertices: toVector3Loop(polygonData.vertices),
            color: 0x4caf50
          });

          (polygonData.holes || []).forEach((hole) => {
            polygon.addHole(toVector3Loop(hole));
          });

          polygon.position.y = 0.01;
          applyPolygonMaterial(polygon, params.polygonColor, params.opacity, params.wireframe, params.showOutline);

          current = replaceSceneObject(scene, current, polygon);
          info.vertices = polygonData.vertices.length;
          info.holes = polygonData.holes ? polygonData.holes.length : 0;
          info.category = polygonData.category;
          updatePolygonDescription(polygonName);
        }

        const gui = new GUI();
        const polygonFolder = gui.addFolder("Polygon Test Suite");
        polygonFolder.open();
        polygonFolder.add(params, "polygonType", Object.keys(polygonDataset)).name("Polygon Shape").onChange((value) => {
          createPolygon(value);
        });
        polygonFolder.add(params, "showOutline").name("Show Outline").onChange((value) => {
          if (current) {
            applyPolygonMaterial(current, params.polygonColor, params.opacity, params.wireframe, value);
          }
        });
        polygonFolder.addColor(params, "polygonColor").name("Polygon Color").onChange((value) => {
          if (current) {
            applyPolygonMaterial(current, value, params.opacity, params.wireframe, params.showOutline);
          }
        });
        polygonFolder.add(params, "opacity", 0, 1, 0.01).name("Opacity").onChange((value) => {
          if (current) {
            applyPolygonMaterial(current, params.polygonColor, value, params.wireframe, params.showOutline);
          }
        });
        polygonFolder.add(params, "wireframe").name("Wireframe").onChange((value) => {
          if (current) {
            applyPolygonMaterial(current, params.polygonColor, params.opacity, value, params.showOutline);
          }
        });

        const performanceFolder = gui.addFolder("Performance");
        performanceFolder.open();
        performanceFolder.add(params, "showStats").name("Show FPS Stats").onChange((value) => {
          stats.dom.style.display = value ? "block" : "none";
        });
        performanceFolder.add(params, "statsMode", { FPS: 0, "Frame Time (ms)": 1, "Memory (MB)": 2 }).name("Stats Mode").onChange((value) => {
          stats.showPanel(Number(value));
        });

        const infoFolder = gui.addFolder("Polygon Info");
        infoFolder.open();
        infoFolder.add(info, "vertices").name("Vertex Count").listen();
        infoFolder.add(info, "holes").name("Hole Count").listen();
        infoFolder.add(info, "category").name("Category").listen();

        createPolygon(params.polygonType);
      }

      void main();
    </script>
  </body>
</html>

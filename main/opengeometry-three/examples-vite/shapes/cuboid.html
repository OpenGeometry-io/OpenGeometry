<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Cuboid Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OpenGeometry Demo" />
    <meta name="author" content="Vishwajeet Mane" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=keyboard_backspace" />
  </head>
  <body style="width: 100%; height: 100%; overflow: hidden;">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">
        <span class="material-symbols-outlined">
          keyboard_backspace
        </span>
      </a>
      <span class="og-badge-title">Cuboid</span>
    </div>
    <aside class="og-controls" data-control-panel>
      <h3>Parameters</h3>
      <label class="og-control-row" data-control-key="width" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Width</span>
          <code class="og-control-value" data-control-value>1.8</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
          <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="height" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Height</span>
          <code class="og-control-value" data-control-value>1.6</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.6" />
          <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.6" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="depth" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Depth</span>
          <code class="og-control-value" data-control-value>1.2</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.2" />
          <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.2" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="outline" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Outline</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>
      <label class="og-control-row" data-control-key="fatOutlines" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Fat Outlines</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Fat Outlines" />
          <span class="og-control-bool-state" data-control-bool-state>Disabled</span>
        </div>
      </label>
      <label class="og-control-row" data-control-key="outlineWidth" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Outline Width</span>
          <code class="og-control-value" data-control-value>4</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="1" max="12" step="0.5" value="4" />
          <input data-control-number type="number" min="1" max="12" step="0.5" value="4" />
        </div>
      </label>
    </aside>
    <div id="app"></div>
    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Cuboid, Vector3 } from "@og-three";

      const app = document.getElementById("app");

      // Global Cuboid Variable
      let cuboid;

      // Storing Parameters for Geometry
      let config = {};

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      // This function will be used to link the UI controls with the Cuboid geometry parameters
      // Using setConfig to update the config object and then applying those changes to the cuboid geometry
      function setUIControls() {
        const controlElements = document.querySelectorAll("[data-control-key]");

        controlElements.forEach((element) => {
          const key = element.getAttribute("data-control-key");
          const type = element.getAttribute("data-control-type");

          if (type === "number") {
            const rangeInput = element.querySelector('input[type="range"]');
            const numberInput = element.querySelector('input[type="number"]');
            const valueDisplay = element.querySelector("[data-control-value]");

            const onChange = (value) => {
              config[key] = parseFloat(value);
              valueDisplay.textContent = formatControlNumber(value);
              updateCuboid();
            };

            rangeInput.addEventListener("input", (e) => onChange(e.target.value));
            numberInput.addEventListener("input", (e) => onChange(e.target.value));
          } else if (type === "boolean") {
            const toggleInput = element.querySelector('input[type="checkbox"]');
            const boolStateDisplay = element.querySelector("[data-control-bool-state]");

            toggleInput.addEventListener("change", (e) => {
              config[key] = e.target.checked;
              boolStateDisplay.textContent = e.target.checked ? "Enabled" : "Disabled";
              updateCuboid();
            });
          }
        });
      }

      // This function applies the current config parameters to the cuboid geometry
      function updateCuboid() {
        if (!cuboid) return;
        cuboid.setConfig({
          width: config.width,
          height: config.height,
          depth: config.depth,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth
        });

        cuboid.outline = config.outline;
      }

      async function main() {
        // Simple Three.js Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf6f1eb);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );

        camera.position.set(5.5, 4.2, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);
        controls.update();

        // Grid Helper
        scene.add(new THREE.GridHelper(32, 32, 0xd88b63, 0xe7d4ca));

        // Lights Setup
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        // Initialize OpenGeometry
        await OpenGeometry.create({ wasmURL: wasmUrl });

        // Initial Cuboid Geometry Parameters
        config = {
          width: 1.8,
          height: 1.6,
          depth: 1.2,
          outline: true,
          fatOutlines: false,
          outlineWidth: 4
        };

        cuboid = new Cuboid({
          center: new Vector3(0, 0.8, 0),
          width: config.width,
          height: config.height,
          depth: config.depth,
          color: 0x10b981,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth
        });

        cuboid.outline = config.outline;
        scene.add(cuboid);

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();

        setUIControls();
      }

      void main();
    </script>
  </body>
</html>

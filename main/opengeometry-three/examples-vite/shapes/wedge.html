<!DOCTYPE html>
<html lang="en">
  <head>
      <title>OpenGeometry Wedge Example</title>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <meta name="description" content="OpenGeometry Demo" />
      <meta name="author" content="Vishwajeet Mane" />
    </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Wedge</span>
    </div>
    <aside class="og-controls" data-control-panel>
          <h3>Wedge Parameters</h3>
          <label class="og-control-row" data-control-key="width" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Width</span>
              <code class="og-control-value" data-control-value>2</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.2" max="4" step="0.05" value="2" />
              <input data-control-number type="number" min="0.2" max="4" step="0.05" value="2" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="height" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Height</span>
              <code class="og-control-value" data-control-value>1.8</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
              <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="depth" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Depth</span>
              <code class="og-control-value" data-control-value>1.4</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.4" />
              <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.4" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="outline" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Outline</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
              <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="fatOutlines" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Fat Outlines</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Fat Outlines" />
              <span class="og-control-bool-state" data-control-bool-state>Disabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="outlineWidth" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Outline Width</span>
              <code class="og-control-value" data-control-value>4</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="1" max="12" step="0.5" value="4" />
              <input data-control-number type="number" min="1" max="12" step="0.5" value="4" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="translateX" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Translate X</span>
              <code class="og-control-value" data-control-value>0</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="-2" max="2" step="0.05" value="0" />
              <input data-control-number type="number" min="-2" max="2" step="0.05" value="0" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="translateZ" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Translate Z</span>
              <code class="og-control-value" data-control-value>0</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="-2" max="2" step="0.05" value="0" />
              <input data-control-number type="number" min="-2" max="2" step="0.05" value="0" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="rotateYDeg" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Rotate Y (deg)</span>
              <code class="og-control-value" data-control-value>0</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="-180" max="180" step="1" value="0" />
              <input data-control-number type="number" min="-180" max="180" step="1" value="0" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="scale" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Scale</span>
              <code class="og-control-value" data-control-value>1</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.5" max="2" step="0.05" value="1" />
              <input data-control-number type="number" min="0.5" max="2" step="0.05" value="1" />
            </div>
          </label>
        </aside>
    <div id="app"></div>
    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Wedge, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let wedge;
      let config = {
        width: 2.0,
        height: 1.8,
        depth: 1.4,
        outline: true,
        fatOutlines: false,
        outlineWidth: 4,
        translateX: 0,
        translateZ: 0,
        rotateYDeg: 0,
        scale: 1,
      };

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function applyTransform(target) {
        target.setPlacement({
          translation: new Vector3(config.translateX, 0, config.translateZ),
          rotation: new Vector3(0, (config.rotateYDeg * Math.PI) / 180, 0),
          scale: new Vector3(config.scale, config.scale, config.scale),
        });
      }

      function setUIControls() {
        const controls = document.querySelectorAll("[data-control-key]");

        controls.forEach((control) => {
          const key = control.getAttribute("data-control-key");
          const type = control.getAttribute("data-control-type");

          if (type === "number") {
            const rangeInput = control.querySelector("[data-control-range]");
            const numberInput = control.querySelector("[data-control-number]");
            const valueDisplay = control.querySelector("[data-control-value]");

            function setNumberValue(value) {
              const numericValue = parseFloat(value);
              if (!Number.isFinite(numericValue)) return;

              config[key] = numericValue;
              rangeInput.value = String(numericValue);
              numberInput.value = String(numericValue);
              valueDisplay.textContent = formatControlNumber(numericValue);
              updateGeometry();
            }

            rangeInput.addEventListener("input", () => setNumberValue(rangeInput.value));
            numberInput.addEventListener("input", () => setNumberValue(numberInput.value));
          }

          if (type === "boolean") {
            const toggleInput = control.querySelector("[data-control-toggle]");
            const boolStateDisplay = control.querySelector("[data-control-bool-state]");

            function setBooleanValue(checked) {
              config[key] = checked;
              toggleInput.checked = checked;
              boolStateDisplay.textContent = checked ? "Enabled" : "Disabled";
              updateGeometry();
            }

            toggleInput.addEventListener("change", () => setBooleanValue(toggleInput.checked));
          }
        });
      }

      function updateGeometry() {
        if (!wedge) return;
        wedge.setConfig({
          center: new Vector3(0, config.height * 0.5, 0),
          width: config.width,
          height: config.height,
          depth: config.depth,
          color: 0xd97706,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth,
        });

        wedge.outline = config.outline;
        applyTransform(wedge);
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );

        camera.position.set(5.5, 4.2, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);
        controls.update();

        scene.add(new THREE.GridHelper(32, 32, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        wedge = new Wedge({
          center: new Vector3(0, config.height * 0.5, 0),
          width: config.width,
          height: config.height,
          depth: config.depth,
          color: 0xd97706,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth,
        });
        wedge.outline = config.outline;
        scene.add(wedge);

        updateGeometry();

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
        setUIControls();
      }

      void main();
    </script>
  </body>
</html>

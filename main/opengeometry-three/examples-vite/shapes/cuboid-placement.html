<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Cuboid Placement Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Cuboid placement example showing mesh, outline, geometry, and BRep alignment."
    />
    <meta name="author" content="Vishwajeet Mane" />
    <style>
      .og-info-card {
        margin-top: 14px;
        padding: 14px;
        border: 1px solid rgba(68, 96, 255, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 12px 24px rgba(68, 96, 255, 0.1);
      }

      .og-info-card h4 {
        margin: 0 0 10px;
        font-size: 13px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .og-info-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
      }

      .og-info-row {
        display: grid;
        gap: 4px;
      }

      .og-info-label {
        color: #5f6c9d;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .og-info-value {
        color: #18203d;
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 12px;
        line-height: 1.45;
        word-break: break-word;
      }

      .og-legend {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .og-legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #18203d;
        font-size: 12px;
      }

      .og-legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        flex: 0 0 12px;
      }
    </style>
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Cuboid Placement</span>
    </div>
    <aside class="og-controls" data-control-panel>
      <h3>Placement</h3>
      <label class="og-control-row" data-control-key="width" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Width</span>
          <code class="og-control-value" data-control-value>1.8</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
          <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="height" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Height</span>
          <code class="og-control-value" data-control-value>1.4</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.4" />
          <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.4" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="depth" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Depth</span>
          <code class="og-control-value" data-control-value>1.2</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.2" />
          <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.2" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="tx" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Translate X</span>
          <code class="og-control-value" data-control-value>1.1</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="-4" max="4" step="0.05" value="1.1" />
          <input data-control-number type="number" min="-4" max="4" step="0.05" value="1.1" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="ty" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Translate Y</span>
          <code class="og-control-value" data-control-value>0.6</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="-2" max="3" step="0.05" value="0.6" />
          <input data-control-number type="number" min="-2" max="3" step="0.05" value="0.6" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="tz" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Translate Z</span>
          <code class="og-control-value" data-control-value>-0.9</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="-4" max="4" step="0.05" value="-0.9" />
          <input data-control-number type="number" min="-4" max="4" step="0.05" value="-0.9" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="rx" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Rotate X (rad)</span>
          <code class="og-control-value" data-control-value>0.35</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="-3.14" max="3.14" step="0.05" value="0.35" />
          <input data-control-number type="number" min="-3.14" max="3.14" step="0.05" value="0.35" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="ry" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Rotate Y (rad)</span>
          <code class="og-control-value" data-control-value>0.6</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="-3.14" max="3.14" step="0.05" value="0.6" />
          <input data-control-number type="number" min="-3.14" max="3.14" step="0.05" value="0.6" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="rz" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Rotate Z (rad)</span>
          <code class="og-control-value" data-control-value>-0.25</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="-3.14" max="3.14" step="0.05" value="-0.25" />
          <input data-control-number type="number" min="-3.14" max="3.14" step="0.05" value="-0.25" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="sx" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Scale X</span>
          <code class="og-control-value" data-control-value>1.2</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="2.5" step="0.05" value="1.2" />
          <input data-control-number type="number" min="0.2" max="2.5" step="0.05" value="1.2" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="sy" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Scale Y</span>
          <code class="og-control-value" data-control-value>0.85</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="2.5" step="0.05" value="0.85" />
          <input data-control-number type="number" min="0.2" max="2.5" step="0.05" value="0.85" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="sz" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Scale Z</span>
          <code class="og-control-value" data-control-value>1.5</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.2" max="2.5" step="0.05" value="1.5" />
          <input data-control-number type="number" min="0.2" max="2.5" step="0.05" value="1.5" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="outline" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Outline</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>
      <label class="og-control-row" data-control-key="brepPoints" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">BRep Vertices</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="BRep Vertices" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>

      <section class="og-info-card">
        <h4>Legend</h4>
        <div class="og-legend">
          <div class="og-legend-item"><span class="og-legend-swatch" style="background:#10b981"></span>Kernel world mesh</div>
          <div class="og-legend-item"><span class="og-legend-swatch" style="background:#1d4ed8"></span>Kernel world geometry wireframe</div>
          <div class="og-legend-item"><span class="og-legend-swatch" style="background:#111827"></span>Kernel world outline buffer</div>
          <div class="og-legend-item"><span class="og-legend-swatch" style="background:#f97316"></span>Kernel world BRep vertices</div>
          <div class="og-legend-item"><span class="og-legend-swatch" style="background:#ec4899"></span>Anchor</div>
          <div class="og-legend-item"><span class="og-legend-swatch" style="background:#ef4444"></span>Placed origin</div>
        </div>
      </section>

      <section class="og-info-card">
        <h4>Kernel State</h4>
        <div class="og-info-list">
          <div class="og-info-row">
            <span class="og-info-label">Anchor</span>
            <span class="og-info-value" data-status-key="anchor">-</span>
          </div>
          <div class="og-info-row">
            <span class="og-info-label">Placed Origin</span>
            <span class="og-info-value" data-status-key="placedOrigin">-</span>
          </div>
          <div class="og-info-row">
            <span class="og-info-label">World BRep Center</span>
            <span class="og-info-value" data-status-key="worldCenter">-</span>
          </div>
          <div class="og-info-row">
            <span class="og-info-label">Triangle Vertices</span>
            <span class="og-info-value" data-status-key="triangleVertices">-</span>
          </div>
          <div class="og-info-row">
            <span class="og-info-label">Outline Segments</span>
            <span class="og-info-value" data-status-key="outlineSegments">-</span>
          </div>
          <div class="og-info-row">
            <span class="og-info-label">BRep Vertices</span>
            <span class="og-info-value" data-status-key="brepVertices">-</span>
          </div>
        </div>
      </section>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { Cuboid, OpenGeometry, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      const center = { x: 0, y: 0.8, z: 0 };
      const statusNodes = new Map(
        Array.from(document.querySelectorAll("[data-status-key]")).map((node) => [
          node.getAttribute("data-status-key"),
          node,
        ])
      );

      const config = {
        width: 1.8,
        height: 1.4,
        depth: 1.2,
        tx: 1.1,
        ty: 0.6,
        tz: -0.9,
        rx: 0.35,
        ry: 0.6,
        rz: -0.25,
        sx: 1.2,
        sy: 1.2,
        sz: 1.2,
        outline: true,
        brepPoints: true,
      };
      const MIN_UNIFORM_SCALE = 1e-6;
      const scaleKeys = ["sx", "sy", "sz"];
      const geometryKeys = new Set(["width", "height", "depth"]);
      const placementKeys = new Set([
        "tx",
        "ty",
        "tz",
        "rx",
        "ry",
        "rz",
        "sx",
        "sy",
        "sz",
      ]);

      let cuboid;
      let geometryWireframe;
      let brepPoints;
      let anchorMarker;
      let placedOriginMarker;

      function formatNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function formatVector3(vector) {
        return `${formatNumber(vector.x)}, ${formatNumber(vector.y)}, ${formatNumber(vector.z)}`;
      }

      function setStatus(key, value) {
        const node = statusNodes.get(key);
        if (node) {
          node.textContent = value;
        }
      }

      function toThreeVector(vector) {
        return new THREE.Vector3(vector.x, vector.y, vector.z);
      }

      function writePositions(geometry, positions) {
        const existing = geometry.getAttribute("position");
        if (
          !(existing instanceof THREE.BufferAttribute) ||
          existing.itemSize !== 3 ||
          existing.count !== positions.length / 3
        ) {
          geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(positions, 3)
          );
          return;
        }

        const array = existing.array;
        array.set(positions);
        existing.needsUpdate = true;
      }

      function getPlacedOrigin(anchor) {
        return new THREE.Vector3(
          anchor.x + config.tx,
          anchor.y + config.ty,
          anchor.z + config.tz
        );
      }

      function getPlacement() {
        const uniformScale = Math.max(MIN_UNIFORM_SCALE, config.sx);
        return {
          translation: new Vector3(config.tx, config.ty, config.tz),
          rotation: new Vector3(config.rx, config.ry, config.rz),
          scale: new Vector3(uniformScale, uniformScale, uniformScale),
        };
      }

      function setNumericControlValue(controlKey, value) {
        const control = document.querySelector(`[data-control-key="${controlKey}"]`);
        if (!control) {
          return;
        }

        const rangeInput = control.querySelector("[data-control-range]");
        const numberInput = control.querySelector("[data-control-number]");
        const valueDisplay = control.querySelector("[data-control-value]");

        rangeInput.value = String(value);
        numberInput.value = String(value);
        valueDisplay.textContent = formatNumber(value);
      }

      function syncUniformScale(value) {
        const uniformScale = Math.max(MIN_UNIFORM_SCALE, value);
        config.sx = uniformScale;
        config.sy = uniformScale;
        config.sz = uniformScale;
        scaleKeys.forEach((key) => setNumericControlValue(key, uniformScale));
      }

      function getOutlineSegmentCount() {
        if (!cuboid.outline || !cuboid.outlineMesh) {
          return 0;
        }

        const position = cuboid.outlineMesh.geometry.getAttribute("position");
        if (!(position instanceof THREE.BufferAttribute)) {
          return 0;
        }

        return position.count / 2;
      }

      function setUIControls() {
        const controls = document.querySelectorAll("[data-control-key]");

        controls.forEach((control) => {
          const key = control.getAttribute("data-control-key");
          const type = control.getAttribute("data-control-type");

          if (type === "number") {
            const rangeInput = control.querySelector("[data-control-range]");
            const numberInput = control.querySelector("[data-control-number]");
            const valueDisplay = control.querySelector("[data-control-value]");

            const setNumberValue = (value) => {
              const numericValue = parseFloat(value);
              if (!Number.isFinite(numericValue)) {
                return;
              }

              config[key] = numericValue;
              rangeInput.value = String(numericValue);
              numberInput.value = String(numericValue);
              valueDisplay.textContent = formatNumber(numericValue);

              if (scaleKeys.includes(key)) {
                syncUniformScale(numericValue);
                updateCuboidPlacement();
                return;
              }

              if (geometryKeys.has(key)) {
                updateCuboidGeometry();
                return;
              }

              if (placementKeys.has(key)) {
                updateCuboidPlacement();
                return;
              }

              refreshVisualization();
            };

            rangeInput.addEventListener("input", () => setNumberValue(rangeInput.value));
            numberInput.addEventListener("input", () => setNumberValue(numberInput.value));
          }

          if (type === "boolean") {
            const toggleInput = control.querySelector("[data-control-toggle]");
            const stateDisplay = control.querySelector("[data-control-bool-state]");

            const setBooleanValue = (checked) => {
              config[key] = checked;
              toggleInput.checked = checked;
              stateDisplay.textContent = checked ? "Enabled" : "Disabled";
              refreshVisualization();
            };

            toggleInput.addEventListener("change", () => setBooleanValue(toggleInput.checked));
          }
        });
      }

      function refreshVisualization() {
        if (cuboid.outline !== config.outline) {
          cuboid.outline = config.outline;
        }

        const geometryPosition = cuboid.geometry.getAttribute("position");
        const worldGeometry = geometryPosition instanceof THREE.BufferAttribute
          ? Array.from(geometryPosition.array)
          : [];
        const worldBrep = cuboid.getBrepData();
        const anchor = cuboid.getAnchor();
        const placedOrigin = getPlacedOrigin(anchor);
        const worldVertexPositions = worldBrep.vertices.flatMap((vertex) => [
          vertex.position.x,
          vertex.position.y,
          vertex.position.z,
        ]);
        const worldCenter = worldBrep.vertices.reduce(
          (accumulator, vertex) => {
            accumulator.x += vertex.position.x;
            accumulator.y += vertex.position.y;
            accumulator.z += vertex.position.z;
            return accumulator;
          },
          { x: 0, y: 0, z: 0 }
        );

        if (worldBrep.vertices.length > 0) {
          worldCenter.x /= worldBrep.vertices.length;
          worldCenter.y /= worldBrep.vertices.length;
          worldCenter.z /= worldBrep.vertices.length;
        }

        writePositions(geometryWireframe.geometry, worldGeometry);
        geometryWireframe.geometry.computeBoundingSphere();

        writePositions(brepPoints.geometry, worldVertexPositions);
        brepPoints.geometry.computeBoundingSphere();
        brepPoints.visible = config.brepPoints;

        anchorMarker.position.copy(toThreeVector(anchor));
        placedOriginMarker.position.copy(placedOrigin);

        setStatus("anchor", formatVector3(anchor));
        setStatus("placedOrigin", formatVector3(placedOrigin));
        setStatus("worldCenter", formatVector3(worldCenter));
        setStatus("triangleVertices", String(worldGeometry.length / 3));
        setStatus("outlineSegments", String(getOutlineSegmentCount()));
        setStatus("brepVertices", String(worldBrep.vertices.length));
      }

      function updateCuboidGeometry() {
        cuboid.setConfig({
          width: config.width,
          height: config.height,
          depth: config.depth,
        });
        refreshVisualization();
      }

      function updateCuboidPlacement() {
        cuboid.setPlacement(getPlacement());
        refreshVisualization();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );
        camera.position.set(7, 5.5, 7.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.2, 0);
        controls.update();

        scene.add(new THREE.GridHelper(32, 32, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.76));

        const keyLight = new THREE.DirectionalLight(0xffffff, 0.92);
        keyLight.position.set(6, 8, 4);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.35);
        fillLight.position.set(-6, 5, -6);
        scene.add(fillLight);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        syncUniformScale(config.sx);

        cuboid = new Cuboid({
          ogid: "cuboid-placement-example",
          center: new Vector3(center.x, center.y, center.z),
          width: config.width,
          height: config.height,
          depth: config.depth,
          color: 0x10b981,
          translation: getPlacement().translation,
          rotation: getPlacement().rotation,
          scale: getPlacement().scale,
        });
        cuboid.outline = config.outline;

        geometryWireframe = new THREE.Mesh(
          new THREE.BufferGeometry(),
          new THREE.MeshBasicMaterial({
            color: 0x1d4ed8,
            wireframe: true,
            transparent: true,
            opacity: 0.95,
          })
        );

        brepPoints = new THREE.Points(
          new THREE.BufferGeometry(),
          new THREE.PointsMaterial({
            color: 0xf97316,
            size: 0.08,
            sizeAttenuation: true,
          })
        );

        anchorMarker = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 18, 18),
          new THREE.MeshStandardMaterial({ color: 0xec4899 })
        );

        placedOriginMarker = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 18, 18),
          new THREE.MeshStandardMaterial({ color: 0xef4444 })
        );

        scene.add(cuboid);
        scene.add(geometryWireframe);
        scene.add(brepPoints);
        scene.add(anchorMarker);
        scene.add(placedOriginMarker);

        refreshVisualization();
        setUIControls();

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
      }

      void main();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Cuboid Placement Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Simple OpenGeometry cuboid placement example for Three.js."
    />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Cuboid Placement</span>
    </div>

    <aside class="og-controls">
      <h3>Placement</h3>
      <p class="og-control-summary">
        The shape stays the same. Only the placement object changes: `translation`, `rotation`,
        and `scale`.
      </p>

      <label class="og-control-row" data-control="x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Translate X</span>
          <code class="og-control-value" data-value>0</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-2.5" max="2.5" step="0.05" value="0" />
          <input data-number type="number" min="-2.5" max="2.5" step="0.05" value="0" />
        </div>
      </label>

      <label class="og-control-row" data-control="z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Translate Z</span>
          <code class="og-control-value" data-value>0</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-2.5" max="2.5" step="0.05" value="0" />
          <input data-number type="number" min="-2.5" max="2.5" step="0.05" value="0" />
        </div>
      </label>

      <label class="og-control-row" data-control="rotation">
        <div class="og-control-header">
          <span class="og-control-label-chip">Rotate Y (deg)</span>
          <code class="og-control-value" data-value>0</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-180" max="180" step="1" value="0" />
          <input data-number type="number" min="-180" max="180" step="1" value="0" />
        </div>
      </label>

      <label class="og-control-row" data-control="scale">
        <div class="og-control-header">
          <span class="og-control-label-chip">Scale</span>
          <code class="og-control-value" data-value>1</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.5" max="1.8" step="0.05" value="1" />
          <input data-number type="number" min="0.5" max="1.8" step="0.05" value="1" />
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { Cuboid, OpenGeometry, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let config = null;

      function createConfig() {
        return {
          translation: new Vector3(0, 0, 0),
          rotation: new Vector3(0, 0, 0),
          scale: new Vector3(1, 1, 1),
        };
      }

      let cuboid = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function updatePlacement() {
        if (!cuboid) {
          return;
        }

        cuboid.setPlacement({
          translation: config.translation.clone(),
          rotation: config.rotation.clone(),
          scale: config.scale.clone(),
        });

        console.groupCollapsed("[cuboid-placement] updated");
        console.log("Placement", config);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(6.2, 4.6, 7.1);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, 0);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        config = createConfig();

        cuboid = new Cuboid({
          center: new Vector3(0, 0.85, 0),
          width: 1.9,
          height: 1.7,
          depth: 1.2,
          color: 0x2563eb,
          outlineWidth: 2,
        });
        cuboid.outline = true;
        scene.add(cuboid);

        attachNumberControl("x", (value) => {
          config.translation.x = value;
          updatePlacement();
        });
        attachNumberControl("z", (value) => {
          config.translation.z = value;
          updatePlacement();
        });
        attachNumberControl("rotation", (value) => {
          config.rotation.y = (value * Math.PI) / 180;
          updatePlacement();
        });
        attachNumberControl("scale", (value) => {
          config.scale.set(value, value, value);
          updatePlacement();
        });

        updatePlacement();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Sweep Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simple OpenGeometry sweep example for Three.js." />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Sweep</span>
    </div>

    <aside class="og-controls">
      <h3>Sweep</h3>
      <p class="og-control-summary">
        A sweep uses two arrays: `path` and `profile`. The dark line is the current path.
      </p>

      <label class="og-control-row" data-control="path-4-y">
        <div class="og-control-header">
          <span class="og-control-label-chip">Path 4 Y</span>
          <code class="og-control-value" data-value>2.4</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="1" max="4" step="0.1" value="2.4" />
          <input data-number type="number" min="1" max="4" step="0.1" value="2.4" />
        </div>
      </label>

      <label class="og-control-row" data-control="path-3-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Path 3 X</span>
          <code class="og-control-value" data-value>0.4</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-1.2" max="1.2" step="0.05" value="0.4" />
          <input data-number type="number" min="-1.2" max="1.2" step="0.05" value="0.4" />
        </div>
      </label>

      <label class="og-control-row" data-control="profile-2-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Profile 2 X</span>
          <code class="og-control-value" data-value>0.4</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.2" max="1.4" step="0.05" value="0.4" />
          <input data-number type="number" min="0.2" max="1.4" step="0.05" value="0.4" />
        </div>
      </label>

      <label class="og-control-row" data-control="profile-3-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Profile 3 Z</span>
          <code class="og-control-value" data-value>0.25</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.1" max="1" step="0.05" value="0.25" />
          <input data-number type="number" min="0.1" max="1" step="0.05" value="0.25" />
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Polyline, Sweep, Vector3 } from "opengeometry";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let config = null;

      function createConfig() {
        return {
          path: [
            new Vector3(-1.4, 0, -1.6),
            new Vector3(-0.5, 0.6, -0.5),
            new Vector3(0.4, 1.3, 0.8),
            new Vector3(1.2, 2.4, 2.1),
          ],
          profile: [
            new Vector3(-0.4, 0, -0.25),
            new Vector3(0.4, 0, -0.25),
            new Vector3(0.4, 0, 0.25),
            new Vector3(-0.4, 0, 0.25),
          ],
          capStart: true,
          capEnd: true,
          color: 0x3b82f6,
          outlineWidth: 2,
        };
      }

      let pathGuide = null;
      let sweep = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function updateSweep() {
        if (!pathGuide || !sweep) {
          return;
        }

        pathGuide.setConfig({
          points: config.path.map((point) => point.clone()),
          color: 0x111827,
        });

        sweep.setConfig({
          path: config.path.map((point) => point.clone()),
          profile: config.profile.map((point) => point.clone()),
          capStart: config.capStart,
          capEnd: config.capEnd,
          color: config.color,
          outlineWidth: config.outlineWidth,
        });
        sweep.outline = true;

        console.groupCollapsed("[sweep] updated");
        console.log("Config", config);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(6.8, 5.2, 8.4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.2, 0.5);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        config = createConfig();

        pathGuide = new Polyline({
          points: config.path.map((point) => point.clone()),
          color: 0x111827,
        });
        scene.add(pathGuide);

        sweep = new Sweep({
          path: config.path.map((point) => point.clone()),
          profile: config.profile.map((point) => point.clone()),
          color: config.color,
          capStart: config.capStart,
          capEnd: config.capEnd,
          outlineWidth: config.outlineWidth,
        });
        scene.add(sweep);

        attachNumberControl("path-4-y", (value) => {
          config.path[3].y = value;
          updateSweep();
        });
        attachNumberControl("path-3-x", (value) => {
          config.path[2].x = value;
          updateSweep();
        });
        attachNumberControl("profile-2-x", (value) => {
          config.profile[1].x = value;
          config.profile[2].x = value;
          updateSweep();
        });
        attachNumberControl("profile-3-z", (value) => {
          config.profile[2].z = value;
          config.profile[3].z = value;
          updateSweep();
        });

        updateSweep();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
      <title>OpenGeometry Sweep Example</title>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <meta name="description" content="OpenGeometry Demo" />
      <meta name="author" content="Vishwajeet Mane" />
    </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Sweep</span>
    </div>
    <aside class="og-controls" data-control-panel>
          <h3>Sweep Parameters</h3>
          <label class="og-control-row" data-control-key="height" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Path Height</span>
              <code class="og-control-value" data-control-value>2.3</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.4" max="4" step="0.05" value="2.3" />
              <input data-control-number type="number" min="0.4" max="4" step="0.05" value="2.3" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="spread" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Path Spread</span>
              <code class="og-control-value" data-control-value>1</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.4" max="2" step="0.05" value="1" />
              <input data-control-number type="number" min="0.4" max="2" step="0.05" value="1" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="profileWidth" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Profile Width</span>
              <code class="og-control-value" data-control-value>0.5</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.1" max="1.5" step="0.05" value="0.5" />
              <input data-control-number type="number" min="0.1" max="1.5" step="0.05" value="0.5" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="profileDepth" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Profile Depth</span>
              <code class="og-control-value" data-control-value>0.4</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.1" max="1.5" step="0.05" value="0.4" />
              <input data-control-number type="number" min="0.1" max="1.5" step="0.05" value="0.4" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="capStart" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Cap Start</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Cap Start" checked />
              <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="capEnd" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Cap End</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Cap End" checked />
              <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="outline" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Outline</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
              <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="fatOutlines" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Fat Outlines</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Fat Outlines" />
              <span class="og-control-bool-state" data-control-bool-state>Disabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="outlineWidth" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Outline Width</span>
              <code class="og-control-value" data-control-value>4</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="1" max="12" step="0.5" value="4" />
              <input data-control-number type="number" min="1" max="12" step="0.5" value="4" />
            </div>
          </label>
        </aside>
    <div id="app"></div>
    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Sweep, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let sweep;
      let config = {
        height: 2.3,
        spread: 1.0,
        profileWidth: 0.5,
        profileDepth: 0.4,
        capStart: true,
        capEnd: true,
        outline: true,
        fatOutlines: false,
        outlineWidth: 4,
      };

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function buildPath(height, spread) {
        return [
          new Vector3(-2.0, 0.0, -1.2),
          new Vector3(-1.0, height * 0.25, -0.2 * spread),
          new Vector3(0.2, height * 0.55, 0.7 * spread),
          new Vector3(1.3, height * 0.8, 0.2 * spread),
          new Vector3(2.1, height, -0.9 * spread),
        ];
      }

      function buildProfile(width, depth) {
        return [
          new Vector3(-width * 0.5, 0, -depth * 0.5),
          new Vector3(width * 0.5, 0, -depth * 0.5),
          new Vector3(width * 0.5, 0, depth * 0.5),
          new Vector3(-width * 0.5, 0, depth * 0.5),
        ];
      }

      function setUIControls() {
        const controls = document.querySelectorAll("[data-control-key]");

        controls.forEach((control) => {
          const key = control.getAttribute("data-control-key");
          const type = control.getAttribute("data-control-type");

          if (type === "number") {
            const rangeInput = control.querySelector("[data-control-range]");
            const numberInput = control.querySelector("[data-control-number]");
            const valueDisplay = control.querySelector("[data-control-value]");

            function setNumberValue(value) {
              const numericValue = parseFloat(value);
              if (!Number.isFinite(numericValue)) return;

              config[key] = numericValue;
              rangeInput.value = String(numericValue);
              numberInput.value = String(numericValue);
              valueDisplay.textContent = formatControlNumber(numericValue);
              updateGeometry();
            }

            rangeInput.addEventListener("input", () => setNumberValue(rangeInput.value));
            numberInput.addEventListener("input", () => setNumberValue(numberInput.value));
          }

          if (type === "boolean") {
            const toggleInput = control.querySelector("[data-control-toggle]");
            const boolStateDisplay = control.querySelector("[data-control-bool-state]");

            function setBooleanValue(checked) {
              config[key] = checked;
              toggleInput.checked = checked;
              boolStateDisplay.textContent = checked ? "Enabled" : "Disabled";
              updateGeometry();
            }

            toggleInput.addEventListener("change", () => setBooleanValue(toggleInput.checked));
          }
        });
      }

      function updateGeometry() {
        if (!sweep) return;
        sweep.setConfig({
          path: buildPath(config.height, config.spread),
          profile: buildProfile(config.profileWidth, config.profileDepth),
          color: 0x0ea5e9,
          capStart: config.capStart,
          capEnd: config.capEnd,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth,
        });

        sweep.outline = config.outline;
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );

        camera.position.set(5.5, 4.2, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);
        controls.update();

        scene.add(new THREE.GridHelper(32, 32, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        sweep = new Sweep({
          path: buildPath(config.height, config.spread),
          profile: buildProfile(config.profileWidth, config.profileDepth),
          color: 0x0ea5e9,
          capStart: config.capStart,
          capEnd: config.capEnd,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth,
        });
        sweep.outline = config.outline;
        scene.add(sweep);

        updateGeometry();

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
        setUIControls();
      }

      void main();
    </script>
  </body>
</html>

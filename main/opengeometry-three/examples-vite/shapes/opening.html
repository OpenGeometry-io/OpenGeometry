<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Opening Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simple OpenGeometry opening example for Three.js." />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Opening</span>
    </div>

    <aside class="og-controls">
      <h3>Opening</h3>
      <p class="og-control-summary">
        The gray wall is just a visual reference. The orange object is the opening volume, defined
        by `center`, `width`, `height`, and `depth`.
      </p>

      <label class="og-control-row" data-control="width">
        <div class="og-control-header">
          <span class="og-control-label-chip">Width</span>
          <code class="og-control-value" data-value>1.4</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.5" max="2.6" step="0.05" value="1.4" />
          <input data-number type="number" min="0.5" max="2.6" step="0.05" value="1.4" />
        </div>
      </label>

      <label class="og-control-row" data-control="height">
        <div class="og-control-header">
          <span class="og-control-label-chip">Height</span>
          <code class="og-control-value" data-value>2</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.5" max="2.8" step="0.05" value="2" />
          <input data-number type="number" min="0.5" max="2.8" step="0.05" value="2" />
        </div>
      </label>

      <label class="og-control-row" data-control="depth">
        <div class="og-control-header">
          <span class="og-control-label-chip">Depth</span>
          <code class="og-control-value" data-value>0.45</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.15" max="0.9" step="0.05" value="0.45" />
          <input data-number type="number" min="0.15" max="0.9" step="0.05" value="0.45" />
        </div>
      </label>

      <label class="og-control-row" data-control="center-y">
        <div class="og-control-header">
          <span class="og-control-label-chip">Center Y</span>
          <code class="og-control-value" data-value>1.35</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.5" max="2.4" step="0.05" value="1.35" />
          <input data-number type="number" min="0.5" max="2.4" step="0.05" value="1.35" />
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { Cuboid, Opening, OpenGeometry, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let config = null;

      function createConfig() {
        return {
          center: new Vector3(0, 1.35, 0),
          width: 1.4,
          height: 2,
          depth: 0.45,
          color: 0xf97316,
          outlineWidth: 2,
        };
      }

      let wall = null;
      let opening = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function updateOpening() {
        if (!opening) {
          return;
        }

        opening.setConfig({
          center: config.center.clone(),
          width: config.width,
          height: config.height,
          depth: config.depth,
          color: config.color,
          outlineWidth: config.outlineWidth,
        });
        opening.outline = true;

        console.groupCollapsed("[opening] updated");
        console.log("Config", config);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(6.2, 4.7, 7.4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.6, 0);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.85));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        config = createConfig();

        wall = new Cuboid({
          center: new Vector3(0, 1.6, 0),
          width: 4.4,
          height: 3.2,
          depth: 0.32,
          color: 0xcbd5e1,
        });
        wall.outline = true;
        scene.add(wall);

        opening = new Opening({
          center: config.center.clone(),
          width: config.width,
          height: config.height,
          depth: config.depth,
          color: config.color,
          outlineWidth: config.outlineWidth,
        });
        scene.add(opening);

        attachNumberControl("width", (value) => {
          config.width = value;
          updateOpening();
        });
        attachNumberControl("height", (value) => {
          config.height = value;
          updateOpening();
        });
        attachNumberControl("depth", (value) => {
          config.depth = value;
          updateOpening();
        });
        attachNumberControl("center-y", (value) => {
          config.center.y = value;
          updateOpening();
        });

        updateOpening();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Curve Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simple OpenGeometry curve example for Three.js." />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Curve</span>
    </div>

    <aside class="og-controls">
      <h3>Curve</h3>
      <p class="og-control-summary">
        The curve config is an array of control points. This example exposes the middle two points
        directly so the page still matches the real API.
      </p>

      <label class="og-control-row" data-control="cp2-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 2 Z</span>
          <code class="og-control-value" data-value>0.8</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-1.2" max="1.5" step="0.05" value="0.8" />
          <input data-number type="number" min="-1.2" max="1.5" step="0.05" value="0.8" />
        </div>
      </label>

      <label class="og-control-row" data-control="cp2-y">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 2 Y</span>
          <code class="og-control-value" data-value>0</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-1.5" max="1.5" step="0.05" value="0" />
          <input data-number type="number" min="-1.5" max="1.5" step="0.05" value="0" />
        </div>
      </label>

      <label class="og-control-row" data-control="cp3-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 3 Z</span>
          <code class="og-control-value" data-value>0.55</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-1.2" max="1.5" step="0.05" value="0.55" />
          <input data-number type="number" min="-1.2" max="1.5" step="0.05" value="0.55" />
        </div>
      </label>

      <label class="og-control-row" data-control="cp3-y">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 3 Y</span>
          <code class="og-control-value" data-value>0</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-1.5" max="1.5" step="0.05" value="0" />
          <input data-number type="number" min="-1.5" max="1.5" step="0.05" value="0" />
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { Curve, OpenGeometry, Vector3 } from "opengeometry";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let config = null;

      function createConfig() {
        return {
          controlPoints: [
            new Vector3(-2.5, 0, -1.5),
            new Vector3(-0.9, 0, 0.8),
            new Vector3(0.8, 0, 0.55),
            new Vector3(2.4, 0, 1.4),
          ],
          color: 0x16a34a,
        };
      }

      let curve = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function updateCurve() {
        if (!curve) {
          return;
        }

        curve.setConfig({
          controlPoints: config.controlPoints.map((point) => point.clone()),
          color: config.color,
        });

        console.groupCollapsed("[curve] updated");
        console.log("Config", config);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(5.8, 4.1, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.2, 0);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        config = createConfig();

        curve = new Curve({
          controlPoints: config.controlPoints.map((point) => point.clone()),
          color: config.color,
        });
        scene.add(curve);

        attachNumberControl("cp2-z", (value) => {
          config.controlPoints[1].z = value;
          updateCurve();
        });
        attachNumberControl("cp2-y", (value) => {
          config.controlPoints[1].y = value;
          updateCurve();
        });
        attachNumberControl("cp3-z", (value) => {
          config.controlPoints[2].z = value;
          updateCurve();
        });
        attachNumberControl("cp3-y", (value) => {
          config.controlPoints[2].y = value;
          updateCurve();
        });

        updateCurve();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

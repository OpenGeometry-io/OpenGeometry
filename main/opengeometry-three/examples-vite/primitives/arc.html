<!DOCTYPE html>
<html lang="en">
  <head>
      <title>OpenGeometry Arc Example</title>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <meta name="description" content="OpenGeometry Demo" />
      <meta name="author" content="Vishwajeet Mane" />
    </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Arc</span>
    </div>
    <aside class="og-controls" data-control-panel>
          <h3>Arc Parameters</h3>
          <label class="og-control-row" data-control-key="radius" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Radius</span>
              <code class="og-control-value" data-control-value>1.2</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.2" />
              <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.2" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="startDeg" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Start (deg)</span>
              <code class="og-control-value" data-control-value>0</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0" max="360" step="1" value="0" />
              <input data-control-number type="number" min="0" max="360" step="1" value="0" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="endDeg" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">End (deg)</span>
              <code class="og-control-value" data-control-value>300</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="1" max="360" step="1" value="300" />
              <input data-control-number type="number" min="1" max="360" step="1" value="300" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="segments" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Segments</span>
              <code class="og-control-value" data-control-value>48</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="4" max="128" step="1" value="48" />
              <input data-control-number type="number" min="4" max="128" step="1" value="48" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="centerX" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Center X</span>
              <code class="og-control-value" data-control-value>0</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="-3" max="3" step="0.1" value="0" />
              <input data-control-number type="number" min="-3" max="3" step="0.1" value="0" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="centerZ" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Center Z</span>
              <code class="og-control-value" data-control-value>0</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="-3" max="3" step="0.1" value="0" />
              <input data-control-number type="number" min="-3" max="3" step="0.1" value="0" />
            </div>
          </label>
        </aside>
    <div id="app"></div>
    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Arc, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let arc;
      let config = {
        radius: 1.2,
        startDeg: 0,
        endDeg: 300,
        segments: 48,
        centerX: 0,
        centerZ: 0,
      };

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function setUIControls() {
        const controls = document.querySelectorAll("[data-control-key]");

        controls.forEach((control) => {
          const key = control.getAttribute("data-control-key");
          const type = control.getAttribute("data-control-type");

          if (type === "number") {
            const rangeInput = control.querySelector("[data-control-range]");
            const numberInput = control.querySelector("[data-control-number]");
            const valueDisplay = control.querySelector("[data-control-value]");

            function setNumberValue(value) {
              const numericValue = parseFloat(value);
              if (!Number.isFinite(numericValue)) return;

              config[key] = numericValue;
              rangeInput.value = String(numericValue);
              numberInput.value = String(numericValue);
              valueDisplay.textContent = formatControlNumber(numericValue);
              updateGeometry();
            }

            rangeInput.addEventListener("input", () => setNumberValue(rangeInput.value));
            numberInput.addEventListener("input", () => setNumberValue(numberInput.value));
          }

          if (type === "boolean") {
            const toggleInput = control.querySelector("[data-control-toggle]");
            const boolStateDisplay = control.querySelector("[data-control-bool-state]");

            function setBooleanValue(checked) {
              config[key] = checked;
              toggleInput.checked = checked;
              boolStateDisplay.textContent = checked ? "Enabled" : "Disabled";
              updateGeometry();
            }

            toggleInput.addEventListener("change", () => setBooleanValue(toggleInput.checked));
          }
        });
      }

      function updateGeometry() {
        if (!arc) return;
        const start = (config.startDeg * Math.PI) / 180;
        const end = (config.endDeg * Math.PI) / 180;

        arc.setConfig({
          center: new Vector3(config.centerX, 0, config.centerZ),
          radius: config.radius,
          startAngle: Math.min(start, end),
          endAngle: Math.max(start, end),
          segments: Math.floor(config.segments),
          color: 0xdc2626,
        });
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );

        camera.position.set(5.5, 4.2, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);
        controls.update();

        scene.add(new THREE.GridHelper(32, 32, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        arc = new Arc({
          center: new Vector3(config.centerX, 0, config.centerZ),
          radius: config.radius,
          startAngle: (config.startDeg * Math.PI) / 180,
          endAngle: (config.endDeg * Math.PI) / 180,
          segments: Math.floor(config.segments),
          color: 0xdc2626,
        });
        scene.add(arc);

        updateGeometry();

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
        setUIControls();
      }

      void main();
    </script>
  </body>
</html>

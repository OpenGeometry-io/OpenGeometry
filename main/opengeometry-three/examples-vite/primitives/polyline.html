<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Polyline Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simple OpenGeometry polyline example for Three.js." />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Polyline</span>
    </div>

    <aside class="og-controls">
      <h3>Polyline</h3>
      <p class="og-control-summary">
        A polyline is just an ordered list of points. This example edits the inner points directly.
      </p>

      <label class="og-control-row" data-control="p2-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 2 X</span>
          <code class="og-control-value" data-value>-1.2</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-3" max="3" step="0.05" value="-1.2" />
          <input data-number type="number" min="-3" max="3" step="0.05" value="-1.2" />
        </div>
      </label>

      <label class="og-control-row" data-control="p2-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 2 Z</span>
          <code class="og-control-value" data-value>-0.9</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-3" max="3" step="0.05" value="-0.9" />
          <input data-number type="number" min="-3" max="3" step="0.05" value="-0.9" />
        </div>
      </label>

      <label class="og-control-row" data-control="p3-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 3 X</span>
          <code class="og-control-value" data-value>0.3</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-3" max="3" step="0.05" value="0.3" />
          <input data-number type="number" min="-3" max="3" step="0.05" value="0.3" />
        </div>
      </label>

      <label class="og-control-row" data-control="p3-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 3 Z</span>
          <code class="og-control-value" data-value>0.1</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-3" max="3" step="0.05" value="0.1" />
          <input data-number type="number" min="-3" max="3" step="0.05" value="0.1" />
        </div>
      </label>

      <label class="og-control-row" data-control="fat-lines">
        <div class="og-control-header">
          <span class="og-control-label-chip">Fat Lines</span>
        </div>
        <div class="og-control-bool">
          <input data-toggle type="checkbox" class="og-toggle" aria-label="Fat lines" />
          <span class="og-control-bool-state" data-state>Disabled</span>
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Polyline, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let config = null;

      function createConfig() {
        return {
          points: [
            new Vector3(-2.5, 0, -1.7),
            new Vector3(-1.2, 0, -0.9),
            new Vector3(0.3, 0, 0.1),
            new Vector3(1.1, 0, 0.9),
            new Vector3(2.4, 0, 1.7),
          ],
          color: 0x0f172a,
          fatLines: false,
          width: 2,
        };
      }

      let polyline = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function attachBooleanControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const toggle = row?.querySelector("[data-toggle]");
        const state = row?.querySelector("[data-state]");

        if (!row || !toggle || !state) {
          throw new Error(`Missing boolean control: ${name}`);
        }

        const commit = (checked) => {
          toggle.checked = checked;
          state.textContent = checked ? "Enabled" : "Disabled";
          onChange(checked);
        };

        toggle.addEventListener("change", () => commit(toggle.checked));
        commit(toggle.checked);
      }

      function updatePolyline() {
        if (!polyline) {
          return;
        }

        config.width = config.fatLines ? 10 : 2;
        polyline.setConfig({
          points: config.points.map((point) => point.clone()),
          color: config.color,
          fatLines: config.fatLines,
          width: config.width,
        });

        console.groupCollapsed("[polyline] updated");
        console.log("Config", config);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(6.2, 4.2, 6.7);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.2, 0);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        config = createConfig();

        polyline = new Polyline({
          points: config.points.map((point) => point.clone()),
          color: config.color,
        });
        scene.add(polyline);

        attachNumberControl("p2-x", (value) => {
          config.points[1].x = value;
          updatePolyline();
        });
        attachNumberControl("p2-z", (value) => {
          config.points[1].z = value;
          updatePolyline();
        });
        attachNumberControl("p3-x", (value) => {
          config.points[2].x = value;
          updatePolyline();
        });
        attachNumberControl("p3-z", (value) => {
          config.points[2].z = value;
          updatePolyline();
        });
        attachBooleanControl("fat-lines", (value) => {
          config.fatLines = value;
          updatePolyline();
        });

        updatePolyline();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

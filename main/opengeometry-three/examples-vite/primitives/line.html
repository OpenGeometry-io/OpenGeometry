<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Line Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simple OpenGeometry line example for Three.js." />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Line</span>
    </div>

    <aside class="og-controls">
      <h3>Line</h3>
      <p class="og-control-summary">
        This page keeps the line example aligned with the real API: you are editing the `start`
        and `end` points directly.
      </p>

      <label class="og-control-row" data-control="start-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Start X</span>
          <code class="og-control-value" data-value>-2</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-4" max="4" step="0.1" value="-2" />
          <input data-number type="number" min="-4" max="4" step="0.1" value="-2" />
        </div>
      </label>

      <label class="og-control-row" data-control="start-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">Start Z</span>
          <code class="og-control-value" data-value>-0.8</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-4" max="4" step="0.1" value="-0.8" />
          <input data-number type="number" min="-4" max="4" step="0.1" value="-0.8" />
        </div>
      </label>

      <label class="og-control-row" data-control="end-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">End X</span>
          <code class="og-control-value" data-value>2</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-4" max="4" step="0.1" value="2" />
          <input data-number type="number" min="-4" max="4" step="0.1" value="2" />
        </div>
      </label>

      <label class="og-control-row" data-control="end-z">
        <div class="og-control-header">
          <span class="og-control-label-chip">End Z</span>
          <code class="og-control-value" data-value>0.8</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-4" max="4" step="0.1" value="0.8" />
          <input data-number type="number" min="-4" max="4" step="0.1" value="0.8" />
        </div>
      </label>

      <label class="og-control-row" data-control="fat-lines">
        <div class="og-control-header">
          <span class="og-control-label-chip">Fat Lines</span>
        </div>
        <div class="og-control-bool">
          <input data-toggle type="checkbox" class="og-toggle" aria-label="Fat lines" />
          <span class="og-control-bool-state" data-state>Disabled</span>
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { Line, OpenGeometry, Vector3 } from "opengeometry";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let config = null;

      function createConfig() {
        return {
          start: new Vector3(-2, 0, -0.8),
          end: new Vector3(2, 0, 0.8),
          color: 0x111827,
          fatLines: false,
          width: 2,
        };
      }

      let line = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function attachBooleanControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const toggle = row?.querySelector("[data-toggle]");
        const state = row?.querySelector("[data-state]");

        if (!row || !toggle || !state) {
          throw new Error(`Missing boolean control: ${name}`);
        }

        const commit = (checked) => {
          toggle.checked = checked;
          state.textContent = checked ? "Enabled" : "Disabled";
          onChange(checked);
        };

        toggle.addEventListener("change", () => commit(toggle.checked));
        commit(toggle.checked);
      }

      function updateLine() {
        if (!line) {
          return;
        }

        config.width = config.fatLines ? 10 : 2;

        line.setConfig({
          start: config.start.clone(),
          end: config.end.clone(),
          color: config.color,
          fatLines: config.fatLines,
          width: config.width,
        });

        console.groupCollapsed("[line] updated");
        console.log("Config", config);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(5.5, 4, 6.2);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.2, 0);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });
        config = createConfig();

        line = new Line({
          start: config.start.clone(),
          end: config.end.clone(),
          color: config.color,
        });
        scene.add(line);

        attachNumberControl("start-x", (value) => {
          config.start.x = value;
          updateLine();
        });
        attachNumberControl("start-z", (value) => {
          config.start.z = value;
          updateLine();
        });
        attachNumberControl("end-x", (value) => {
          config.end.x = value;
          updateLine();
        });
        attachNumberControl("end-z", (value) => {
          config.end.z = value;
          updateLine();
        });
        attachBooleanControl("fat-lines", (value) => {
          config.fatLines = value;
          updateLine();
        });

        updateLine();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Rectangle Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simple OpenGeometry rectangle example for Three.js." />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Rectangle</span>
    </div>

    <aside class="og-controls">
      <h3>Rectangle</h3>
      <p class="og-control-summary">
        A rectangle is just a simple closed profile. This page keeps the example focused on width,
        breadth, and line style.
      </p>

      <label class="og-control-row" data-control="width">
        <div class="og-control-header">
          <span class="og-control-label-chip">Width</span>
          <code class="og-control-value" data-value>3</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.5" max="6" step="0.1" value="3" />
          <input data-number type="number" min="0.5" max="6" step="0.1" value="3" />
        </div>
      </label>

      <label class="og-control-row" data-control="breadth">
        <div class="og-control-header">
          <span class="og-control-label-chip">Breadth</span>
          <code class="og-control-value" data-value>2</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.5" max="5" step="0.1" value="2" />
          <input data-number type="number" min="0.5" max="5" step="0.1" value="2" />
        </div>
      </label>

      <label class="og-control-row" data-control="fat-lines">
        <div class="og-control-header">
          <span class="og-control-label-chip">Fat Lines</span>
        </div>
        <div class="og-control-bool">
          <input data-toggle type="checkbox" class="og-toggle" aria-label="Fat lines" />
          <span class="og-control-bool-state" data-state>Disabled</span>
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Rectangle, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      const config = {
        width: 3,
        breadth: 2,
        fatLines: false,
      };

      let rectangle = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function attachBooleanControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const toggle = row?.querySelector("[data-toggle]");
        const state = row?.querySelector("[data-state]");

        if (!row || !toggle || !state) {
          throw new Error(`Missing boolean control: ${name}`);
        }

        const commit = (checked) => {
          toggle.checked = checked;
          state.textContent = checked ? "Enabled" : "Disabled";
          onChange(checked);
        };

        toggle.addEventListener("change", () => commit(toggle.checked));
        commit(toggle.checked);
      }

      function updateRectangle() {
        if (!rectangle) {
          return;
        }

        rectangle.setConfig({
          center: new Vector3(0, 0, 0),
          width: config.width,
          breadth: config.breadth,
          color: 0x7c3aed,
          fatLines: config.fatLines,
          lineWidth: config.fatLines ? 10 : 2,
        });

        console.groupCollapsed("[rectangle] updated");
        console.log("Config", { ...config });
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(5.6, 4.2, 6.4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.2, 0);
        controls.update();

        scene.add(new THREE.GridHelper(20, 20, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        rectangle = new Rectangle({
          center: new Vector3(0, 0, 0),
          width: config.width,
          breadth: config.breadth,
          color: 0x7c3aed,
        });
        scene.add(rectangle);

        attachNumberControl("width", (value) => {
          config.width = value;
          updateRectangle();
        });
        attachNumberControl("breadth", (value) => {
          config.breadth = value;
          updateRectangle();
        });
        attachBooleanControl("fat-lines", (value) => {
          config.fatLines = value;
          updateRectangle();
        });

        updateRectangle();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Boolean Operations Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Kernel-backed solid boolean operations for browser CAD and AEC workflows with OpenGeometry."
    />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Boolean Operations</span>
    </div>

    <aside class="og-controls">
      <h3>Solid Boolean</h3>
      <p class="og-control-summary">
        This page shows the core solid boolean workflow for browser CAD tools. The source solids are
        on the left and the rebuilt boolean result is on the right.
      </p>

      <label class="og-control-row" data-control="operation">
        <div class="og-control-header">
          <span class="og-control-label-chip">Operation</span>
        </div>
        <select class="og-control-select" data-select aria-label="Operation">
          <option value="union">Union</option>
          <option value="intersection">Intersection</option>
          <option value="subtraction" selected>Subtraction</option>
        </select>
      </label>

      <label class="og-control-row" data-control="offset-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Sphere Offset X</span>
          <code class="og-control-value" data-value>0.35</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-1.2" max="1.2" step="0.05" value="0.35" />
          <input data-number type="number" min="-1.2" max="1.2" step="0.05" value="0.35" />
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import {
        booleanIntersection,
        booleanSubtraction,
        booleanUnion,
        Cuboid,
        OpenGeometry,
        Sphere,
        Vector3,
      } from "opengeometry";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      const config = {
        operation: "subtraction",
        offsetX: 0.35,
      };

      let scene = null;
      let currentGroup = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function attachSelectControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const select = row?.querySelector("[data-select]");

        if (!row || !select) {
          throw new Error(`Missing select control: ${name}`);
        }

        const commit = (value) => {
          select.value = value;
          onChange(value);
        };

        select.addEventListener("change", () => commit(select.value));
        commit(select.value);
      }

      function disposeObject(object) {
        object.traverse((child) => {
          child.geometry?.dispose?.();
          if (Array.isArray(child.material)) {
            child.material.forEach((material) => material?.dispose?.());
            return;
          }
          child.material?.dispose?.();
        });
      }

      function getExecutor() {
        switch (config.operation) {
          case "union":
            return booleanUnion;
          case "intersection":
            return booleanIntersection;
          default:
            return booleanSubtraction;
        }
      }

      function rebuildExample() {
        if (!scene) {
          return;
        }

        if (currentGroup) {
          scene.remove(currentGroup);
          disposeObject(currentGroup);
        }

        const cuboid = new Cuboid({
          center: new Vector3(0, 0.75, 0),
          width: 2.4,
          height: 1.5,
          depth: 1.6,
          color: 0x60a5fa,
          outlineWidth: 2,
        });
        cuboid.outline = true;

        const sphere = new Sphere({
          center: new Vector3(0.55, 0.82, 0.2),
          radius: 0.82,
          widthSegments: 28,
          heightSegments: 18,
          color: 0xf97316,
          outlineWidth: 2,
        });
        sphere.outline = true;
        sphere.setPlacement({
          translation: new Vector3(config.offsetX, 0, 0),
        });

        const result = getExecutor()(cuboid, sphere, {
          outline: true,
          outlineWidth: 2,
        });

        cuboid.position.x = -4;
        sphere.position.x = -4;
        result.position.x = 4;

        currentGroup = new THREE.Group();
        currentGroup.add(cuboid);
        currentGroup.add(sphere);
        currentGroup.add(result);
        scene.add(currentGroup);

        console.groupCollapsed("[boolean-solid] rebuilt");
        console.log("Config", { ...config });
        console.log("Report", result.report);
        console.groupEnd();
      }

      async function main() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(10.5, 6.4, 11.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.2, 0);
        controls.update();

        scene.add(new THREE.GridHelper(30, 30, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.82));

        const light = new THREE.DirectionalLight(0xffffff, 1.15);
        light.position.set(7, 9, 5);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        attachSelectControl("operation", (value) => {
          config.operation = value;
          rebuildExample();
        });
        attachNumberControl("offset-x", (value) => {
          config.offsetX = value;
          rebuildExample();
        });

        rebuildExample();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

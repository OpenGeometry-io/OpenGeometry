<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Offset Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OpenGeometry Demo" />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body>
    <aside class="og-badge">
      <div class="og-badge-top">
        <div class="og-badge-icon-wrap"><strong>OG</strong></div>
        <p class="og-badge-status">ready</p>
      </div>
      <div class="og-badge-meta">
        <p class="og-badge-kicker">OPEN GEOMETRY • OPERATIONS</p>
        <strong class="og-badge-title">Offset</strong>
        <span class="og-badge-desc">Offset generation with acute-corner and bevel parameters.</span>
      </div>
      <div class="og-badge-chip-row">
          <span class="og-chip og-chip-accent">Offset</span>
          <span class="og-chip og-chip-accent">Bevel</span>
      </div>
      <div class="og-badge-footer">
        <a class="og-badge-link" href="../index.html">Back to Examples</a>
      </div>
    </aside>
    <aside class="og-controls" data-control-panel>
      <h3>Offset Parameters</h3>
      <label class="og-control-row" data-control-key="offset" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Offset</span>
          <code class="og-control-value" data-control-value>0.45</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="-1.2" max="1.2" step="0.05" value="0.45" />
          <input data-control-number type="number" min="-1.2" max="1.2" step="0.05" value="0.45" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="acute" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Acute Threshold</span>
          <code class="og-control-value" data-control-value>90</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="1" max="179" step="1" value="90" />
          <input data-control-number type="number" min="1" max="179" step="1" value="90" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="turn" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Path Turn</span>
          <code class="og-control-value" data-control-value>0</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="-0.8" max="0.8" step="0.05" value="0" />
          <input data-control-number type="number" min="-0.8" max="0.8" step="0.05" value="0" />
        </div>
      </label>
      <label class="og-control-row" data-control-key="bevel" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Bevel</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Bevel" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>
    </aside>
    <div id="app"></div>
    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { AXISMODE, OpenGeometry, Polyline, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function disposeMaterial(material) {
        if (!material) {
          return;
        }

        if (Array.isArray(material)) {
          material.forEach((entry) => entry && entry.dispose && entry.dispose());
          return;
        }

        if (material.dispose) {
          material.dispose();
        }
      }

      function disposeObject3D(object) {
        object.traverse((node) => {
          if (node.geometry && node.geometry.dispose) {
            node.geometry.dispose();
          }
          disposeMaterial(node.material);
        });
      }

      function replaceSceneObject(scene, previous, next) {
        if (previous) {
          previous.parent && previous.parent.remove(previous);
          disposeObject3D(previous);
        }

        scene.add(next);
        return next;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function bindControls(definitions, onChange) {
        const panel = document.querySelector("[data-control-panel]");
        if (!panel) {
          throw new Error("Missing control panel");
        }

        const state = {};
        const emitChange = () => {
          onChange({ ...state });
        };

        definitions.forEach((definition) => {
          state[definition.key] = definition.value;
          const row = panel.querySelector(`[data-control-key="${definition.key}"]`);
          if (!row) {
            throw new Error(`Missing control row for ${definition.key}`);
          }

          if (definition.type === "number") {
            const valueLabel = row.querySelector("[data-control-value]");
            const rangeInput = row.querySelector("[data-control-range]");
            const numberInput = row.querySelector("[data-control-number]");
            if (!valueLabel || !rangeInput || !numberInput) {
              throw new Error(`Missing number controls for ${definition.key}`);
            }

            const updateValue = (raw) => {
              const next = clamp(raw, definition.min, definition.max);
              state[definition.key] = next;
              rangeInput.value = String(next);
              numberInput.value = String(next);
              valueLabel.textContent = formatControlNumber(next);
              emitChange();
            };

            rangeInput.addEventListener("input", () => updateValue(Number(rangeInput.value)));
            numberInput.addEventListener("change", () => updateValue(Number(numberInput.value)));
            valueLabel.textContent = formatControlNumber(definition.value);
            return;
          }

          if (definition.type === "boolean") {
            const toggle = row.querySelector("[data-control-toggle]");
            const boolLabel = row.querySelector("[data-control-bool-state]");
            if (!toggle || !boolLabel) {
              throw new Error(`Missing boolean controls for ${definition.key}`);
            }

            toggle.checked = Boolean(definition.value);
            boolLabel.textContent = toggle.checked ? "Enabled" : "Disabled";
            toggle.addEventListener("change", () => {
              state[definition.key] = toggle.checked;
              boolLabel.textContent = toggle.checked ? "Enabled" : "Disabled";
              emitChange();
            });
            return;
          }

          const select = row.querySelector("[data-control-select]");
          if (!select) {
            throw new Error(`Missing select control for ${definition.key}`);
          }
          select.value = String(definition.value);
          select.addEventListener("change", () => {
            state[definition.key] = select.value;
            emitChange();
          });
        });

        emitChange();
      }

      async function createExampleScene(meta, options) {
        const settings = options || {};
        document.body.classList.add("og-example-page");
        document.title = meta.title + " | OpenGeometry";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(settings.background || 0xf6f1eb);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );

        const cameraPosition = settings.cameraPosition || [5.5, 4.2, 6.5];
        camera.position.set(cameraPosition[0], cameraPosition[1], cameraPosition[2]);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        const target = settings.target || [0, 0.8, 0];
        controls.target.set(target[0], target[1], target[2]);
        controls.update();

        scene.add(
          new THREE.GridHelper(
            settings.gridSize || 32,
            settings.gridDivisions || 32,
            settings.gridPrimary || 0xd88b63,
            settings.gridSecondary || 0xe7d4ca
          )
        );

        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl, axisMode: AXISMODE.ZFRONT });

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
        return { scene, camera, renderer, controls };
      }

      async function main() {
        const meta = {
        "slug": "operations/offset",
        "category": "operations",
        "title": "Offset",
        "description": "Offset generation with acute-corner and bevel parameters.",
        "statusLabel": "ready",
        "chips": [
          "Offset",
          "Bevel"
        ],
        "footerText": "Offset, Bevel"
      };

        function createBasePolyline(turn) {
          return [
            new Vector3(-2.4, 0, -1.8),
            new Vector3(-0.7, 0, -0.6),
            new Vector3(-0.2 + turn, 0, 0.7),
            new Vector3(1.9, 0, 1.6)
          ];
        }

        const { scene } = await createExampleScene(meta);
        let current = null;

        bindControls([
          { type: "number", key: "offset", label: "Offset", min: -1.2, max: 1.2, step: 0.05, value: 0.45 },
          { type: "number", key: "acute", label: "Acute Threshold", min: 1, max: 179, step: 1, value: 90 },
          { type: "number", key: "turn", label: "Path Turn", min: -0.8, max: 0.8, step: 0.05, value: 0.0 },
          { type: "boolean", key: "bevel", label: "Bevel", value: true }
        ], (state) => {
          const base = new Polyline({
            points: createBasePolyline(state.turn),
            color: 0x1f2937
          });

          const offsetData = base.getOffset(state.offset, state.acute, state.bevel);
          const offset = new Polyline({
            points: offsetData.points,
            color: 0xdc2626
          });

          const group = new THREE.Group();
          group.add(base);
          group.add(offset);

          current = replaceSceneObject(scene, current, group);
        });
      }

      void main();
    </script>
  </body>
</html>

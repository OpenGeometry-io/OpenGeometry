<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Sweep Path and Profile Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Simple OpenGeometry sweep path and profile example for Three.js."
    />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Sweep Path + Profile</span>
    </div>

    <aside class="og-controls">
      <h3>Sweep Inputs</h3>
      <p class="og-control-summary">
        This example keeps the path and profile visible in code. The line is the path, and the
        solid comes from sweeping the profile along it.
      </p>

      <label class="og-control-row" data-control="path-mid-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Path Point 3 X</span>
          <code class="og-control-value" data-value>0.4</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-1.5" max="1.5" step="0.05" value="0.4" />
          <input data-number type="number" min="-1.5" max="1.5" step="0.05" value="0.4" />
        </div>
      </label>

      <label class="og-control-row" data-control="path-end-y">
        <div class="og-control-header">
          <span class="og-control-label-chip">Path End Y</span>
          <code class="og-control-value" data-value>2.4</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="1" max="4" step="0.1" value="2.4" />
          <input data-number type="number" min="1" max="4" step="0.1" value="2.4" />
        </div>
      </label>

      <label class="og-control-row" data-control="profile-width">
        <div class="og-control-header">
          <span class="og-control-label-chip">Profile Width</span>
          <code class="og-control-value" data-value>0.8</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.3" max="1.8" step="0.05" value="0.8" />
          <input data-number type="number" min="0.3" max="1.8" step="0.05" value="0.8" />
        </div>
      </label>

      <label class="og-control-row" data-control="profile-depth">
        <div class="og-control-header">
          <span class="og-control-label-chip">Profile Depth</span>
          <code class="og-control-value" data-value>0.5</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.2" max="1.4" step="0.05" value="0.5" />
          <input data-number type="number" min="0.2" max="1.4" step="0.05" value="0.5" />
        </div>
      </label>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Polyline, Sweep, Vector3 } from "opengeometry";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      const config = {
        pathMidX: 0.4,
        pathEndY: 2.4,
        profileWidth: 0.8,
        profileDepth: 0.5,
      };

      let pathGuide = null;
      let sweep = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function buildPath() {
        return [
          new Vector3(-1.4, 0, -1.6),
          new Vector3(-0.5, 0.6, -0.5),
          new Vector3(config.pathMidX, 1.3, 0.8),
          new Vector3(1.2, config.pathEndY, 2.1),
        ];
      }

      function buildProfile() {
        const halfWidth = config.profileWidth * 0.5;
        const halfDepth = config.profileDepth * 0.5;
        return [
          new Vector3(-halfWidth, 0, -halfDepth),
          new Vector3(halfWidth, 0, -halfDepth),
          new Vector3(halfWidth, 0, halfDepth),
          new Vector3(-halfWidth, 0, halfDepth),
        ];
      }

      function updateSweep() {
        if (!pathGuide || !sweep) {
          return;
        }

        const path = buildPath();
        const profile = buildProfile();

        pathGuide.setConfig({
          points: path,
          color: 0x111827,
        });
        sweep.setConfig({
          path,
          profile,
          capStart: true,
          capEnd: true,
          color: 0x3b82f6,
          outlineWidth: 2,
        });
        sweep.outline = true;

        console.groupCollapsed("[sweep-path-profile] updated");
        console.log("Config", { ...config });
        console.log("Path", path);
        console.log("Profile", profile);
        console.groupEnd();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(6.8, 5.2, 8.4);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.2, 0.5);
        controls.update();

        scene.add(new THREE.GridHelper(24, 24, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.82));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        pathGuide = new Polyline({
          points: buildPath(),
          color: 0x111827,
        });
        sweep = new Sweep({
          path: buildPath(),
          profile: buildProfile(),
          capStart: true,
          capEnd: true,
          color: 0x3b82f6,
          outlineWidth: 2,
        });

        scene.add(pathGuide);
        scene.add(sweep);

        attachNumberControl("path-mid-x", (value) => {
          config.pathMidX = value;
          updateSweep();
        });
        attachNumberControl("path-end-y", (value) => {
          config.pathEndY = value;
          updateSweep();
        });
        attachNumberControl("profile-width", (value) => {
          config.profileWidth = value;
          updateSweep();
        });
        attachNumberControl("profile-depth", (value) => {
          config.profileDepth = value;
          updateSweep();
        });

        updateSweep();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

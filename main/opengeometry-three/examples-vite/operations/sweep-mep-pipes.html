<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Sweep MEP Pipes Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OpenGeometry sweep MEP pipes example" />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Sweep MEP Pipes</span>
    </div>

    <aside class="og-controls" data-control-panel>
      <h3>MEP Sweep Benchmark Parameters</h3>
      <p class="og-control-summary">
        Red pipes use arc profiles. Blue pipes use rectangle profiles. Counts, samples, and export
        reports are logged to the console.
      </p>

      <label class="og-control-row" data-control-key="runCount" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Run Count</span>
          <code class="og-control-value" data-control-value>10</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="2" max="20" step="1" value="10" />
          <input data-control-number type="number" min="2" max="20" step="1" value="10" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="branchCount" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Branches / Run</span>
          <code class="og-control-value" data-control-value>12</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="2" max="28" step="1" value="12" />
          <input data-control-number type="number" min="2" max="28" step="1" value="12" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="laneSpacing" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Run Spacing</span>
          <code class="og-control-value" data-control-value>3.2</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="2" max="6" step="0.1" value="3.2" />
          <input data-control-number type="number" min="2" max="6" step="0.1" value="3.2" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="runLength" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Run Length</span>
          <code class="og-control-value" data-control-value>26</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="8" max="42" step="1" value="26" />
          <input data-control-number type="number" min="8" max="42" step="1" value="26" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="mainElevation" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Main Elevation</span>
          <code class="og-control-value" data-control-value>2.8</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="1" max="5" step="0.05" value="2.8" />
          <input data-control-number type="number" min="1" max="5" step="0.05" value="2.8" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="branchDrop" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Branch Drop</span>
          <code class="og-control-value" data-control-value>1.1</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.3" max="2.4" step="0.05" value="1.1" />
          <input data-control-number type="number" min="0.3" max="2.4" step="0.05" value="1.1" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="branchReach" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Branch Reach</span>
          <code class="og-control-value" data-control-value>1.45</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.5" max="3" step="0.05" value="1.45" />
          <input data-control-number type="number" min="0.5" max="3" step="0.05" value="1.45" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="profileScale" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Profile Scale</span>
          <code class="og-control-value" data-control-value>1</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="0.5" max="2" step="0.05" value="1" />
          <input data-control-number type="number" min="0.5" max="2" step="0.05" value="1" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="wallHeight" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Wall Height</span>
          <code class="og-control-value" data-control-value>3.4</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="1.5" max="6" step="0.1" value="3.4" />
          <input data-control-number type="number" min="1.5" max="6" step="0.1" value="3.4" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="showWalls" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Show Cuboid Walls</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Show Cuboid Walls" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control-key="outline" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Outline</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control-key="fatOutlines" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Fat Outlines</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Fat Outlines" />
          <span class="og-control-bool-state" data-control-bool-state>Disabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control-key="outlineWidth" data-control-type="number">
        <div class="og-control-header">
          <span class="og-control-label-chip">Outline Width</span>
          <code class="og-control-value" data-control-value>4</code>
        </div>
        <div class="og-control-range">
          <input data-control-range type="range" min="1" max="12" step="0.5" value="4" />
          <input data-control-number type="number" min="1" max="12" step="0.5" value="4" />
        </div>
      </label>

      <label class="og-control-row" data-control-key="showStats" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Show FPS Stats</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Show FPS Stats" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control-key="statsMode" data-control-type="select">
        <div class="og-control-header">
          <span class="og-control-label-chip">Stats Mode</span>
        </div>
        <select class="og-control-select" data-control-select aria-label="Stats Mode">
          <option value="0" selected>FPS</option>
          <option value="1">MS</option>
          <option value="2">MB</option>
        </select>
      </label>

      <button type="button" class="og-control-action og-control-action-rose" data-action="export-ifc">
        Export IFC + Metadata
      </button>
      <a data-download-link hidden></a>
    </aside>

    <div id="stats" style="left: 16px; bottom: 16px;"></div>
    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OGSceneManager, OpenGeometry, Arc, Cuboid, Polyline, Rectangle, Sweep, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      const panel = document.querySelector("[data-control-panel]");
      const statsHost = document.getElementById("stats");
      const exportIfcButton = panel?.querySelector('[data-action="export-ifc"]');

      if (!panel || !statsHost || !exportIfcButton) {
        throw new Error("Missing static sweep-mep-pipes UI nodes");
      }

      const PIPE_TYPES = {
        "arc-main": {
          label: "Arc Main",
          color: 0xe74c57,
          colorHex: "#e74c57",
          profile: "arc",
        },
        "arc-branch": {
          label: "Arc Branch",
          color: 0xe74c57,
          colorHex: "#e74c57",
          profile: "arc",
        },
        "rect-main": {
          label: "Rect Main",
          color: 0x4b76f0,
          colorHex: "#4b76f0",
          profile: "rectangle",
        },
        "rect-branch": {
          label: "Rect Branch",
          color: 0x4b76f0,
          colorHex: "#4b76f0",
          profile: "rectangle",
        },
      };

      let config = {
        runCount: 10,
        branchCount: 12,
        laneSpacing: 3.2,
        runLength: 26,
        mainElevation: 2.8,
        branchDrop: 1.1,
        branchReach: 1.45,
        profileScale: 1,
        wallHeight: 3.4,
        showWalls: true,
        outline: true,
        fatOutlines: false,
        outlineWidth: 4,
        showStats: true,
        statsMode: 0,
      };

      let orbitControls;
      let stats;
      let pipeGroup;
      let structureGroup;
      let pipeObjects = new Map();
      let structureObjects = new Map();
      let latestExportSnapshot = null;
      let profileSources;
      let profileByType = null;
      let profileMetrics = null;
      let cachedProfileScale = null;

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function downloadText(text, filename, mime) {
        const link = panel.querySelector("[data-download-link]");
        if (!link) {
          throw new Error("Missing download link node");
        }

        const blob = new Blob([text], { type: mime });
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      function toVector3List(vertices) {
        return vertices.map((vertex) => new Vector3(vertex.position.x, vertex.position.y, vertex.position.z));
      }

      function readLineGeometryPoints(object) {
        const positions = object.geometry && object.geometry.getAttribute("position");
        if (!positions || positions.itemSize !== 3) {
          throw new Error("Profile preview geometry is missing line positions.");
        }

        const points = [];
        for (let index = 0; index < positions.count; index += 1) {
          points.push(new Vector3(positions.getX(index), positions.getY(index), positions.getZ(index)));
        }

        if (points.length >= 3) {
          const first = points[0];
          const last = points[points.length - 1];
          const dx = first.x - last.x;
          const dy = first.y - last.y;
          const dz = first.z - last.z;
          if (dx * dx + dy * dy + dz * dz <= 1.0e-12) {
            points.pop();
          }
        }

        return points;
      }

      function buildMainPath(x, zStart, runLength, elevation, sway, inletDepth) {
        return [
          new Vector3(x - sway, elevation - 0.44, zStart - inletDepth),
          new Vector3(x - sway, elevation, zStart - inletDepth * 0.55),
          new Vector3(x, elevation, zStart + runLength * 0.34),
          new Vector3(x + sway, elevation + 0.06, zStart + runLength * 0.66),
          new Vector3(x, elevation, zStart + runLength + 1.0),
        ];
      }

      function buildBranchPath(xStart, xEnd, z, elevation, drop, zOffset) {
        const reducedElevation = Math.max(0.2, elevation - drop);
        return [
          new Vector3(xStart, elevation, z),
          new Vector3(xStart, reducedElevation, z + zOffset),
          new Vector3(xEnd, reducedElevation, z + zOffset),
          new Vector3(xEnd, elevation - 0.1, z + zOffset),
        ];
      }

      function formatPipeVector(point) {
        return {
          x: Number(point.x.toFixed(3)),
          y: Number(point.y.toFixed(3)),
          z: Number(point.z.toFixed(3)),
        };
      }

      function measurePathLength(points) {
        let total = 0;
        for (let index = 1; index < points.length; index += 1) {
          const start = points[index - 1];
          const end = points[index];
          const dx = Number(end.x) - Number(start.x);
          const dy = Number(end.y) - Number(start.y);
          const dz = Number(end.z) - Number(start.z);
          total += Math.sqrt(dx * dx + dy * dy + dz * dz);
        }
        return total;
      }

      function buildIfcSemantics(pipeConfigs, structureConfigs, summary) {
        const semantics = {};

        pipeConfigs.forEach((pipeConfig) => {
          const branchLabel =
            pipeConfig.branchIndex === null ? "Main" : `Branch ${pipeConfig.branchIndex + 1}`;
          const quantitySet = {
            PathLength: Number(measurePathLength(pipeConfig.pathPoints).toFixed(4)),
            PointCount: Number(pipeConfig.pathPoints.length),
            OutlineWidth: Number(pipeConfig.outlineWidth),
          };

          if (typeof pipeConfig.profileParams.radius === "number") {
            quantitySet.ProfileDiameter = Number((pipeConfig.profileParams.radius * 2).toFixed(4));
          }
          if (typeof pipeConfig.profileParams.width === "number") {
            quantitySet.ProfileWidth = Number(pipeConfig.profileParams.width.toFixed(4));
          }
          if (typeof pipeConfig.profileParams.depth === "number") {
            quantitySet.ProfileDepth = Number(pipeConfig.profileParams.depth.toFixed(4));
          }

          semantics[pipeConfig.id] = {
            ifc_class: "IFCMEMBER",
            name: `${pipeConfig.type} ${branchLabel}`,
            description: `${pipeConfig.type} benchmark sweep generated in the MEP pipe example`,
            object_type: `MEP Pipe ${pipeConfig.profile}`,
            tag: pipeConfig.id.toUpperCase(),
            property_sets: {
              OG_MepPipeBenchmark: {
                Category: pipeConfig.type,
                Profile: pipeConfig.profile,
                JointMode: pipeConfig.jointMode,
                BranchRole: pipeConfig.branchIndex === null ? "main" : "branch",
                LaneIndex: String(pipeConfig.laneIndex),
                BranchIndex:
                  pipeConfig.branchIndex === null ? "main" : String(pipeConfig.branchIndex),
                Color: pipeConfig.color,
              },
            },
            quantity_sets: {
              OG_MepPipeQuantities: quantitySet,
            },
          };
        });

        structureConfigs.forEach((structureConfig) => {
          semantics[structureConfig.id] = {
            ifc_class:
              structureConfig.role === "wall" ? "IFCWALL" : "IFCBUILDINGELEMENTPROXY",
            name: structureConfig.name,
            description: structureConfig.description,
            object_type: structureConfig.objectType,
            tag: structureConfig.id.toUpperCase(),
            property_sets: {
              OG_MepSupportBenchmark: {
                Role: structureConfig.role,
                Side: structureConfig.side ?? "n/a",
                LaneIndex:
                  structureConfig.laneIndex === null ? "n/a" : String(structureConfig.laneIndex),
                Color: structureConfig.colorHex,
                TotalPipes: String(summary.totalPipes),
              },
            },
            quantity_sets: {
              OG_MepSupportQuantities: {
                Width: Number(structureConfig.width.toFixed(4)),
                Height: Number(structureConfig.height.toFixed(4)),
                Depth: Number(structureConfig.depth.toFixed(4)),
              },
            },
          };
        });

        return semantics;
      }

      function vectorKey(point) {
        return `${point.x.toFixed(4)},${point.y.toFixed(4)},${point.z.toFixed(4)}`;
      }

      function pointsKey(points) {
        return points.map(vectorKey).join("|");
      }

      function cuboidKey(cuboidConfig) {
        return [
          vectorKey(cuboidConfig.center),
          cuboidConfig.width.toFixed(4),
          cuboidConfig.height.toFixed(4),
          cuboidConfig.depth.toFixed(4),
          String(cuboidConfig.color),
        ].join("|");
      }

      function updateProfileCache() {
        if (cachedProfileScale === config.profileScale && profileByType && profileMetrics) {
          return;
        }

        const arcMainRadius = 0.18 * config.profileScale;
        const arcBranchRadius = 0.12 * config.profileScale;
        const rectMainWidth = 0.34 * config.profileScale;
        const rectMainDepth = 0.22 * config.profileScale;
        const rectBranchWidth = 0.25 * config.profileScale;
        const rectBranchDepth = 0.16 * config.profileScale;

        profileSources["arc-main"].setConfig({
          center: new Vector3(0, 0, 0),
          radius: arcMainRadius,
          startAngle: 0,
          endAngle: Math.PI * 2,
          segments: 48,
          color: PIPE_TYPES["arc-main"].color,
        });
        profileSources["arc-branch"].setConfig({
          center: new Vector3(0, 0, 0),
          radius: arcBranchRadius,
          startAngle: 0,
          endAngle: Math.PI * 2,
          segments: 36,
          color: PIPE_TYPES["arc-branch"].color,
        });
        profileSources["rect-main"].setConfig({
          center: new Vector3(0, 0, 0),
          width: rectMainWidth,
          breadth: rectMainDepth,
          color: PIPE_TYPES["rect-main"].color,
        });
        profileSources["rect-branch"].setConfig({
          center: new Vector3(0, 0, 0),
          width: rectBranchWidth,
          breadth: rectBranchDepth,
          color: PIPE_TYPES["rect-branch"].color,
        });

        profileByType = {
          "arc-main": readLineGeometryPoints(profileSources["arc-main"]),
          "arc-branch": readLineGeometryPoints(profileSources["arc-branch"]),
          "rect-main": toVector3List(profileSources["rect-main"].getBrep().vertices),
          "rect-branch": toVector3List(profileSources["rect-branch"].getBrep().vertices),
        };

        profileMetrics = {
          "arc-main": { radius: Number(arcMainRadius.toFixed(3)) },
          "arc-branch": { radius: Number(arcBranchRadius.toFixed(3)) },
          "rect-main": {
            width: Number(rectMainWidth.toFixed(3)),
            depth: Number(rectMainDepth.toFixed(3)),
          },
          "rect-branch": {
            width: Number(rectBranchWidth.toFixed(3)),
            depth: Number(rectBranchDepth.toFixed(3)),
          },
        };

        cachedProfileScale = config.profileScale;
      }

      function syncPipe(pipeConfig) {
        let sweep = pipeObjects.get(pipeConfig.id);

        if (!sweep) {
          sweep = new Sweep({
            path: pipeConfig.path.map((point) => point.clone()),
            profile: pipeConfig.profile.map((point) => point.clone()),
            color: pipeConfig.color,
            capStart: true,
            capEnd: true,
            fatOutlines: config.fatOutlines,
            outlineWidth: config.outlineWidth,
          });
          pipeGroup.add(sweep);
          pipeObjects.set(pipeConfig.id, sweep);
        }

        const previous = sweep.userData.sync || {};
        if (previous.pathKey !== pipeConfig.pathKey || previous.profileKey !== pipeConfig.profileKey) {
          sweep.setConfig({
            path: pipeConfig.path.map((point) => point.clone()),
            profile: pipeConfig.profile.map((point) => point.clone()),
            color: pipeConfig.color,
            capStart: true,
            capEnd: true,
          });
        }

        if (previous.fatOutlines !== config.fatOutlines) {
          sweep.fatOutlines = config.fatOutlines;
        }
        if (previous.outlineWidth !== config.outlineWidth) {
          sweep.outlineWidth = config.outlineWidth;
        }
        if (previous.outline !== config.outline) {
          sweep.outline = config.outline;
        }

        sweep.visible = true;
        sweep.userData.sync = {
          pathKey: pipeConfig.pathKey,
          profileKey: pipeConfig.profileKey,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth,
          outline: config.outline,
        };
      }

      function syncStructure(id, cuboidConfig) {
        let cuboid = structureObjects.get(id);
        const geometryKey = cuboidKey(cuboidConfig);

        if (!cuboid) {
          cuboid = new Cuboid({
            center: cuboidConfig.center.clone(),
            width: cuboidConfig.width,
            height: cuboidConfig.height,
            depth: cuboidConfig.depth,
            color: cuboidConfig.color,
            fatOutlines: config.fatOutlines,
            outlineWidth: config.outlineWidth,
          });
          structureGroup.add(cuboid);
          structureObjects.set(id, cuboid);
        }

        const previous = cuboid.userData.sync || {};
        if (previous.geometryKey !== geometryKey) {
          cuboid.setConfig({
            center: cuboidConfig.center.clone(),
            width: cuboidConfig.width,
            height: cuboidConfig.height,
            depth: cuboidConfig.depth,
            color: cuboidConfig.color,
          });
        }

        if (previous.fatOutlines !== config.fatOutlines) {
          cuboid.fatOutlines = config.fatOutlines;
        }
        if (previous.outlineWidth !== config.outlineWidth) {
          cuboid.outlineWidth = config.outlineWidth;
        }
        if (previous.outline !== config.outline) {
          cuboid.outline = config.outline;
        }

        cuboid.visible = true;
        cuboid.userData.sync = {
          geometryKey,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth,
          outline: config.outline,
        };
      }

      function updateOutlineWidthState() {
        const outlineWidthRow = panel.querySelector('[data-control-key="outlineWidth"]');
        if (!outlineWidthRow) {
          return;
        }

        const rangeInput = outlineWidthRow.querySelector("[data-control-range]");
        const numberInput = outlineWidthRow.querySelector("[data-control-number]");
        const disabled = !config.fatOutlines;

        rangeInput.disabled = disabled;
        numberInput.disabled = disabled;
        outlineWidthRow.style.opacity = disabled ? "0.6" : "1";
      }

      function setUIControls() {
        const controls = panel.querySelectorAll("[data-control-key]");

        controls.forEach((control) => {
          const key = control.getAttribute("data-control-key");
          const type = control.getAttribute("data-control-type");

          if (type === "number") {
            const rangeInput = control.querySelector("[data-control-range]");
            const numberInput = control.querySelector("[data-control-number]");
            const valueDisplay = control.querySelector("[data-control-value]");

            const min = parseFloat(rangeInput.min);
            const max = parseFloat(rangeInput.max);
            const integer = rangeInput.step === "1";

            function setNumberValue(value, shouldUpdate = true) {
              const numericValue = parseFloat(value);
              if (!Number.isFinite(numericValue)) {
                return;
              }

              const clampedValue = integer
                ? Math.round(clamp(numericValue, min, max))
                : clamp(numericValue, min, max);

              config[key] = clampedValue;
              rangeInput.value = String(clampedValue);
              numberInput.value = String(clampedValue);
              valueDisplay.textContent = formatControlNumber(clampedValue);

              if (shouldUpdate) {
                updateGeometry();
              }
            }

            setNumberValue(config[key], false);
            rangeInput.addEventListener("input", () => setNumberValue(rangeInput.value));
            numberInput.addEventListener("input", () => setNumberValue(numberInput.value));
          }

          if (type === "boolean") {
            const toggleInput = control.querySelector("[data-control-toggle]");
            const boolStateDisplay = control.querySelector("[data-control-bool-state]");

            function setBooleanValue(checked, shouldUpdate = true) {
              config[key] = checked;
              toggleInput.checked = checked;
              boolStateDisplay.textContent = checked ? "Enabled" : "Disabled";

              if (shouldUpdate) {
                updateGeometry();
              }
            }

            setBooleanValue(Boolean(config[key]), false);
            toggleInput.addEventListener("change", () => setBooleanValue(toggleInput.checked));
          }

          if (type === "select") {
            const selectInput = control.querySelector("[data-control-select]");

            function setSelectValue(value, shouldUpdate = true) {
              config[key] = key === "statsMode" ? Number(value) : value;
              selectInput.value = String(value);

              if (shouldUpdate) {
                updateGeometry();
              }
            }

            setSelectValue(config[key], false);
            selectInput.addEventListener("change", () => setSelectValue(selectInput.value));
          }
        });
      }

      function updateGeometry() {
        if (!pipeGroup || !structureGroup) {
          return;
        }

        updateProfileCache();
        updateOutlineWidthState();

        pipeObjects.forEach((object) => {
          object.visible = false;
        });
        structureObjects.forEach((object) => {
          object.visible = false;
        });

        statsHost.style.display = config.showStats ? "block" : "none";
        stats.showPanel(Number(config.statsMode));

        const runCount = Math.round(config.runCount);
        const branchCount = Math.round(config.branchCount);
        const laneHalf = (runCount - 1) * 0.5;
        const branchStart = config.runLength * 0.1;
        const branchSpan = config.runLength * 0.8;
        const branchSpacing = branchCount > 1 ? branchSpan / (branchCount - 1) : 0;
        const mainOffset = config.laneSpacing * 0.23;

        const counts = {
          "arc-main": 0,
          "arc-branch": 0,
          "rect-main": 0,
          "rect-branch": 0,
        };

        const firstSampleByType = {
          "arc-main": null,
          "arc-branch": null,
          "rect-main": null,
          "rect-branch": null,
        };

        const summaryRows = [];
        const pipeConfigs = [];
        const structureConfigs = [];

        function createSweepPipe(typeKey, laneIndex, branchIndex, rawPathPoints) {
          const type = PIPE_TYPES[typeKey];
          const profilePoints = profileByType[typeKey].map((point) => point.clone());
          const pipePath = rawPathPoints.map((point) => point.clone());
          const pipeId = `${typeKey}-run${laneIndex}${branchIndex === null ? "" : `-branch${branchIndex}`}`;

          syncPipe({
            id: pipeId,
            path: pipePath,
            profile: profilePoints,
            pathKey: pointsKey(pipePath),
            profileKey: pointsKey(profilePoints),
            color: type.color,
          });

          counts[typeKey] += 1;

          const record = {
            id: pipeId,
            type: type.label,
            typeKey,
            profile: type.profile,
            profileParams: profileMetrics[typeKey],
            jointMode: "hard-miter",
            color: type.colorHex,
            laneIndex,
            branchIndex,
            capStart: true,
            capEnd: true,
            outline: config.outline,
            fatOutlines: config.fatOutlines,
            outlineWidth: Number(config.outlineWidth),
            pathPoints: pipePath.map(formatPipeVector),
          };

          pipeConfigs.push(record);
          if (!firstSampleByType[typeKey]) {
            firstSampleByType[typeKey] = record;
          }
        }

        for (let laneIndex = 0; laneIndex < runCount; laneIndex += 1) {
          const laneCenter = (laneIndex - laneHalf) * config.laneSpacing;
          const arcMainX = laneCenter - mainOffset;
          const rectMainX = laneCenter + mainOffset;

          createSweepPipe(
            "arc-main",
            laneIndex,
            null,
            buildMainPath(arcMainX, 0, config.runLength, config.mainElevation, 0.22, 1.5)
          );

          createSweepPipe(
            "rect-main",
            laneIndex,
            null,
            buildMainPath(rectMainX, 0.2, config.runLength, config.mainElevation - 0.14, -0.2, 1.1)
          );

          for (let branchIndex = 0; branchIndex < branchCount; branchIndex += 1) {
            const branchZ = branchStart + branchSpacing * branchIndex;

            createSweepPipe(
              "arc-branch",
              laneIndex,
              branchIndex,
              buildBranchPath(
                arcMainX,
                arcMainX + config.branchReach,
                branchZ,
                config.mainElevation,
                config.branchDrop,
                branchIndex % 2 === 0 ? 0.08 : -0.08
              )
            );

            createSweepPipe(
              "rect-branch",
              laneIndex,
              branchIndex,
              buildBranchPath(
                rectMainX,
                rectMainX - config.branchReach,
                branchZ + 0.22,
                config.mainElevation - 0.14,
                config.branchDrop * 0.88,
                branchIndex % 2 === 0 ? -0.05 : 0.05
              )
            );
          }
        }

        let wallCount = 0;
        if (config.showWalls) {
          const sideInset = config.laneSpacing * 0.92;
          const minX = -laneHalf * config.laneSpacing - sideInset;
          const maxX = laneHalf * config.laneSpacing + sideInset;
          const wallDepth = config.runLength + 3.6;

          syncStructure("wall-left", {
            center: new Vector3(minX, config.wallHeight * 0.5, config.runLength * 0.5),
            width: 0.24,
            height: config.wallHeight,
            depth: wallDepth,
            color: 0x9d4f4f,
          });
          structureConfigs.push({
            id: "wall-left",
            role: "wall",
            side: "left",
            laneIndex: null,
            name: "Benchmark Left Wall",
            description: "Left boundary wall for the sweep MEP benchmark",
            objectType: "Boundary Wall",
            width: 0.24,
            height: config.wallHeight,
            depth: wallDepth,
            colorHex: "#9d4f4f",
          });
          wallCount += 1;

          syncStructure("wall-right", {
            center: new Vector3(maxX, config.wallHeight * 0.5, config.runLength * 0.5),
            width: 0.24,
            height: config.wallHeight,
            depth: wallDepth,
            color: 0x9d4f4f,
          });
          structureConfigs.push({
            id: "wall-right",
            role: "wall",
            side: "right",
            laneIndex: null,
            name: "Benchmark Right Wall",
            description: "Right boundary wall for the sweep MEP benchmark",
            objectType: "Boundary Wall",
            width: 0.24,
            height: config.wallHeight,
            depth: wallDepth,
            colorHex: "#9d4f4f",
          });
          wallCount += 1;

          for (let laneIndex = 0; laneIndex < runCount; laneIndex += 1) {
            const laneCenter = (laneIndex - laneHalf) * config.laneSpacing;
            const equipmentId = `equipment-${laneIndex}`;

            syncStructure(equipmentId, {
              center: new Vector3(laneCenter, 0.26, -1.45),
              width: 1.1,
              height: 0.52,
              depth: 0.84,
              color: 0x666e75,
            });
            structureConfigs.push({
              id: equipmentId,
              role: "equipment",
              side: null,
              laneIndex,
              name: `Equipment Block ${laneIndex + 1}`,
              description: "Reference equipment plinth placed below the benchmark pipe runs",
              objectType: "Equipment Block",
              width: 1.1,
              height: 0.52,
              depth: 0.84,
              colorHex: "#666e75",
            });
            wallCount += 1;
          }
        }

        const totalPipes =
          counts["arc-main"] + counts["arc-branch"] + counts["rect-main"] + counts["rect-branch"];

        summaryRows.push(
          { type: PIPE_TYPES["arc-main"].label, count: counts["arc-main"], profile: "Arc", joints: "Hard miter" },
          { type: PIPE_TYPES["arc-branch"].label, count: counts["arc-branch"], profile: "Arc", joints: "Hard miter" },
          { type: PIPE_TYPES["rect-main"].label, count: counts["rect-main"], profile: "Rectangle", joints: "Hard miter" },
          { type: PIPE_TYPES["rect-branch"].label, count: counts["rect-branch"], profile: "Rectangle", joints: "Hard miter" }
        );

        latestExportSnapshot = {
          pipeConfigs,
          structureConfigs,
          counts: { ...counts },
          wallCount,
          totalPipes,
          state: {
            runCount,
            branchCount,
            laneSpacing: config.laneSpacing,
            runLength: config.runLength,
            mainElevation: config.mainElevation,
            branchDrop: config.branchDrop,
            branchReach: config.branchReach,
            profileScale: config.profileScale,
            wallHeight: config.wallHeight,
            showWalls: config.showWalls,
            outline: config.outline,
            fatOutlines: config.fatOutlines,
            outlineWidth: config.outlineWidth,
          },
        };

        console.groupCollapsed(`[sweep-mep-pipes] ${totalPipes} pipes`);
        console.table(summaryRows);
        console.log("State", latestExportSnapshot.state);
        console.log("Counts", counts);
        console.log("Samples", firstSampleByType);
        console.log("Wall and equipment count", wallCount);
        console.groupEnd();

        const focusTarget = new THREE.Vector3(
          0,
          Math.max(1.2, config.mainElevation * 0.9),
          config.runLength * 0.5
        );
        orbitControls.target.lerp(focusTarget, 0.32);
        orbitControls.update();
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf6f1eb);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );
        camera.position.set(23, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.target.set(0, 2.4, 13);
        orbitControls.update();

        scene.add(new THREE.GridHelper(100, 100, 0xd88b63, 0xe7d4ca));
        scene.add(new THREE.AmbientLight(0xffffff, 0.74));

        const key = new THREE.DirectionalLight(0xffffff, 0.86);
        key.position.set(12, 18, 8);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xfff2e0, 0.5);
        fill.position.set(-10, 7, -7);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        stats = new Stats();
        statsHost.replaceChildren(stats.dom);

        const renderBase = renderer.render.bind(renderer);
        renderer.render = (renderScene, renderCamera) => {
          stats.begin();
          renderBase(renderScene, renderCamera);
          stats.end();
        };

        pipeGroup = new THREE.Group();
        structureGroup = new THREE.Group();
        scene.add(pipeGroup);
        scene.add(structureGroup);

        profileSources = {
          "arc-main": new Arc({
            center: new Vector3(0, 0, 0),
            radius: 0.18,
            startAngle: 0,
            endAngle: Math.PI * 2,
            segments: 48,
            color: PIPE_TYPES["arc-main"].color,
          }),
          "arc-branch": new Arc({
            center: new Vector3(0, 0, 0),
            radius: 0.12,
            startAngle: 0,
            endAngle: Math.PI * 2,
            segments: 36,
            color: PIPE_TYPES["arc-branch"].color,
          }),
          "rect-main": new Rectangle({
            center: new Vector3(0, 0, 0),
            width: 0.34,
            breadth: 0.22,
            color: PIPE_TYPES["rect-main"].color,
          }),
          "rect-branch": new Rectangle({
            center: new Vector3(0, 0, 0),
            width: 0.25,
            breadth: 0.16,
            color: PIPE_TYPES["rect-branch"].color,
          }),
        };

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          orbitControls.update();
          renderer.render(scene, camera);
        }

        animate();

        setUIControls();
        updateGeometry();

        exportIfcButton.addEventListener("click", () => {
          if (!latestExportSnapshot) {
            return;
          }

          try {
            const manager = new OGSceneManager();
            const sceneId = manager.createScene("sweep-mep-pipes-ifc-scene");

            latestExportSnapshot.pipeConfigs.forEach((pipeConfig) => {
              const sweep = pipeObjects.get(pipeConfig.id);
              if (!sweep) {
                return;
              }

              manager.addBrepEntityToScene(
                sceneId,
                pipeConfig.id,
                "OGSweep",
                JSON.stringify(sweep.getBrep())
              );
            });

            latestExportSnapshot.structureConfigs.forEach((structureConfig) => {
              const cuboid = structureObjects.get(structureConfig.id);
              if (!cuboid) {
                return;
              }

              manager.addBrepEntityToScene(
                sceneId,
                structureConfig.id,
                "OGCuboid",
                JSON.stringify(cuboid.getBrepData())
              );
            });

            const semantics = buildIfcSemantics(
              latestExportSnapshot.pipeConfigs,
              latestExportSnapshot.structureConfigs,
              latestExportSnapshot
            );
            const exportConfig = {
              schema: "Ifc4Add2",
              project_name: "OpenGeometry Sweep MEP Pipes",
              site_name: "Benchmark Site",
              building_name: "MEP Benchmark Building",
              storey_name: "Level 01",
              scale: 1,
              error_policy: "BestEffort",
              validate_topology: true,
              require_closed_shell: true,
              semantics,
            };

            const result = manager.exportSceneToIfc(sceneId, JSON.stringify(exportConfig));
            const report = JSON.parse(result.reportJson);
            const filename = "opengeometry-sweep-mep-pipes.ifc";

            downloadText(result.text, filename, "model/ifc");

            console.groupCollapsed(`[sweep-mep-pipes] ${filename}`);
            console.log("Snapshot", latestExportSnapshot);
            console.log("Report", report);
            console.log("Bytes", new TextEncoder().encode(result.text).length);
            console.log("Metadata Entries", Object.keys(semantics).length);
            console.groupEnd();
          } catch (error) {
            console.error("[sweep-mep-pipes] IFC export failed", error);
          }
        });
      }

      void main();
    </script>
  </body>
</html>

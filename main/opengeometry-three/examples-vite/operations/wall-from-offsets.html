<!DOCTYPE html>
<html lang="en">
  <head>
      <title>OpenGeometry Wall from Offsets Example</title>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <meta name="description" content="OpenGeometry Demo" />
      <meta name="author" content="Vishwajeet Mane" />
    </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Wall from Offsets</span>
    </div>
    <aside class="og-controls" data-control-panel>
          <h3>Wall Parameters</h3>
          <label class="og-control-row" data-control-key="thickness" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Wall Thickness</span>
              <code class="og-control-value" data-control-value>0.45</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="0.1" max="2" step="0.05" value="0.45" />
              <input data-control-number type="number" min="0.1" max="2" step="0.05" value="0.45" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="acute" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Acute Threshold</span>
              <code class="og-control-value" data-control-value>90</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="1" max="179" step="1" value="90" />
              <input data-control-number type="number" min="1" max="179" step="1" value="90" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="curveBias" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Curve Bias</span>
              <code class="og-control-value" data-control-value>0</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="-0.8" max="0.8" step="0.05" value="0" />
              <input data-control-number type="number" min="-0.8" max="0.8" step="0.05" value="0" />
            </div>
          </label>
          <label class="og-control-row" data-control-key="bevel" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Bevel</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Bevel" checked />
              <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="outline" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Outline</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
              <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="fatOutlines" data-control-type="boolean">
            <div class="og-control-header">
              <span class="og-control-label-chip">Fat Outlines</span>
            </div>
            <div class="og-control-bool">
              <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Fat Outlines" />
              <span class="og-control-bool-state" data-control-bool-state>Disabled</span>
            </div>
          </label>
          <label class="og-control-row" data-control-key="outlineWidth" data-control-type="number">
            <div class="og-control-header">
              <span class="og-control-label-chip">Outline Width</span>
              <code class="og-control-value" data-control-value>4</code>
            </div>
            <div class="og-control-range">
              <input data-control-range type="range" min="1" max="12" step="0.5" value="4" />
              <input data-control-number type="number" min="1" max="12" step="0.5" value="4" />
            </div>
          </label>
        </aside>
    <div id="app"></div>
    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Polygon, Polyline, Vector3 } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      let centerline;
      let leftPolyline;
      let rightPolyline;
      let polygon;
      let config = {
        thickness: 0.45,
        acute: 90,
        curveBias: 0.0,
        bevel: true,
        outline: true,
        fatOutlines: false,
        outlineWidth: 4,
      };

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function buildCenterline(curveBias) {
        return [
          new Vector3(-2.6, 0, -1.9),
          new Vector3(-1.2, 0, -1.0),
          new Vector3(-0.2, 0, 0.1),
          new Vector3(0.7 + curveBias, 0, 0.2),
          new Vector3(0.1, 0, 1.0),
          new Vector3(2.6, 0, 2.0),
        ];
      }

      function buildWallOutline(left, right) {
        if (!left.length || !right.length) {
          return [];
        }

        return left.map((point) => point.clone()).concat(right.map((point) => point.clone()).reverse());
      }

      function setUIControls() {
        const controls = document.querySelectorAll("[data-control-key]");

        controls.forEach((control) => {
          const key = control.getAttribute("data-control-key");
          const type = control.getAttribute("data-control-type");

          if (type === "number") {
            const rangeInput = control.querySelector("[data-control-range]");
            const numberInput = control.querySelector("[data-control-number]");
            const valueDisplay = control.querySelector("[data-control-value]");

            function setNumberValue(value) {
              const numericValue = parseFloat(value);
              if (!Number.isFinite(numericValue)) return;

              config[key] = numericValue;
              rangeInput.value = String(numericValue);
              numberInput.value = String(numericValue);
              valueDisplay.textContent = formatControlNumber(numericValue);
              updateGeometry();
            }

            rangeInput.addEventListener("input", () => setNumberValue(rangeInput.value));
            numberInput.addEventListener("input", () => setNumberValue(numberInput.value));
          }

          if (type === "boolean") {
            const toggleInput = control.querySelector("[data-control-toggle]");
            const boolStateDisplay = control.querySelector("[data-control-bool-state]");

            function setBooleanValue(checked) {
              config[key] = checked;
              toggleInput.checked = checked;
              boolStateDisplay.textContent = checked ? "Enabled" : "Disabled";
              updateGeometry();
            }

            toggleInput.addEventListener("change", () => setBooleanValue(toggleInput.checked));
          }

          if (type === "select") {
            const selectInput = control.querySelector("[data-control-select]");

            function setSelectValue(value) {
              config[key] = value;
              selectInput.value = String(value);
              updateGeometry();
            }

            selectInput.addEventListener("change", () => setSelectValue(selectInput.value));
          }
        });
      }

      function updateGeometry() {
        if (!centerline || !leftPolyline || !rightPolyline || !polygon) return;
        centerline.setConfig({
          points: buildCenterline(config.curveBias),
          color: 0x1f2937,
        });

        const half = config.thickness * 0.5;
        const leftOffset = centerline.getOffset(half, config.acute, config.bevel);
        const rightOffset = centerline.getOffset(-half, config.acute, config.bevel);
        const outline = buildWallOutline(leftOffset.points, rightOffset.points);

        leftPolyline.setConfig({ points: leftOffset.points, color: 0x22c55e });
        rightPolyline.setConfig({ points: rightOffset.points, color: 0xf97316 });

        if (outline.length < 3) {
          polygon.visible = false;
          return;
        }

        polygon.visible = true;
        polygon.setConfig({
          vertices: outline,
          color: 0x3b82f6,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth,
        });
        polygon.outline = config.outline;
      }

      async function main() {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );

        camera.position.set(5.5, 4.2, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);
        controls.update();

        scene.add(new THREE.GridHelper(32, 32, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        centerline = new Polyline({
          points: buildCenterline(config.curveBias),
          color: 0x1f2937,
        });
        const initialHalfThickness = config.thickness * 0.5;
        const initialLeftOffset = centerline.getOffset(initialHalfThickness, config.acute, config.bevel);
        const initialRightOffset = centerline.getOffset(-initialHalfThickness, config.acute, config.bevel);
        leftPolyline = new Polyline({ points: initialLeftOffset.points, color: 0x22c55e });
        rightPolyline = new Polyline({ points: initialRightOffset.points, color: 0xf97316 });
        polygon = new Polygon({
          vertices: buildWallOutline(initialLeftOffset.points, initialRightOffset.points),
          color: 0x3b82f6,
          fatOutlines: config.fatOutlines,
          outlineWidth: config.outlineWidth,
        });
        polygon.position.y = 0.01;
        polygon.outline = config.outline;

        const group = new THREE.Group();
        group.add(centerline);
        group.add(leftPolyline);
        group.add(rightPolyline);
        group.add(polygon);
        scene.add(group);

        updateGeometry();

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
        setUIControls();
      }

      void main();
    </script>
  </body>
</html>

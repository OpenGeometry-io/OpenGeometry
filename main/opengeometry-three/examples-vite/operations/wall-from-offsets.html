<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Wall from Offsets Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Simple OpenGeometry wall from offsets example for Three.js."
    />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">Wall from Offsets</span>
    </div>

    <aside class="og-controls">
      <h3>Wall from Offsets</h3>
      <p class="og-control-summary">
        The centerline is dark, the two offsets are green and orange, and the wall solid comes from
        turning that offset outline into a polygon and extruding it.
      </p>

      <label class="og-control-row" data-control="thickness">
        <div class="og-control-header">
          <span class="og-control-label-chip">Thickness</span>
          <code class="og-control-value" data-value>0.45</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.15" max="1.2" step="0.05" value="0.45" />
          <input data-number type="number" min="0.15" max="1.2" step="0.05" value="0.45" />
        </div>
      </label>

      <label class="og-control-row" data-control="acute">
        <div class="og-control-header">
          <span class="og-control-label-chip">Acute Threshold</span>
          <code class="og-control-value" data-value>35</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="1" max="179" step="1" value="35" />
          <input data-number type="number" min="1" max="179" step="1" value="35" />
        </div>
      </label>

      <label class="og-control-row" data-control="point-4-x">
        <div class="og-control-header">
          <span class="og-control-label-chip">Point 4 X</span>
          <code class="og-control-value" data-value>0.7</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="-0.5" max="1.8" step="0.05" value="0.7" />
          <input data-number type="number" min="-0.5" max="1.8" step="0.05" value="0.7" />
        </div>
      </label>

      <label class="og-control-row" data-control="bevel">
        <div class="og-control-header">
          <span class="og-control-label-chip">Bevel</span>
        </div>
        <div class="og-control-bool">
          <input data-toggle type="checkbox" class="og-toggle" aria-label="Bevel" checked />
          <span class="og-control-bool-state" data-state>Enabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control="cut-doors">
        <div class="og-control-header">
          <span class="og-control-label-chip">Cut Doors</span>
        </div>
        <div class="og-control-bool">
          <input data-toggle type="checkbox" class="og-toggle" aria-label="Cut Doors" />
          <span class="og-control-bool-state" data-state>Disabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control="overshoot-mm">
        <div class="og-control-header">
          <span class="og-control-label-chip">Cutter Overshoot (mm)</span>
          <code class="og-control-value" data-value>1</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="0.1" max="50" step="0.1" value="1" />
          <input data-number type="number" min="0.1" max="50" step="0.1" value="1" />
        </div>
      </label>

      <label class="og-control-row" data-control="door-count">
        <div class="og-control-header">
          <span class="og-control-label-chip">Door Count</span>
          <code class="og-control-value" data-value>3</code>
        </div>
        <div class="og-control-range">
          <input data-range type="range" min="1" max="5" step="1" value="3" />
          <input data-number type="number" min="1" max="5" step="1" value="3" />
        </div>
      </label>

      <div id="cut-status" class="og-control-row" style="display: block; padding: 8px; border-radius: 6px; background: #f3f4f6; font-size: 12px; line-height: 1.4;">
        <strong>Status:</strong> <span id="cut-status-text">Toggle "Cut Doors" to subtract doors from the wall.</span>
      </div>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import Stats from "three/examples/jsm/libs/stats.module.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import {
        BooleanError,
        Cuboid,
        CutterExceedsHostError,
        CoincidentFacesError,
        NonManifoldOutputError,
        OpenGeometry,
        OverlappingCuttersError,
        Polygon,
        Polyline,
        Vector3,
      } from "opengeometry";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      const config = {
        thickness: 0.45,
        acute: 35,
        point4X: 0.7,
        bevel: true,
        cutDoors: false,
        overshootMm: 1,
        doorCount: 3,
      };

      let scene = null;
      let currentGroup = null;

      function formatNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function mountStats() {
        const stats = new Stats();
        stats.showPanel(0);
        stats.dom.style.position = "fixed";
        stats.dom.style.left = "12px";
        stats.dom.style.bottom = "12px";
        stats.dom.style.top = "auto";
        stats.dom.style.zIndex = "1000";
        document.body.appendChild(stats.dom);
        return stats;
      }

      function attachNumberControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const range = row?.querySelector("[data-range]");
        const number = row?.querySelector("[data-number]");
        const value = row?.querySelector("[data-value]");

        if (!row || !range || !number || !value) {
          throw new Error(`Missing number control: ${name}`);
        }

        const commit = (nextValue) => {
          const parsed = Number(nextValue);
          if (!Number.isFinite(parsed)) {
            return;
          }

          range.value = String(parsed);
          number.value = String(parsed);
          value.textContent = formatNumber(parsed);
          onChange(parsed);
        };

        range.addEventListener("input", () => commit(range.value));
        number.addEventListener("input", () => commit(number.value));
        commit(range.value);
      }

      function attachBooleanControl(name, onChange) {
        const row = document.querySelector(`[data-control="${name}"]`);
        const toggle = row?.querySelector("[data-toggle]");
        const state = row?.querySelector("[data-state]");

        if (!row || !toggle || !state) {
          throw new Error(`Missing boolean control: ${name}`);
        }

        const commit = (checked) => {
          toggle.checked = checked;
          state.textContent = checked ? "Enabled" : "Disabled";
          onChange(checked);
        };

        toggle.addEventListener("change", () => commit(toggle.checked));
        commit(toggle.checked);
      }

      function disposeObject(object) {
        object.traverse((child) => {
          child.geometry?.dispose?.();
          if (Array.isArray(child.material)) {
            child.material.forEach((material) => material?.dispose?.());
            return;
          }
          child.material?.dispose?.();
        });
      }

      function buildCenterline() {
        return [
          new Vector3(-2.6, 0, -1.9),
          new Vector3(-1.2, 0, -1),
          new Vector3(-0.2, 0, 0.1),
          new Vector3(config.point4X, 0, 0.2),
          new Vector3(0.1, 0, 1),
          new Vector3(2.6, 0, 2),
        ];
      }

      function buildWallOutline(left, right) {
        return left.map((point) => point.clone()).concat(
          right.map((point) => point.clone()).reverse()
        );
      }

      function midpoint(a, b) {
        return new Vector3((a.x + b.x) * 0.5, (a.y + b.y) * 0.5, (a.z + b.z) * 0.5);
      }

      function buildDoorCutters(centerlinePoints, count, overshoot) {
        const cutters = [];
        const wallDepth = config.thickness + 2 * overshoot;
        const doorWidth = 0.6;
        const doorHeight = 2.1;

        // Place doors at evenly distributed segment midpoints along the centerline.
        // Each door cuts straight through the wall thickness (the across-wall
        // direction varies per segment so we orient cutters axis-aligned and
        // size them generously to cover the rotated wall section).
        const segments = centerlinePoints.length - 1;
        const stride = Math.max(1, Math.floor(segments / count));

        for (let doorIdx = 0; doorIdx < count; doorIdx++) {
          const segmentIdx = Math.min(segments - 1, doorIdx * stride);
          const a = centerlinePoints[segmentIdx];
          const b = centerlinePoints[segmentIdx + 1];
          const mid = midpoint(a, b);

          const cutter = new Cuboid({
            width: doorWidth,
            height: doorHeight,
            depth: wallDepth,
            center: new Vector3(0, 0, 0),
            translation: new Vector3(mid.x, doorHeight * 0.5 + 0.001, mid.z),
            color: 0xef4444,
          });
          cutters.push(cutter);
        }

        return cutters;
      }

      function setStatus(message, color) {
        const el = document.getElementById("cut-status-text");
        if (!el) return;
        el.textContent = message;
        const wrapper = document.getElementById("cut-status");
        if (wrapper) {
          wrapper.style.background = color || "#f3f4f6";
        }
      }

      function describeBooleanError(error) {
        if (error instanceof OverlappingCuttersError) {
          return `OverlappingCuttersError @ cutter #${error.cutterIndex} (other #${error.otherIndex}): ${error.details ?? error.message}`;
        }
        if (error instanceof CutterExceedsHostError) {
          return `CutterExceedsHostError: cutter overshoots ${error.axis} by ${error.overshoot.toExponential(3)}`;
        }
        if (error instanceof CoincidentFacesError) {
          return `CoincidentFacesError: ${error.details ?? error.message}`;
        }
        if (error instanceof NonManifoldOutputError) {
          const samples = error.edgeSamples?.length ?? 0;
          return `NonManifoldOutputError: ${samples} non-manifold edges sampled — ${error.details ?? error.message}`;
        }
        if (error instanceof BooleanError) {
          return `BooleanError (${error.reason}, phase ${error.phase}): ${error.message}`;
        }
        return `Untyped error: ${error?.message ?? error}`;
      }

      function rebuildExample() {
        if (!scene) {
          return;
        }

        if (currentGroup) {
          scene.remove(currentGroup);
          disposeObject(currentGroup);
        }

        const centerline = new Polyline({
          points: buildCenterline(),
          color: 0x111827,
        });

        const leftOffset = centerline.getOffset(
          config.thickness * 0.5,
          config.acute,
          config.bevel
        );
        const rightOffset = centerline.getOffset(
          -config.thickness * 0.5,
          config.acute,
          config.bevel
        );

        const leftGuide = new Polyline({
          points: leftOffset.points,
          color: 0x22c55e,
        });
        const rightGuide = new Polyline({
          points: rightOffset.points,
          color: 0xf97316,
        });

        const wallOutline = buildWallOutline(leftOffset.points, rightOffset.points);
        const wallProfile = new Polygon({
          vertices: wallOutline,
          color: 0x3b82f6,
          outlineWidth: 2,
        });
        const wall = wallProfile.extrude(2.6);
        wall.outline = true;

        currentGroup = new THREE.Group();
        currentGroup.add(centerline);
        currentGroup.add(leftGuide);
        currentGroup.add(rightGuide);

        if (config.cutDoors) {
          const overshoot = config.overshootMm * 0.001; // mm → m
          const cutters = buildDoorCutters(buildCenterline(), config.doorCount, overshoot);
          try {
            const cutWall = wall.subtract(cutters, {
              color: 0x3b82f6,
              transparent: false,
              opacity: 1,
              outline: true,
            });
            currentGroup.add(cutWall);
            // Render cutter outlines for visual reference (semi-transparent so the cut is visible).
            for (const cutter of cutters) {
              cutter.material.transparent = true;
              cutter.material.opacity = 0.18;
              currentGroup.add(cutter);
            }
            setStatus(
              `OK — wall - ${cutters.length} doors @ ${config.overshootMm}mm overshoot. Manifold: ${
                cutWall.geometry?.attributes?.position?.count ?? "n/a"
              } verts.`,
              "#dcfce7"
            );
          } catch (error) {
            // Render the unmodified wall when cutting fails so the scene
            // stays usable, and surface the typed error in the status panel.
            currentGroup.add(wall);
            setStatus(describeBooleanError(error), "#fee2e2");
            console.error("[wall-from-offsets] subtract failed", error);
          }
        } else {
          currentGroup.add(wall);
          setStatus("Toggle \"Cut Doors\" to subtract doors from the wall.", "#f3f4f6");
        }

        scene.add(currentGroup);

        console.groupCollapsed("[wall-from-offsets] rebuilt");
        console.log("Config", { ...config });
        console.log("Left offset", leftOffset);
        console.log("Right offset", rightOffset);
        console.groupEnd();
      }

      async function main() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2ff);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(8.8, 6.2, 9.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const stats = mountStats();
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.4, 0);
        controls.update();

        scene.add(new THREE.GridHelper(30, 30, 0x4460ff, 0xd5ddff));
        scene.add(new THREE.AmbientLight(0xffffff, 0.82));

        const light = new THREE.DirectionalLight(0xffffff, 1.1);
        light.position.set(6, 8, 4);
        scene.add(light);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        attachNumberControl("thickness", (value) => {
          config.thickness = value;
          rebuildExample();
        });
        attachNumberControl("acute", (value) => {
          config.acute = value;
          rebuildExample();
        });
        attachNumberControl("point-4-x", (value) => {
          config.point4X = value;
          rebuildExample();
        });
        attachBooleanControl("bevel", (value) => {
          config.bevel = value;
          rebuildExample();
        });
        attachBooleanControl("cut-doors", (value) => {
          config.cutDoors = value;
          rebuildExample();
        });
        attachNumberControl("overshoot-mm", (value) => {
          config.overshootMm = value;
          rebuildExample();
        });
        attachNumberControl("door-count", (value) => {
          config.doorCount = Math.round(value);
          rebuildExample();
        });

        rebuildExample();

        renderer.setAnimationLoop(() => {
          stats.update();
          controls.update();
          renderer.render(scene, camera);
        });

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      void main();
    </script>
  </body>
</html>

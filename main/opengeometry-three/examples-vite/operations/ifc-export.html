<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry IFC Export Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OpenGeometry IFC export example" />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body>
    <aside class="og-badge">
      <div class="og-badge-top">
        <div class="og-badge-icon-wrap"><strong>OG</strong></div>
        <p class="og-badge-status">ready</p>
      </div>
      <div class="og-badge-meta">
        <p class="og-badge-kicker">OPEN GEOMETRY • OPERATIONS</p>
        <strong class="og-badge-title">IFC Export</strong>
        <span class="og-badge-desc">IFC4 export with user-side semantics sidecar and optional web-ifc parse probe.</span>
      </div>
      <div class="og-badge-chip-row">
        <span class="og-chip og-chip-accent">Semantics JSON</span>
        <span class="og-chip og-chip-accent">IFC4</span>
      </div>
      <div class="og-badge-footer">
        <a class="og-badge-link" href="../index.html">Back to Examples</a>
      </div>
    </aside>

    <aside class="og-controls" data-control-panel>
      <h3>IFC Export</h3>
      <p class="og-control-summary">
        Pick a shape, edit semantics JSON keyed by entity id, and export IFC4.
      </p>

      <label class="og-control-row" data-control-key="shape" data-control-type="select">
        <div class="og-control-header">
          <span class="og-control-label-chip">Shape</span>
        </div>
        <select class="og-control-select" data-control-select aria-label="Shape">
          <option value="cuboid" selected>Cuboid</option>
          <option value="cylinder">Cylinder</option>
          <option value="sphere">Sphere</option>
          <option value="wedge">Wedge</option>
        </select>
      </label>

      <div class="og-control-group" data-shape-group="cuboid">
        <label class="og-control-row" data-control-key="cuboidWidth" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Width</span>
            <code class="og-control-value" data-control-value>1.8</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="cuboidHeight" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Height</span>
            <code class="og-control-value" data-control-value>1.4</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.4" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.4" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="cuboidDepth" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Depth</span>
            <code class="og-control-value" data-control-value>1.1</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.1" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.1" />
          </div>
        </label>
      </div>

      <div class="og-control-group" data-shape-group="cylinder" hidden>
        <label class="og-control-row" data-control-key="cylinderRadius" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Radius</span>
            <code class="og-control-value" data-control-value>0.8</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="3" step="0.05" value="0.8" />
            <input data-control-number type="number" min="0.2" max="3" step="0.05" value="0.8" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="cylinderHeight" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Height</span>
            <code class="og-control-value" data-control-value>1.8</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="cylinderSegments" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Segments</span>
            <code class="og-control-value" data-control-value>36</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="6" max="96" step="1" value="36" />
            <input data-control-number type="number" min="6" max="96" step="1" value="36" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="cylinderAngleDeg" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Angle (deg)</span>
            <code class="og-control-value" data-control-value>360</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="20" max="360" step="1" value="360" />
            <input data-control-number type="number" min="20" max="360" step="1" value="360" />
          </div>
        </label>
      </div>

      <div class="og-control-group" data-shape-group="sphere" hidden>
        <label class="og-control-row" data-control-key="sphereRadius" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Radius</span>
            <code class="og-control-value" data-control-value>1</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="3" step="0.05" value="1" />
            <input data-control-number type="number" min="0.2" max="3" step="0.05" value="1" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="sphereWidthSegments" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Width Segments</span>
            <code class="og-control-value" data-control-value>32</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="3" max="96" step="1" value="32" />
            <input data-control-number type="number" min="3" max="96" step="1" value="32" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="sphereHeightSegments" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Height Segments</span>
            <code class="og-control-value" data-control-value>20</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="2" max="64" step="1" value="20" />
            <input data-control-number type="number" min="2" max="64" step="1" value="20" />
          </div>
        </label>
      </div>

      <div class="og-control-group" data-shape-group="wedge" hidden>
        <label class="og-control-row" data-control-key="wedgeWidth" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Width</span>
            <code class="og-control-value" data-control-value>2</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="2" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="2" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="wedgeHeight" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Height</span>
            <code class="og-control-value" data-control-value>1.8</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="wedgeDepth" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Depth</span>
            <code class="og-control-value" data-control-value>1.4</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.4" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.4" />
          </div>
        </label>
      </div>

      <label class="og-control-row" data-control-key="outline" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Outline</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>

      <label class="og-control-row" data-control-key="semantics" data-control-type="textarea">
        <div class="og-control-header">
          <span class="og-control-label-chip">IFC Semantics Sidecar</span>
        </div>
        <textarea
          class="og-control-textarea"
          data-semantics-text
          aria-label="IFC Semantics Sidecar"
          spellcheck="false"
        ></textarea>
      </label>

      <button type="button" class="og-control-action og-control-action-rose" data-action="export-ifc">
        Export IFC
      </button>
      <pre class="og-control-report" data-report>Generate geometry to enable IFC export.</pre>
      <a data-download-link hidden></a>
    </aside>

    <div id="app"></div>

    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import {
        Cuboid,
        Cylinder,
        OGSceneManager,
        OpenGeometry,
        Sphere,
        Vector3,
        Wedge,
      } from "@og-three";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      const panel = document.querySelector("[data-control-panel]");
      const shapeSelect = panel?.querySelector('[data-control-key="shape"] [data-control-select]');
      const outlineToggle = panel?.querySelector('[data-control-key="outline"] [data-control-toggle]');
      const outlineStatus = panel?.querySelector('[data-control-key="outline"] [data-control-bool-state]');
      const semanticsEditor = panel?.querySelector("[data-semantics-text]");
      const exportButton = panel?.querySelector('[data-action="export-ifc"]');
      const reportNode = panel?.querySelector("[data-report]");

      if (
        !panel ||
        !shapeSelect ||
        !outlineToggle ||
        !outlineStatus ||
        !semanticsEditor ||
        !exportButton ||
        !reportNode
      ) {
        throw new Error("Missing static IFC export UI nodes");
      }

      const ENTITY_ID = "ifc-shape";
      const SHAPE_CONTROL_DEFS = {
        cuboid: [
          { key: "cuboidWidth", label: "Width", min: 0.2, max: 4, step: 0.05 },
          { key: "cuboidHeight", label: "Height", min: 0.2, max: 4, step: 0.05 },
          { key: "cuboidDepth", label: "Depth", min: 0.2, max: 4, step: 0.05 },
        ],
        cylinder: [
          { key: "cylinderRadius", label: "Radius", min: 0.2, max: 3, step: 0.05 },
          { key: "cylinderHeight", label: "Height", min: 0.2, max: 4, step: 0.05 },
          { key: "cylinderSegments", label: "Segments", min: 6, max: 96, step: 1, integer: true },
          { key: "cylinderAngleDeg", label: "Angle (deg)", min: 20, max: 360, step: 1, integer: true },
        ],
        sphere: [
          { key: "sphereRadius", label: "Radius", min: 0.2, max: 3, step: 0.05 },
          { key: "sphereWidthSegments", label: "Width Segments", min: 3, max: 96, step: 1, integer: true },
          { key: "sphereHeightSegments", label: "Height Segments", min: 2, max: 64, step: 1, integer: true },
        ],
        wedge: [
          { key: "wedgeWidth", label: "Width", min: 0.2, max: 4, step: 0.05 },
          { key: "wedgeHeight", label: "Height", min: 0.2, max: 4, step: 0.05 },
          { key: "wedgeDepth", label: "Depth", min: 0.2, max: 4, step: 0.05 },
        ],
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function formatControlNumber(value, integer) {
        if (integer) {
          return String(Math.round(value));
        }
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function disposeMaterial(material) {
        if (!material) {
          return;
        }

        if (Array.isArray(material)) {
          material.forEach((entry) => entry && entry.dispose && entry.dispose());
          return;
        }

        if (material.dispose) {
          material.dispose();
        }
      }

      function disposeObject3D(object) {
        object.traverse((node) => {
          if (node.geometry && node.geometry.dispose) {
            node.geometry.dispose();
          }
          disposeMaterial(node.material);
        });
      }

      function replaceSceneObject(scene, previous, next) {
        if (previous) {
          previous.parent && previous.parent.remove(previous);
          disposeObject3D(previous);
        }

        scene.add(next);
        return next;
      }

      function downloadText(text, filename, mime) {
        const link = panel.querySelector("[data-download-link]");
        if (!link) {
          throw new Error("Missing download link node");
        }

        const blob = new Blob([text], { type: mime });
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      function defaultSemantics(entityId) {
        return JSON.stringify(
          {
            [entityId]: {
              ifc_class: "IFCWALL",
              name: "Sample Wall",
              description: "User-side semantics override from sidecar JSON",
              object_type: "Partition",
              tag: "W-001",
              property_sets: {
                Pset_WallCommon: {
                  FireRating: "2h",
                  IsExternal: "false",
                },
              },
              quantity_sets: {
                Qto_WallBaseQuantities: {
                  Length: 5,
                },
              },
            },
          },
          null,
          2
        );
      }

      async function tryWebIfcParse(ifcText) {
        try {
          const moduleUrl = "https://cdn.jsdelivr.net/npm/web-ifc@0.0.75/web-ifc-api.js";
          const mod = await import(/* @vite-ignore */ moduleUrl);
          const IfcAPI = mod.IfcAPI;

          if (!IfcAPI) {
            return "web-ifc parser unavailable in runtime module.";
          }

          const api = new IfcAPI();
          await api.Init();

          const bytes = new TextEncoder().encode(ifcText);
          const modelId = api.OpenModel(bytes, { COORDINATE_TO_ORIGIN: false });
          const maxExpressId = api.GetMaxExpressID(modelId);
          api.CloseModel(modelId);

          return `web-ifc parse: OK (max express id: ${maxExpressId})`;
        } catch (error) {
          return `web-ifc parse skipped: ${String(error)}`;
        }
      }

      function formatReport(report, bytes, filename, parseMessage) {
        return [
          `File: ${filename}`,
          `Bytes: ${bytes}`,
          parseMessage,
          `Input BReps: ${report.input_breps}`,
          `Input Faces: ${report.input_faces}`,
          `Exported Elements: ${report.exported_elements}`,
          `Exported Faces: ${report.exported_faces}`,
          `Exported Triangles: ${report.exported_triangles}`,
          `Skipped Entities: ${report.skipped_entities}`,
          `Skipped Faces: ${report.skipped_faces}`,
          `Topology Errors: ${report.topology_errors}`,
          `Semantics Applied: ${report.semantics_applied}`,
          `Proxy Fallbacks: ${report.proxy_fallbacks}`,
          `Property Sets Written: ${report.property_sets_written}`,
          `Quantity Sets Written: ${report.quantity_sets_written}`,
        ].join("\n");
      }

      function bindNumberControl(row, definition, state, onChange) {
        const valueLabel = row.querySelector("[data-control-value]");
        const rangeInput = row.querySelector("[data-control-range]");
        const numberInput = row.querySelector("[data-control-number]");

        if (!valueLabel || !rangeInput || !numberInput) {
          throw new Error(`Missing number control nodes for ${definition.key}`);
        }

        const syncDisplay = (value) => {
          state.values[definition.key] = value;
          rangeInput.value = String(value);
          numberInput.value = String(value);
          valueLabel.textContent = formatControlNumber(value, definition.integer);
        };

        const updateValue = (raw) => {
          const constrained = clamp(raw, definition.min, definition.max);
          const nextValue = definition.integer ? Math.round(constrained) : constrained;
          syncDisplay(nextValue);
          onChange();
        };

        syncDisplay(state.values[definition.key]);
        rangeInput.addEventListener("input", () => updateValue(Number(rangeInput.value)));
        numberInput.addEventListener("change", () => updateValue(Number(numberInput.value)));
      }

      async function createExampleScene(meta, options) {
        const settings = options || {};
        document.body.classList.add("og-example-page");
        document.title = meta.title + " | OpenGeometry";

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(settings.background || 0xf6f1eb);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );
        const cameraPosition = settings.cameraPosition || [5.8, 4.4, 7.4];
        camera.position.set(cameraPosition[0], cameraPosition[1], cameraPosition[2]);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        const target = settings.target || [0, 0.9, 0];
        controls.target.set(target[0], target[1], target[2]);
        controls.update();

        scene.add(new THREE.GridHelper(32, 32, 0xd88b63, 0xe7d4ca));
        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
        return { scene };
      }

      async function main() {
        const meta = {
          slug: "operations/ifc-export",
          category: "operations",
          title: "IFC Export",
          description: "IFC4 export with user-side semantics sidecar and optional web-ifc parse probe.",
          statusLabel: "ready",
          chips: ["Semantics JSON", "IFC4"],
          footerText: "BIM Export",
        };

        const { scene } = await createExampleScene(meta);
        const manager = new OGSceneManager();
        const sceneId = manager.createScene("ifc-export-scene");
        let current = null;

        const state = {
          shape: "cuboid",
          outline: true,
          values: {
            cuboidWidth: 1.8,
            cuboidHeight: 1.4,
            cuboidDepth: 1.1,
            cylinderRadius: 0.8,
            cylinderHeight: 1.8,
            cylinderSegments: 36,
            cylinderAngleDeg: 360,
            sphereRadius: 1,
            sphereWidthSegments: 32,
            sphereHeightSegments: 20,
            wedgeWidth: 2,
            wedgeHeight: 1.8,
            wedgeDepth: 1.4,
          },
        };
        semanticsEditor.value = defaultSemantics(ENTITY_ID);

        const shapeGroups = new Map();

        const updateGroupVisibility = () => {
          shapeGroups.forEach((group, shape) => {
            group.hidden = shape !== state.shape;
          });
        };

        const renderCurrentShape = () => {
          try {
            let object;
            let kind;
            let brepData;
            let fileName;
            let readyText;

            switch (state.shape) {
              case "cuboid": {
                const width = state.values.cuboidWidth;
                const height = state.values.cuboidHeight;
                const depth = state.values.cuboidDepth;
                const cuboid = new Cuboid({
                  center: new Vector3(0, height * 0.5, 0),
                  width,
                  height,
                  depth,
                  color: 0x0ea5e9,
                });
                cuboid.outline = state.outline;
                object = cuboid;
                kind = "OGCuboid";
                brepData = cuboid.getBrepData();
                fileName = "opengeometry-cuboid.ifc";
                readyText = `Ready: Cuboid (W=${width.toFixed(2)}, H=${height.toFixed(2)}, D=${depth.toFixed(2)})`;
                break;
              }
              case "cylinder": {
                const radius = state.values.cylinderRadius;
                const height = state.values.cylinderHeight;
                const segments = Math.max(3, Math.floor(state.values.cylinderSegments));
                const angleDeg = Math.floor(state.values.cylinderAngleDeg);
                const cylinder = new Cylinder({
                  center: new Vector3(0, height * 0.5, 0),
                  radius,
                  height,
                  segments,
                  angle: (angleDeg * Math.PI) / 180,
                  color: 0xf59e0b,
                });
                cylinder.outline = state.outline;
                object = cylinder;
                kind = "OGCylinder";
                brepData = cylinder.getBrep();
                fileName = "opengeometry-cylinder.ifc";
                readyText = `Ready: Cylinder (R=${radius.toFixed(2)}, H=${height.toFixed(2)}, Seg=${segments}, Angle=${angleDeg}deg)`;
                break;
              }
              case "sphere": {
                const radius = state.values.sphereRadius;
                const widthSegments = Math.max(3, Math.floor(state.values.sphereWidthSegments));
                const heightSegments = Math.max(2, Math.floor(state.values.sphereHeightSegments));
                const sphere = new Sphere({
                  center: new Vector3(0, radius, 0),
                  radius,
                  widthSegments,
                  heightSegments,
                  color: 0x0891b2,
                });
                sphere.outline = state.outline;
                object = sphere;
                kind = "OGSphere";
                brepData = sphere.getBrep();
                fileName = "opengeometry-sphere.ifc";
                readyText = `Ready: Sphere (R=${radius.toFixed(2)}, WSeg=${widthSegments}, HSeg=${heightSegments})`;
                break;
              }
              default: {
                const width = state.values.wedgeWidth;
                const height = state.values.wedgeHeight;
                const depth = state.values.wedgeDepth;
                const wedge = new Wedge({
                  center: new Vector3(0, height * 0.5, 0),
                  width,
                  height,
                  depth,
                  color: 0x7c3aed,
                });
                wedge.outline = state.outline;
                object = wedge;
                kind = "OGWedge";
                brepData = wedge.getBrepData();
                fileName = "opengeometry-wedge.ifc";
                readyText = `Ready: Wedge (W=${width.toFixed(2)}, H=${height.toFixed(2)}, D=${depth.toFixed(2)})`;
              }
            }

            current = replaceSceneObject(scene, current, object);
            manager.addBrepEntityToScene(sceneId, ENTITY_ID, kind, JSON.stringify(brepData));
            exportButton.dataset.filename = fileName;
            reportNode.textContent = readyText;
          } catch (error) {
            reportNode.textContent = `Shape update failed: ${String(error)}`;
          }
        };

        Object.keys(SHAPE_CONTROL_DEFS).forEach((shape) => {
          const group = panel.querySelector(`[data-shape-group="${shape}"]`);
          if (!group) {
            throw new Error(`Missing shape group for ${shape}`);
          }

          shapeGroups.set(shape, group);
          SHAPE_CONTROL_DEFS[shape].forEach((definition) => {
            const row = group.querySelector(`[data-control-key="${definition.key}"]`);
            if (!row) {
              throw new Error(`Missing row for ${definition.key}`);
            }
            bindNumberControl(row, definition, state, renderCurrentShape);
          });
        });

        shapeSelect.value = state.shape;
        shapeSelect.addEventListener("change", () => {
          state.shape = shapeSelect.value;
          updateGroupVisibility();
          renderCurrentShape();
        });

        outlineToggle.checked = state.outline;
        outlineStatus.textContent = state.outline ? "Enabled" : "Disabled";
        outlineToggle.addEventListener("change", () => {
          state.outline = outlineToggle.checked;
          outlineStatus.textContent = outlineToggle.checked ? "Enabled" : "Disabled";
          renderCurrentShape();
        });

        exportButton.dataset.filename = "opengeometry-cuboid.ifc";
        exportButton.addEventListener("click", async () => {
          try {
            let semantics;
            try {
              semantics = JSON.parse(semanticsEditor.value);
            } catch (error) {
              reportNode.textContent = `Semantics JSON is invalid: ${String(error)}`;
              return;
            }

            const config = {
              schema: "Ifc4Add2",
              project_name: "OpenGeometry IFC Export",
              site_name: "Main Site",
              building_name: "Main Building",
              storey_name: "Level 01",
              scale: 1,
              error_policy: "BestEffort",
              validate_topology: true,
              require_closed_shell: true,
              semantics,
            };

            const result = manager.exportSceneToIfc(sceneId, JSON.stringify(config));
            const report = JSON.parse(result.reportJson);
            const filename = exportButton.dataset.filename || "opengeometry-shape.ifc";
            downloadText(result.text, filename, "model/ifc");
            const parseMessage = await tryWebIfcParse(result.text);
            reportNode.textContent = formatReport(
              report,
              new TextEncoder().encode(result.text).length,
              filename,
              parseMessage
            );
          } catch (error) {
            reportNode.textContent = `Export failed: ${String(error)}`;
          }
        });

        updateGroupVisibility();
        renderCurrentShape();
      }

      void main();
    </script>
  </body>
</html>

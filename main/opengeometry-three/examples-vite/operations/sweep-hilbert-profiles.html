<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OpenGeometry Sweep Hilbert Profiles Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OpenGeometry Demo" />
    <meta name="author" content="Vishwajeet Mane" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import "../src/styles/theme.css";
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import wasmUrl from "../../../opengeometry/pkg/opengeometry_bg.wasm?url";
      import { OpenGeometry, Arc, Polyline, Rectangle, Sweep, Vector3 } from "@og-three";
      import { hilbert3D } from "three/examples/jsm/utils/GeometryUtils.js";


      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      function formatControlNumber(value) {
        return Number(value).toFixed(3).replace(/\.?0+$/, "");
      }

      function createBadge(meta) {
        const badge = document.createElement("div");
        badge.className = "og-badge";
        const chipMarkup = meta.chips
          .map((chip) => '<span class="og-chip og-chip-accent">' + chip + "</span>")
          .join("");

        badge.innerHTML =
          '<div class="og-badge-top">' +
          '<div class="og-badge-icon-wrap"><strong>OG</strong></div>' +
          '<p class="og-badge-status">' + meta.statusLabel + "</p>" +
          "</div>" +
          '<div class="og-badge-meta">' +
          '<p class="og-badge-kicker">OPEN GEOMETRY • ' + meta.category.toUpperCase() + "</p>" +
          '<strong class="og-badge-title">' + meta.title + "</strong>" +
          '<span class="og-badge-desc">' + meta.description + "</span>" +
          "</div>" +
          '<div class="og-badge-chip-row">' + chipMarkup + "</div>" +
          '<div class="og-badge-footer">' +
          '<span class="og-badge-context">' + meta.footerText + "</span>" +
          '<a class="og-badge-link" href="../index.html">Back to Examples</a>' +
          "</div>";

        document.body.appendChild(badge);
      }

      function disposeMaterial(material) {
        if (!material) {
          return;
        }

        if (Array.isArray(material)) {
          material.forEach((entry) => entry && entry.dispose && entry.dispose());
          return;
        }

        if (material.dispose) {
          material.dispose();
        }
      }

      function disposeObject3D(object) {
        object.traverse((node) => {
          if (node.geometry && node.geometry.dispose) {
            node.geometry.dispose();
          }
          disposeMaterial(node.material);
        });
      }

      function replaceSceneObject(scene, previous, next) {
        if (previous) {
          previous.parent && previous.parent.remove(previous);
          disposeObject3D(previous);
        }

        scene.add(next);
        return next;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function mountControls(title, definitions, onChange) {
        const panel = document.createElement("aside");
        panel.className = "og-controls";

        const heading = document.createElement("h3");
        heading.textContent = title;
        panel.appendChild(heading);

        const state = {};
        definitions.forEach((definition) => {
          state[definition.key] = definition.value;
        });

        const emitChange = () => {
          onChange({ ...state });
        };

        definitions.forEach((definition) => {
          const row = document.createElement("label");
          row.className = "og-control-row";

          const header = document.createElement("div");
          header.className = "og-control-header";

          const label = document.createElement("span");
          label.className = "og-control-label-chip";
          label.textContent = definition.label;
          header.appendChild(label);

          if (definition.type === "number") {
            const valueLabel = document.createElement("code");
            valueLabel.className = "og-control-value";
            valueLabel.textContent = formatControlNumber(definition.value);
            header.appendChild(valueLabel);
            row.appendChild(header);

            const inputs = document.createElement("div");
            inputs.className = "og-control-range";

            const rangeInput = document.createElement("input");
            rangeInput.type = "range";
            rangeInput.min = String(definition.min);
            rangeInput.max = String(definition.max);
            rangeInput.step = String(definition.step || 0.01);
            rangeInput.value = String(definition.value);

            const numberInput = document.createElement("input");
            numberInput.type = "number";
            numberInput.min = String(definition.min);
            numberInput.max = String(definition.max);
            numberInput.step = String(definition.step || 0.01);
            numberInput.value = String(definition.value);

            const updateValue = (raw) => {
              const next = clamp(raw, definition.min, definition.max);
              state[definition.key] = next;
              rangeInput.value = String(next);
              numberInput.value = String(next);
              valueLabel.textContent = formatControlNumber(next);
              emitChange();
            };

            rangeInput.addEventListener("input", () => updateValue(Number(rangeInput.value)));
            numberInput.addEventListener("change", () => updateValue(Number(numberInput.value)));

            inputs.appendChild(rangeInput);
            inputs.appendChild(numberInput);
            row.appendChild(inputs);
          } else {
            row.appendChild(header);

            if (definition.type === "boolean") {
              const boolWrap = document.createElement("div");
              boolWrap.className = "og-control-bool";

              const toggle = document.createElement("input");
              toggle.type = "checkbox";
              toggle.className = "og-toggle";
              toggle.checked = definition.value;
              toggle.setAttribute("aria-label", definition.label);

              const boolLabel = document.createElement("span");
              boolLabel.className = "og-control-bool-state";
              boolLabel.textContent = definition.value ? "Enabled" : "Disabled";

              toggle.addEventListener("change", () => {
                state[definition.key] = toggle.checked;
                boolLabel.textContent = toggle.checked ? "Enabled" : "Disabled";
                emitChange();
              });

              boolWrap.appendChild(toggle);
              boolWrap.appendChild(boolLabel);
              row.appendChild(boolWrap);
            } else {
              const select = document.createElement("select");
              select.className = "og-control-select";
              select.setAttribute("aria-label", definition.label);

              definition.options.forEach((option) => {
                const optionElement = document.createElement("option");
                optionElement.value = option.value;
                optionElement.textContent = option.label;
                optionElement.selected = option.value === definition.value;
                select.appendChild(optionElement);
              });

              select.addEventListener("change", () => {
                state[definition.key] = select.value;
                emitChange();
              });

              row.appendChild(select);
            }
          }

          panel.appendChild(row);
        });

        document.body.appendChild(panel);
        emitChange();
      }

      async function createExampleScene(meta, options) {
        const settings = options || {};
        document.body.classList.add("og-example-page");
        document.title = meta.title + " | OpenGeometry";
        createBadge(meta);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(settings.background || 0xf6f1eb);

        const camera = new THREE.PerspectiveCamera(
          55,
          window.innerWidth / window.innerHeight,
          0.1,
          4000
        );

        const cameraPosition = settings.cameraPosition || [5.5, 4.2, 6.5];
        camera.position.set(cameraPosition[0], cameraPosition[1], cameraPosition[2]);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        app.replaceChildren(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        const target = settings.target || [0, 0.8, 0];
        controls.target.set(target[0], target[1], target[2]);
        controls.update();

        scene.add(
          new THREE.GridHelper(
            settings.gridSize || 32,
            settings.gridDivisions || 32,
            settings.gridPrimary || 0xd88b63,
            settings.gridSecondary || 0xe7d4ca
          )
        );

        scene.add(new THREE.AmbientLight(0xffffff, 0.72));

        const key = new THREE.DirectionalLight(0xffffff, 0.9);
        key.position.set(6, 8, 4);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.42);
        fill.position.set(-5, 3, -6);
        scene.add(fill);

        await OpenGeometry.create({ wasmURL: wasmUrl });

        function onResize() {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener("resize", onResize);

        function animate() {
          requestAnimationFrame(animate);
          controls.update();
          renderer.render(scene, camera);
        }

        animate();
        return { scene, camera, renderer, controls };
      }


      async function main() {
        const meta = {
        "slug": "operations/sweep-hilbert-profiles",
        "category": "operations",
        "title": "Sweep Hilbert Profiles",
        "description": "Locked Hilbert3D path with switchable kernel and custom section profiles.",
        "statusLabel": "ready",
        "chips": [
          "Hilbert Path",
          "Profiles",
          "Sweep"
        ],
        "footerText": "Profile Type, Caps, Outlines"
      };

        const LOCKED_HILBERT_SIZE = 8;
        const LOCKED_HILBERT_ITERATIONS = 1;

        function toVector3List(vertices) {
          return vertices.map((vertex) => new Vector3(vertex.position.x, vertex.position.y, vertex.position.z));
        }

        function readLineGeometryPoints(object) {
          const positions = object.geometry && object.geometry.getAttribute("position");
          if (!positions || positions.itemSize !== 3) {
            throw new Error("Profile preview geometry is missing line positions.");
          }

          const points = [];
          for (let index = 0; index < positions.count; index += 1) {
            points.push(new Vector3(positions.getX(index), positions.getY(index), positions.getZ(index)));
          }

          if (points.length >= 3) {
            const first = points[0];
            const last = points[points.length - 1];
            const dx = first.x - last.x;
            const dy = first.y - last.y;
            const dz = first.z - last.z;
            if (dx * dx + dy * dy + dz * dz <= 1.0e-12) {
              points.pop();
            }
          }

          return points;
        }

        function scaleProfileShape(points, width, depth) {
          return points.map(([x, z]) => new Vector3(x * width, 0, z * depth));
        }

        function buildHilbertPath(size, iterations) {
          const rawPoints = hilbert3D(new THREE.Vector3(0, 0, 0), size, iterations);
          const minY = rawPoints.reduce((lowest, point) => Math.min(lowest, point.y), Number.POSITIVE_INFINITY);
          const lift = Number.isFinite(minY) ? Math.max(0.25 - minY, 0) : 0;
          return rawPoints.map((point) => new Vector3(point.x, point.y + lift, point.z));
        }

        function createPreviewLoop(points, color) {
          const positions = [];
          points.forEach((point) => {
            positions.push(point.x, point.y, point.z);
          });

          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
          return new THREE.LineLoop(geometry, new THREE.LineBasicMaterial({ color }));
        }

        function buildCustomProfile(profileType, width, depth) {
          const normalizedPointsByType = {
            "architectural-molding": [
              [-0.5, -0.5],
              [0.5, -0.5],
              [0.5, -0.16],
              [0.18, -0.16],
              [0.28, 0.04],
              [0.12, 0.26],
              [-0.08, 0.4],
              [-0.28, 0.5],
              [-0.5, 0.5]
            ],
            trapezoid: [
              [-0.5, -0.5],
              [0.5, -0.5],
              [0.24, 0.5],
              [-0.24, 0.5]
            ],
            diamond: [
              [0, -0.5],
              [0.5, 0],
              [0, 0.5],
              [-0.5, 0]
            ],
            hexagon: [
              [-0.25, -0.5],
              [0.25, -0.5],
              [0.5, 0],
              [0.25, 0.5],
              [-0.25, 0.5],
              [-0.5, 0]
            ]
          };

          return scaleProfileShape(normalizedPointsByType[profileType], width, depth);
        }

        function buildProfilePoints(profileType, width, depth) {
          if (profileType === "arc-pipe") {
            const radius = Math.min(width, depth) * 0.5;
            const profilePrimitive = new Arc({
              center: new Vector3(0, 0, 0),
              radius,
              startAngle: 0,
              endAngle: Math.PI * 2,
              segments: 48,
              color: 0xc2410c
            });

            return readLineGeometryPoints(profilePrimitive);
          }

          if (profileType === "rectangle") {
            const profilePrimitive = new Rectangle({
              center: new Vector3(0, 0, 0),
              width,
              breadth: depth,
              color: 0xc2410c
            });

            return toVector3List(profilePrimitive.getBrep().vertices);
          }

          return buildCustomProfile(profileType, width, depth);
        }

        const { scene } = await createExampleScene(meta);
        let current = null;
        let cachedProfileKey = "";
        let cachedProfilePoints = [];
        const lockedPathPoints = buildHilbertPath(LOCKED_HILBERT_SIZE, LOCKED_HILBERT_ITERATIONS);

        function getProfilePoints(profileType, width, depth) {
          const nextKey = profileType + ":" + width + ":" + depth;
          if (nextKey !== cachedProfileKey) {
            cachedProfileKey = nextKey;
            cachedProfilePoints = buildProfilePoints(profileType, width, depth);
          }

          return cachedProfilePoints.map((point) => point.clone());
        }

        mountControls("Hilbert Sweep Parameters", [
          {
            type: "select",
            key: "profileType",
            label: "Profile Type",
            value: "arc-pipe",
            options: [
              { label: "Arc Pipe", value: "arc-pipe" },
              { label: "Rectangle", value: "rectangle" },
              { label: "Architectural Molding", value: "architectural-molding" },
              { label: "Trapezoid", value: "trapezoid" },
              { label: "Diamond", value: "diamond" },
              { label: "Hexagon", value: "hexagon" }
            ]
          },
          { type: "number", key: "profileWidth", label: "Profile Width", min: 0.15, max: 1.5, step: 0.05, value: 0.6 },
          { type: "number", key: "profileDepth", label: "Profile Depth", min: 0.15, max: 1.5, step: 0.05, value: 0.45 },
          { type: "boolean", key: "capStart", label: "Cap Start", value: true },
          { type: "boolean", key: "capEnd", label: "Cap End", value: true },
          { type: "boolean", key: "outline", label: "Outline", value: false },
          { type: "boolean", key: "fatOutlines", label: "Fat Outlines", value: false },
          { type: "number", key: "outlineWidth", label: "Outline Width", min: 1, max: 12, step: 0.5, value: 4 }
        ], (state) => {
          const pathPoints = lockedPathPoints.map((point) => point.clone());
          const profilePoints = getProfilePoints(state.profileType, state.profileWidth, state.profileDepth);

          const pathPrimitive = new Polyline({
            points: pathPoints.map((point) => point.clone()),
            color: 0x4b5563
          });

          const previewObject = createPreviewLoop(profilePoints, 0xc2410c);
          const sweep = new Sweep({
            path: pathPoints.map((point) => point.clone()),
            profile: profilePoints.map((point) => point.clone()),
            color: 0x0f766e,
            capStart: state.capStart,
            capEnd: state.capEnd,
            fatOutlines: state.fatOutlines,
            outlineWidth: state.outlineWidth
          });
          sweep.outline = state.outline;

          const previewOffset = LOCKED_HILBERT_SIZE * 0.95;
          pathPrimitive.position.y += 0.01;
          previewObject.position.set(-previewOffset, 0.02, -previewOffset);

          const group = new THREE.Group();
          group.add(pathPrimitive);
          group.add(previewObject);
          group.add(sweep);

          current = replaceSceneObject(scene, current, group);
        });
      }

      void main();
    </script>
  </body>
</html>

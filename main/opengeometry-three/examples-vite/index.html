<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenGeometry Three Examples</title>
    <style>
      :root {
        color-scheme: light;
        --og-bg: #ede7e0;
        --og-line: rgba(95, 61, 46, 0.1);
        --og-text: #221a14;
        --og-muted: #736255;
        --og-muted-soft: #9f8f83;
        --og-accent: #ff5400;
        --og-accent-soft: rgba(255, 84, 0, 0.12);
        --og-shadow: 0 22px 44px rgba(72, 44, 24, 0.08);
        --og-font: "Space Grotesk", "Sora", "Avenir Next", "Segoe UI", sans-serif;
        --og-mono: "IBM Plex Mono", "JetBrains Mono", "SFMono-Regular", monospace;
        --og-squircle-radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(116, 84, 63, 0.05)),
          var(--og-bg);
        color: var(--og-text);
        font: 14px/1.45 var(--og-font);
      }

      body {
        overflow-x: hidden;
      }

      code {
        font-family: var(--og-mono);
      }

      #app {
        width: 100%;
        min-height: 100vh;
      }

      .og-specs-shell {
        width: min(1320px, calc(100% - 30px));
        margin: 0 auto;
        padding: 26px 8px 48px;
      }

      .og-specs-head,
      .og-spec-card,
      .og-support,
      .og-spec-open,
      .og-support-link {
        corner-shape: squircle;
        border-radius: var(--og-squircle-radius);
      }

      .og-specs-head {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 24px;
        padding: 22px 24px;
        border: 1px solid var(--og-line);
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(249, 239, 229, 0.9));
        box-shadow: var(--og-shadow);
      }

      .og-specs-title {
        margin: 6px 0 0;
        font-weight: 700;
        letter-spacing: -0.03em;
        font-size: clamp(42px, 6vw, 74px);
        line-height: 0.92;
      }

      .og-specs-note {
        margin: 0;
        color: var(--og-muted);
        font-size: 12px;
        line-height: 1.4;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .og-specs-head .og-specs-note:last-child {
        align-self: end;
        justify-self: end;
        max-width: 320px;
        text-align: right;
      }

      .og-specs-section {
        margin-top: 26px;
      }

      .og-specs-section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
        padding: 0 4px;
      }

      .og-specs-section-title {
        margin: 0;
        font-size: clamp(28px, 4vw, 42px);
        letter-spacing: -0.03em;
        font-weight: 650;
      }

      .og-specs-count {
        margin: 0;
        color: var(--og-muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.45);
        border: 1px solid var(--og-line);
      }

      .og-specs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        gap: 18px;
      }

      .og-spec-card {
        display: grid;
        gap: 16px;
        min-height: 312px;
        padding: 18px 18px 16px;
        border: 1px solid var(--og-line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(250, 242, 235, 0.96));
        box-shadow: var(--og-shadow);
        transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      }

      .og-spec-card:hover {
        border-color: rgba(255, 84, 0, 0.28);
        transform: translateY(-3px);
        box-shadow: 0 28px 52px rgba(72, 44, 24, 0.12);
      }

      .og-spec-card-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .og-spec-card-brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 20px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 235, 223, 0.92));
        border: 1px solid rgba(255, 84, 0, 0.18);
        color: var(--og-accent);
      }

      .og-spec-card-brand svg {
        width: 20px;
        height: 20px;
        opacity: 0.88;
      }

      .og-spec-card-title {
        margin: 0;
        font-weight: 650;
        font-size: 28px;
        letter-spacing: -0.02em;
      }

      .og-spec-badge {
        margin: 0;
        color: #4f7259;
        background: rgba(133, 189, 149, 0.12);
        border: 1px solid rgba(133, 189, 149, 0.24);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: capitalize;
        padding: 8px 12px;
        border-radius: 14px;
      }

      .og-spec-desc {
        margin: 6px 0 0;
        color: var(--og-muted);
        font-size: 14px;
        min-height: 44px;
      }

      .og-spec-chip-row {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 6px;
      }

      .og-chip {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        height: 28px;
        padding: 0 12px;
        border-radius: 12px;
        border: 1px solid rgba(214, 132, 83, 0.14);
        background: rgba(246, 234, 226, 0.92);
        white-space: nowrap;
      }

      .og-chip span {
        display: inline-block;
        font-size: 11px;
        line-height: 1;
        color: #9f6b4e;
        font-weight: 550;
        letter-spacing: 0.02em;
      }

      .og-spec-card-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 14px;
        margin-top: auto;
        padding-top: 14px;
        border-top: 1px solid rgba(95, 61, 46, 0.08);
      }

      .og-spec-open {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid rgba(96, 87, 78, 0.14);
        background: #64584f;
        color: #fbf7f3;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 10px 18px rgba(76, 63, 54, 0.16);
      }

      .og-support {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-top: 28px;
        padding: 20px 22px;
        border: 1px solid rgba(255, 84, 0, 0.18);
        background: linear-gradient(145deg, rgba(255, 248, 242, 0.96), rgba(250, 239, 230, 0.92));
        box-shadow: var(--og-shadow);
      }

      .og-support-copy {
        display: grid;
        gap: 6px;
      }

      .og-support-kicker {
        margin: 0;
        color: var(--og-accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .og-support-title {
        margin: 0;
        font-size: 22px;
        font-weight: 650;
        letter-spacing: -0.02em;
      }

      .og-support-text {
        margin: 0;
        color: var(--og-muted);
        font-size: 14px;
      }

      .og-support-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 46px;
        padding: 0 18px;
        border: 1px solid rgba(255, 84, 0, 0.18);
        background: var(--og-accent);
        color: #fff7f2;
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
        box-shadow: 0 12px 24px rgba(255, 84, 0, 0.18);
      }

      .og-support-link svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      @media (max-width: 900px) {
        .og-specs-head {
          grid-template-columns: 1fr;
        }

        .og-specs-head .og-specs-note:last-child {
          justify-self: start;
          text-align: left;
        }
      }

      @media (max-width: 640px) {
        .og-specs-shell {
          width: min(100%, calc(100% - 20px));
          padding-top: 18px;
        }

        .og-spec-card {
          min-height: 286px;
        }

        .og-spec-card-title {
          font-size: 24px;
        }

        .og-spec-card-footer,
        .og-support {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { icon } from "@fortawesome/fontawesome-svg-core";
      import {
        faBezierCurve,
        faCompassDrafting,
        faCube,
        faDatabase,
        faDoorOpen,
        faDrawPolygon,
        faGlobe,
        faLayerGroup,
        faMountain,
        faRoad,
        faRoute,
        faShapes,
        faSlash,
        faUpRightAndDownLeftFromCenter,
        faVectorSquare,
        faWarehouse,
      } from "@fortawesome/free-solid-svg-icons";

      const app = document.getElementById("app");
      if (!app) {
        throw new Error("Missing #app container");
      }

      const categoryLabels = {
        primitives: "Primitives",
        shapes: "Shapes",
        operations: "Operations",
      };

      const iconMap = {
        arc: faCompassDrafting,
        curve: faBezierCurve,
        line: faSlash,
        polyline: faRoute,
        rectangle: faVectorSquare,
        cuboid: faCube,
        cylinder: faWarehouse,
        opening: faUpRightAndDownLeftFromCenter,
        polygon: faDrawPolygon,
        "polygon-suite": faLayerGroup,
        sphere: faGlobe,
        sweep: faShapes,
        wedge: faMountain,
        offset: faCompassDrafting,
        "sweep-path-profile": faRoute,
        "sweep-hilbert-profiles": faRoad,
        "wall-from-offsets": faLayerGroup,
        "step-export": faDatabase,
        "stl-export": faDatabase,
        "ifc-export": faDatabase,
        "door-export": faDoorOpen,
      };

      const examples = [
        {
          slug: "primitives/arc",
          category: "primitives",
          iconKey: "arc",
          title: "Arc",
          description: "Circular arc with angle span and segmentation control.",
          statusLabel: "ready",
          chips: ["Radius", "Span"],
          footerText: "Radius, Span",
        },
        {
          slug: "primitives/curve",
          category: "primitives",
          iconKey: "curve",
          title: "Curve",
          description: "Control-point curve for route and profile sketching.",
          statusLabel: "ready",
          chips: ["Sag", "Lift"],
          footerText: "Sag, Lift",
        },
        {
          slug: "primitives/line",
          category: "primitives",
          iconKey: "line",
          title: "Line",
          description: "Two-point line primitive with direct endpoint control.",
          statusLabel: "ready",
          chips: ["Length", "Angle"],
          footerText: "Length, Angle",
        },
        {
          slug: "primitives/polyline",
          category: "primitives",
          iconKey: "polyline",
          title: "Polyline",
          description: "Open and closed path definitions for profile work.",
          statusLabel: "ready",
          chips: ["Closure", "Span"],
          footerText: "Closure, Span",
        },
        {
          slug: "primitives/rectangle",
          category: "primitives",
          iconKey: "rectangle",
          title: "Rectangle",
          description: "Parametric rectangular primitive for base profiles.",
          statusLabel: "ready",
          chips: ["Width", "Breadth"],
          footerText: "Width, Breadth",
        },
        {
          slug: "shapes/cuboid",
          category: "shapes",
          iconKey: "cuboid",
          title: "Cuboid",
          description: "Rectangular solid for rooms, equipment blocks and massing.",
          statusLabel: "ready",
          chips: ["Width", "Height", "Depth"],
          footerText: "Width, Height, Depth",
        },
        {
          slug: "shapes/cylinder",
          category: "shapes",
          iconKey: "cylinder",
          title: "Cylinder",
          description: "Cylindrical volume for ducts, pipes and mechanical shafts.",
          statusLabel: "ready",
          chips: ["Radius", "Height", "Segments"],
          footerText: "Radius, Height, Segments",
        },
        {
          slug: "shapes/opening",
          category: "shapes",
          iconKey: "opening",
          title: "Opening",
          description: "Opening helper volume for void and penetration previews.",
          statusLabel: "ready",
          chips: ["Width", "Height", "Depth"],
          footerText: "Width, Height, Depth",
        },
        {
          slug: "shapes/polygon",
          category: "shapes",
          iconKey: "polygon",
          title: "Polygon",
          description: "Planar polygon triangulation for surfaces and slabs.",
          statusLabel: "ready",
          chips: ["Sides", "Radius"],
          footerText: "Sides, Radius",
        },
        {
          slug: "shapes/polygon-suite",
          category: "shapes",
          iconKey: "polygon-suite",
          title: "Polygon Suite",
          description: "Dataset-backed polygon validation with concave, performance, and multi-hole cases.",
          statusLabel: "ready",
          chips: ["Holes", "Concavity"],
          footerText: "Holes, Concavity",
        },
        {
          slug: "shapes/sphere",
          category: "shapes",
          iconKey: "sphere",
          title: "Sphere",
          description: "UV sphere for equipment envelopes and clearance studies.",
          statusLabel: "ready",
          chips: ["Radius", "Segments"],
          footerText: "Radius, Segments",
        },
        {
          slug: "shapes/sweep",
          category: "shapes",
          iconKey: "sweep",
          title: "Sweep",
          description: "Profile along path sweep for framing and custom sections.",
          statusLabel: "ready",
          chips: ["Path", "Caps"],
          footerText: "Path, Caps",
        },
        {
          slug: "shapes/wedge",
          category: "shapes",
          iconKey: "wedge",
          title: "Wedge",
          description: "Tapered solid for ramps and sloped technical elements.",
          statusLabel: "ready",
          chips: ["Width", "Height", "Depth"],
          footerText: "Width, Height, Depth",
        },
        {
          slug: "operations/door-export",
          category: "operations",
          iconKey: "door-export",
          title: "Door Export",
          description: "Door panel as Cuboid plus frame from swept profile, exported through STL, STEP and IFC.",
          statusLabel: "ready",
          chips: ["Door Panel", "Frame Profile", "IFC"],
          footerText: "Door Assembly",
        },
        {
          slug: "operations/ifc-export",
          category: "operations",
          iconKey: "ifc-export",
          title: "IFC Export",
          description: "IFC4 export with user-side semantics sidecar and optional web-ifc parse probe.",
          statusLabel: "ready",
          chips: ["Semantics JSON", "IFC4"],
          footerText: "BIM Export",
        },
        {
          slug: "operations/offset",
          category: "operations",
          iconKey: "offset",
          title: "Offset",
          description: "Offset generation with acute-corner and bevel parameters.",
          statusLabel: "ready",
          chips: ["Offset", "Bevel"],
          footerText: "Offset, Bevel",
        },
        {
          slug: "operations/step-export",
          category: "operations",
          iconKey: "step-export",
          title: "STEP Export",
          description: "STEP Part-21 export workflow with scene-level reporting and download.",
          statusLabel: "ready",
          chips: ["STEP", "Shape"],
          footerText: "Scene Export",
        },
        {
          slug: "operations/stl-export",
          category: "operations",
          iconKey: "stl-export",
          title: "STL Export",
          description: "Binary STL export workflow with scene-level reporting and download.",
          statusLabel: "ready",
          chips: ["Binary STL", "Shape"],
          footerText: "Scene Export",
        },
        {
          slug: "operations/sweep-hilbert-profiles",
          category: "operations",
          iconKey: "sweep-hilbert-profiles",
          title: "Sweep Hilbert Profiles",
          description: "Locked Hilbert3D path with switchable kernel and custom section profiles.",
          statusLabel: "ready",
          chips: ["Hilbert Path", "Profiles", "Sweep"],
          footerText: "Profile Type, Caps, Outlines",
        },
        {
          slug: "operations/sweep-path-profile",
          category: "operations",
          iconKey: "sweep-path-profile",
          title: "Sweep Path + Profile",
          description: "Operation-level sweep from path primitive plus profile primitive.",
          statusLabel: "ready",
          chips: ["Path", "Caps"],
          footerText: "Path, Caps",
        },
        {
          slug: "operations/wall-from-offsets",
          category: "operations",
          iconKey: "wall-from-offsets",
          title: "Wall from Offsets",
          description: "Composite wall profile assembled from offset centerlines.",
          statusLabel: "ready",
          chips: ["Offsets", "Thickness"],
          footerText: "Composite Wall",
        },
      ];

      function getIconMarkup(iconKey) {
        const iconDefinition = iconMap[iconKey] || faShapes;
        return icon(iconDefinition).html.join("");
      }

      function getDiscordIconMarkup() {
        return (
          '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none">' +
          '<path d="M19.54 5.17a16.7 16.7 0 0 0-4.13-1.3l-.2.4a14.6 14.6 0 0 1 3.95 1.36 13.9 13.9 0 0 0-3.99-1.23 16.1 16.1 0 0 0-6.34 0A13.9 13.9 0 0 0 4.84 5.63a14.6 14.6 0 0 1 3.95-1.36l-.2-.4a16.7 16.7 0 0 0-4.13 1.3C1.84 9.1 1.15 12.93 1.5 16.72a16.8 16.8 0 0 0 5.07 2.57l1.09-1.76a10.7 10.7 0 0 1-1.72-.83l.42-.3c3.32 1.57 6.92 1.57 10.19 0l.42.3c-.54.33-1.12.61-1.72.83l1.09 1.76a16.8 16.8 0 0 0 5.07-2.57c.41-4.39-.7-8.18-2.87-11.55ZM8.68 14.4c-.99 0-1.8-.92-1.8-2.04 0-1.13.8-2.04 1.8-2.04.99 0 1.8.92 1.8 2.04 0 1.12-.81 2.04-1.8 2.04Zm6.64 0c-.99 0-1.8-.92-1.8-2.04 0-1.13.8-2.04 1.8-2.04.99 0 1.8.92 1.8 2.04 0 1.12-.81 2.04-1.8 2.04Z" fill="currentColor"/>' +
          "</svg>"
        );
      }

      function createCard(example) {
        const article = document.createElement("article");
        article.className = "og-spec-card";

        const chipsMarkup = example.chips
          .map((chip) => '<span class="og-chip"><span>' + chip + "</span></span>")
          .join("");

        article.innerHTML =
          '<div class="og-spec-card-head">' +
          '<div class="og-spec-card-brand" aria-hidden="true">' + getIconMarkup(example.iconKey) + "</div>" +
          '<p class="og-spec-badge">' + example.statusLabel + "</p>" +
          "</div>" +
          "<div>" +
          '<h3 class="og-spec-card-title">' + example.title + "</h3>" +
          '<p class="og-spec-desc">' + example.description + "</p>" +
          "</div>" +
          '<div class="og-spec-chip-row">' + chipsMarkup + "</div>" +
          '<div class="og-spec-card-footer">' +
          '<a class="og-spec-open" href="./' + example.slug + '.html">Open example</a>' +
          "</div>";

        return article;
      }

      const shell = document.createElement("main");
      shell.className = "og-specs-shell";
      shell.innerHTML =
        '<section class="og-specs-head">' +
        "<div>" +
        '<p class="og-specs-note">OpenGeometry Three Example Catalog</p>' +
        '<h1 class="og-specs-title">Examples</h1>' +
        "</div>" +
        '<p class="og-specs-note">Standalone Vite-served pages for primitives, shapes, and operation workflows. Read any example in one file and open it directly from this catalog.</p>' +
        "</section>";

      Object.keys(categoryLabels).forEach((category) => {
        const sectionExamples = examples.filter((example) => example.category === category);
        const section = document.createElement("section");
        section.className = "og-specs-section";

        const head = document.createElement("div");
        head.className = "og-specs-section-head";
        head.innerHTML =
          '<h2 class="og-specs-section-title">' + categoryLabels[category] + "</h2>" +
          '<p class="og-specs-count">' + sectionExamples.length + " items</p>";

        const grid = document.createElement("div");
        grid.className = "og-specs-grid";
        sectionExamples.forEach((example) => {
          grid.appendChild(createCard(example));
        });

        section.appendChild(head);
        section.appendChild(grid);
        shell.appendChild(section);
      });

      const support = document.createElement("section");
      support.className = "og-support";
      support.innerHTML =
        '<div class="og-support-copy">' +
        '<p class="og-support-kicker">Need Help</p>' +
        '<h2 class="og-support-title">Talk to the OpenGeometry team</h2>' +
        '<p class="og-support-text">Use Discord for example issues, geometry questions, and requests for new standalone demos.</p>' +
        "</div>" +
        '<a class="og-support-link" href="https://discord.gg/BUBcPU8w" target="_blank" rel="noreferrer">' +
        getDiscordIconMarkup() +
        "<span>Join Discord</span>" +
        "</a>";
      shell.appendChild(support);

      app.replaceChildren(shell);
    </script>
  </body>
</html>

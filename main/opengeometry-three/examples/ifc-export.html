<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenGeometry Three - IFC Export Example</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f172a;
        color: #e2e8f0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      .panel {
        position: fixed;
        top: 16px;
        left: 16px;
        width: 340px;
        max-height: calc(100vh - 32px);
        overflow: auto;
        padding: 14px;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.35);
        backdrop-filter: blur(4px);
      }
      .panel h1 {
        margin: 0 0 6px;
        font-size: 16px;
      }
      .panel p {
        margin: 0 0 10px;
        font-size: 12px;
        color: #94a3b8;
      }
      .row {
        margin: 8px 0;
      }
      .row label {
        display: block;
        font-size: 12px;
        color: #cbd5e1;
        margin-bottom: 4px;
      }
      .row input[type="range"] {
        width: 100%;
      }
      .value {
        float: right;
        color: #7dd3fc;
      }
      textarea {
        width: 100%;
        min-height: 150px;
        background: rgba(15, 23, 42, 0.65);
        color: #cbd5e1;
        border: 1px solid rgba(148, 163, 184, 0.35);
        font-family: "Courier New", Courier, monospace;
        font-size: 11px;
        padding: 8px;
        box-sizing: border-box;
      }
      .actions {
        margin-top: 12px;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: #0f172a;
        background: #f18f33;
      }
      pre {
        margin: 10px 0 0;
        white-space: pre-wrap;
        font-size: 11px;
        color: #cbd5e1;
        min-height: 72px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <aside class="panel">
      <h1>IFC Export (Legacy)</h1>
      <p>Direct wasm API test with semantics sidecar and scene-level IFC export.</p>

      <div class="row">
        <label>Width <span id="widthValue" class="value">1.80</span></label>
        <input id="width" type="range" min="0.2" max="4" step="0.05" value="1.8" />
      </div>
      <div class="row">
        <label>Height <span id="heightValue" class="value">1.40</span></label>
        <input id="height" type="range" min="0.2" max="4" step="0.05" value="1.4" />
      </div>
      <div class="row">
        <label>Depth <span id="depthValue" class="value">1.10</span></label>
        <input id="depth" type="range" min="0.2" max="4" step="0.05" value="1.1" />
      </div>

      <div class="row">
        <label for="semantics">Semantics JSON</label>
        <textarea id="semantics"></textarea>
      </div>

      <div class="actions">
        <button id="exportBtn" type="button">Export IFC</button>
      </div>
      <pre id="report">Adjust dimensions and export.</pre>
    </aside>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.168.0/build/three.module.js";
      import { OrbitControls } from "https://unpkg.com/three@0.168.0/examples/jsm/controls/OrbitControls.js";
      import init, {
        OGCuboid,
        OGSceneManager,
        Vector3,
      } from "../../opengeometry/pkg/opengeometry.js";

      await init();

      const app = document.getElementById("app");
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a);

      const camera = new THREE.PerspectiveCamera(
        55,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(4.8, 3.8, 6.2);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      app.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0.8, 0);
      controls.update();

      scene.add(new THREE.AmbientLight(0xffffff, 0.62));
      const key = new THREE.DirectionalLight(0xffffff, 0.95);
      key.position.set(5, 7, 4);
      scene.add(key);
      scene.add(new THREE.GridHelper(16, 16, 0x64748b, 0x334155));

      let mesh = null;
      const sceneManager = new OGSceneManager();
      const sceneId = sceneManager.createScene("legacy-ifc-export");
      const entityId = "legacy-cuboid";

      const widthInput = document.getElementById("width");
      const heightInput = document.getElementById("height");
      const depthInput = document.getElementById("depth");
      const widthValue = document.getElementById("widthValue");
      const heightValue = document.getElementById("heightValue");
      const depthValue = document.getElementById("depthValue");
      const semanticsInput = document.getElementById("semantics");
      const reportNode = document.getElementById("report");
      const exportBtn = document.getElementById("exportBtn");

      semanticsInput.value = JSON.stringify(
        {
          [entityId]: {
            ifc_class: "IFCWALL",
            name: "Legacy Sample Wall",
            object_type: "Partition",
            property_sets: {
              Pset_WallCommon: {
                FireRating: "2h",
              },
            },
          },
        },
        null,
        2
      );

      function toNumber(input) {
        return Number.parseFloat(input.value);
      }

      function renderCuboid() {
        const width = toNumber(widthInput);
        const height = toNumber(heightInput);
        const depth = toNumber(depthInput);

        widthValue.textContent = width.toFixed(2);
        heightValue.textContent = height.toFixed(2);
        depthValue.textContent = depth.toFixed(2);

        const cuboid = new OGCuboid(entityId);
        cuboid.set_config(new Vector3(0, height * 0.5, 0), width, height, depth);

        const positions = JSON.parse(cuboid.get_geometry_serialized());
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geometry.computeVertexNormals();

        if (mesh) {
          scene.remove(mesh);
          mesh.geometry.dispose();
          mesh.material.dispose();
        }

        mesh = new THREE.Mesh(
          geometry,
          new THREE.MeshStandardMaterial({
            color: 0x38bdf8,
            transparent: true,
            opacity: 0.7,
          })
        );
        scene.add(mesh);

        sceneManager.addBrepEntityToScene(
          sceneId,
          entityId,
          "OGCuboid",
          cuboid.get_brep_serialized()
        );

        reportNode.textContent =
          `Ready for export.\nWidth=${width.toFixed(2)} Height=${height.toFixed(2)} Depth=${depth.toFixed(2)}`;
      }

      function downloadText(text, filename, mime) {
        const blob = new Blob([text], { type: mime });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      async function tryWebIfcParse(ifcText) {
        try {
          const mod = await import("https://cdn.jsdelivr.net/npm/web-ifc@0.0.75/web-ifc-api.js");
          const api = new mod.IfcAPI();
          await api.Init();
          const modelId = api.OpenModel(new TextEncoder().encode(ifcText), {
            COORDINATE_TO_ORIGIN: false,
          });
          const maxExpressId = api.GetMaxExpressID(modelId);
          api.CloseModel(modelId);
          return `web-ifc parse: OK (max express id: ${maxExpressId})`;
        } catch (error) {
          return `web-ifc parse skipped: ${String(error)}`;
        }
      }

      async function exportIfc() {
        try {
          let semantics;
          try {
            semantics = JSON.parse(semanticsInput.value);
          } catch (error) {
            reportNode.textContent = `Semantics JSON is invalid: ${String(error)}`;
            return;
          }

          const config = {
            schema: "Ifc4Add2",
            project_name: "OpenGeometry IFC Export",
            site_name: "Main Site",
            building_name: "Main Building",
            storey_name: "Level 01",
            scale: 1.0,
            error_policy: "BestEffort",
            validate_topology: true,
            require_closed_shell: true,
            semantics,
          };

          const result = sceneManager.exportSceneToIfc(sceneId, JSON.stringify(config));
          const report = JSON.parse(result.reportJson);
          const parseMessage = await tryWebIfcParse(result.text);

          downloadText(result.text, "opengeometry-legacy-scene.ifc", "model/ifc");
          reportNode.textContent = [
            `Bytes: ${new TextEncoder().encode(result.text).length}`,
            parseMessage,
            `Input BReps: ${report.input_breps}`,
            `Input Faces: ${report.input_faces}`,
            `Exported Elements: ${report.exported_elements}`,
            `Exported Faces: ${report.exported_faces}`,
            `Exported Triangles: ${report.exported_triangles}`,
            `Skipped Entities: ${report.skipped_entities}`,
            `Skipped Faces: ${report.skipped_faces}`,
            `Topology Errors: ${report.topology_errors}`,
            `Semantics Applied: ${report.semantics_applied}`,
            `Proxy Fallbacks: ${report.proxy_fallbacks}`,
            `Property Sets Written: ${report.property_sets_written}`,
            `Quantity Sets Written: ${report.quantity_sets_written}`,
          ].join("\n");
        } catch (error) {
          reportNode.textContent = `Export failed: ${String(error)}`;
        }
      }

      widthInput.addEventListener("input", renderCuboid);
      heightInput.addEventListener("input", renderCuboid);
      depthInput.addEventListener("input", renderCuboid);
      exportBtn.addEventListener("click", exportIfc);

      renderCuboid();

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
